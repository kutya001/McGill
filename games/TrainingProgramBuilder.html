<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Тренировок (GitHub Sync)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- УТИЛИТЫ ---
        const generateId = () => Math.random().toString(36).substring(2, 10);
        
        // Безопасное кодирование Base64 для кириллицы
        const b64EncodeUnicode = (str) => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
        const b64DecodeUnicode = (str) => decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));

        // Шаблоны
        const createEmptyProgram = () => ({ id: generateId(), title: 'Новая программа', filename: `program_${generateId()}.json`, description: '', exercises: [] });
        const createEmptyExercise = () => ({ id: generateId(), name: '', sets: '1', reps: '60', rest: '40', voiceText: '' });

        // --- ИКОНКИ ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = React.useRef(null);
            
            React.useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = '';
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', kebabName);
                    spanRef.current.appendChild(i);
                    
                    window.lucide.createIcons({ root: spanRef.current });
                    
                    const svg = spanRef.current.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', `${svg.getAttribute('class') || ''} ${className}`);
                    }
                }
            }, [name, size, className]);

            return <span ref={spanRef} className="inline-flex items-center justify-center shrink-0"></span>;
        };

        // --- ГЛАВНЫЙ КОМПОНЕНТ ---
        function App() {
            const [programs, setPrograms] = React.useState([]);
            const [activeId, setActiveId] = React.useState(null);
            
            // Настройки GitHub API
            const [ghConfig, setGhConfig] = React.useState({ token: '', owner: 'kutya001', repo: 'mcgill' });
            const [showSettings, setShowSettings] = React.useState(false);
            
            // Статус тестирования соединения
            const [testStatus, setTestStatus] = React.useState({ loading: false, message: null, isError: false });

            // Расширенный статус синхронизации
            const [syncStatus, setSyncStatus] = React.useState({ 
                saving: false, 
                loadingList: false, 
                loadingProgram: false, 
                deleting: false, 
                error: null, 
                successMessage: null 
            });

            // Загрузка локальных данных
            React.useEffect(() => {
                const savedPrograms = localStorage.getItem('workout_programs');
                if (savedPrograms) setPrograms(JSON.parse(savedPrograms));
                const savedConfig = localStorage.getItem('gh_config');
                if (savedConfig) setGhConfig(JSON.parse(savedConfig));
            }, []);

            // Автосохранение в локальное хранилище
            React.useEffect(() => {
                if (programs.length > 0) localStorage.setItem('workout_programs', JSON.stringify(programs));
            }, [programs]);

            const activeProgram = programs.find(p => p.id === activeId);

            // Обработчики изменений программы
            const updateActiveProgram = (updates) => {
                setPrograms(prev => prev.map(p => p.id === activeId ? { ...p, ...updates } : p));
            };

            const addExercise = () => updateActiveProgram({ exercises: [...activeProgram.exercises, createEmptyExercise()] });
            
            const updateExercise = (id, field, value) => {
                const updatedEx = activeProgram.exercises.map(ex => ex.id === id ? { ...ex, [field]: value } : ex);
                updateActiveProgram({ exercises: updatedEx });
            };

            const removeExercise = (id) => {
                updateActiveProgram({ exercises: activeProgram.exercises.filter(ex => ex.id !== id) });
            };

            const showSuccess = (msg) => {
                setSyncStatus(s => ({ ...s, successMessage: msg, error: null }));
                setTimeout(() => setSyncStatus(s => ({ ...s, successMessage: null })), 3000);
            };

            const getAuthHeaders = () => {
                const headers = {
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };
                if (ghConfig.token) {
                    headers['Authorization'] = `token ${ghConfig.token}`;
                }
                return headers;
            };

            // --- ТЕСТ СОЕДИНЕНИЯ С GITHUB ---
            const testConnection = async () => {
                setTestStatus({ loading: true, message: null, isError: false });
                if (!ghConfig.owner || !ghConfig.repo) {
                    setTestStatus({ loading: false, message: 'Укажите Owner и Repo', isError: true });
                    return;
                }
                try {
                    const res = await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}`, {
                        headers: getAuthHeaders(),
                        cache: 'no-store'
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        if (data.permissions && data.permissions.push) {
                            setTestStatus({ loading: false, message: 'Успешно! Доступ на запись подтвержден.', isError: false });
                        } else if (ghConfig.token) {
                            setTestStatus({ loading: false, message: 'Репозиторий найден, но у токена нет прав на запись (нужен scope "repo").', isError: true });
                        } else {
                            setTestStatus({ loading: false, message: 'Репозиторий найден (публичный). Для сохранения нужен Токен.', isError: true });
                        }
                    } else {
                        const err = await res.json().catch(() => ({}));
                        setTestStatus({ loading: false, message: `Ошибка API: ${err.message || res.statusText}`, isError: true });
                    }
                } catch (e) {
                    setTestStatus({ loading: false, message: `Ошибка сети: ${e.message}`, isError: true });
                }
            };

            // --- 1. ЗАГРУЗКА СПИСКА ИЗ GITHUB ---
            const fetchListFromGitHub = async () => {
                if (!ghConfig.token || !ghConfig.owner || !ghConfig.repo) {
                    setShowSettings(true);
                    return;
                }
                
                setSyncStatus(s => ({ ...s, loadingList: true, error: null }));
                try {
                    const baseUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents`;
                    
                    const dirRes = await fetch(`${baseUrl}/workouts`, { 
                        headers: getAuthHeaders(),
                        cache: 'no-store'
                    });
                    
                    if (!dirRes.ok) throw new Error("Не удалось прочитать директорию workouts/");
                    
                    const dirData = await dirRes.json();
                    if (!Array.isArray(dirData)) throw new Error("Директория недоступна или имеет неверный формат");

                    const realJsonFiles = dirData.filter(f => f.type === 'file' && f.name.endsWith('.json') && f.name !== 'index.json');

                    let indexData = [];
                    try {
                        const indexRes = await fetch(`${baseUrl}/workouts/index.json`, { 
                            headers: getAuthHeaders(), cache: 'no-store'
                        });
                        if (indexRes.ok) {
                            const indexJson = await indexRes.json();
                            const parsed = JSON.parse(b64DecodeUnicode(indexJson.content));
                            if (Array.isArray(parsed)) indexData = parsed;
                        }
                    } catch (e) {
                        console.warn("index.json отсутствует или поврежден.");
                    }

                    const normalizedPrograms = realJsonFiles.map(fileObj => {
                        const meta = indexData.find(item => item.file === fileObj.name || item.filename === fileObj.name) || {};
                        return {
                            id: meta.id || generateId(),
                            title: meta.title || fileObj.name.replace('.json', '').replace(/_/g, ' '),
                            filename: fileObj.name,
                            description: meta.description || '',
                            fileSha: fileObj.sha 
                        };
                    });
                    
                    setPrograms(normalizedPrograms);
                    setActiveId(null);
                    setSyncStatus(s => ({ ...s, loadingList: false }));
                    showSuccess(`Найдено файлов: ${normalizedPrograms.length}`);
                } catch (error) {
                    setSyncStatus(s => ({ ...s, loadingList: false, error: error.message }));
                }
            };

            // --- 2. ВЫБОР ПРОГРАММЫ (ИНТЕЛЛЕКТУАЛЬНЫЙ ПАРСИНГ PROTOCOL) ---
            const selectProgram = async (prog) => {
                setActiveId(prog.id);
                
                if (prog.exercises) return;

                if (!ghConfig.token) {
                    alert("Для загрузки контента программы из GitHub нужен токен.");
                    setShowSettings(true);
                    return;
                }

                if (!prog.filename || prog.filename === 'undefined') {
                    alert("У этой программы отсутствует корректное имя файла.");
                    return;
                }

                setSyncStatus(s => ({ ...s, loadingProgram: true, error: null }));
                try {
                    const baseUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents`;
                    const res = await fetch(`${baseUrl}/workouts/${prog.filename}`, { 
                        headers: getAuthHeaders(),
                        cache: 'no-store'
                    });
                    
                    if (!res.ok) {
                        if (res.status === 404) {
                            setPrograms(prev => prev.map(p => p.id === prog.id ? { ...p, exercises: [] } : p));
                            throw new Error(`Файл ${prog.filename} не найден (404). Инициализирован пустой шаблон.`);
                        }
                        const err = await res.json().catch(() => ({}));
                        throw new Error(`Ошибка загрузки: ${err.message || res.statusText}`);
                    }
                    
                    const data = await res.json();
                    const fullProgram = JSON.parse(b64DecodeUnicode(data.content));
                    
                    let extractedExercises = [];
                    let legacyDetails = {};
                    let parsedTitle = prog.title;
                    let parsedDesc = prog.description;

                    // АДАПТЕР: Парсим линейный protocol в удобные Exercises
                    if (fullProgram.programs && Array.isArray(fullProgram.programs) && fullProgram.programs.length > 0) {
                        const srcProg = fullProgram.programs[0];
                        parsedTitle = srcProg.name || parsedTitle;
                        parsedDesc = srcProg.description || parsedDesc;
                        legacyDetails = srcProg.exercisesDetails || {};

                        if (srcProg.protocol) {
                            let lastEx = null;
                            srcProg.protocol.forEach(step => {
                                if (step.type === 'prep' || step.type === 'work') {
                                    if (lastEx && lastEx.name === step.ex) {
                                        // То же самое упражнение - плюсуем подход
                                        lastEx.sets = String(parseInt(lastEx.sets) + 1);
                                        if (!lastEx.voiceText && step.voiceTxt) lastEx.voiceText = step.voiceTxt; 
                                    } else {
                                        // Новое упражнение
                                        lastEx = {
                                            id: generateId(),
                                            name: step.ex || '',
                                            sets: '1',
                                            reps: step.time ? `${step.time}` : '60',
                                            rest: '0',
                                            voiceText: step.voiceTxt || ''
                                        };
                                        extractedExercises.push(lastEx);
                                    }
                                } else if (step.type === 'rest' && lastEx) {
                                    // Отдых относится к последнему упражнению
                                    lastEx.rest = step.time ? `${step.time}` : '40';
                                }
                            });
                        }
                    } else {
                        // Обычный формат (резервный)
                        extractedExercises = fullProgram.exercises || [];
                        parsedTitle = fullProgram.title || parsedTitle;
                        parsedDesc = fullProgram.description || parsedDesc;
                    }
                    
                    setPrograms(prev => prev.map(p => p.id === prog.id ? { 
                        ...p, 
                        title: parsedTitle,
                        description: parsedDesc,
                        exercises: extractedExercises,
                        legacyDetails: legacyDetails,
                        fileSha: data.sha 
                    } : p));
                    
                    setSyncStatus(s => ({ ...s, loadingProgram: false }));
                } catch (error) {
                    setSyncStatus(s => ({ ...s, loadingProgram: false, error: error.message }));
                }
            };

            // --- 3. СОХРАНЕНИЕ В GITHUB (РАЗВОРАЧИВАНИЕ PROTOCOL) ---
            const syncToGitHub = async () => {
                if (!ghConfig.token || !ghConfig.owner || !ghConfig.repo) {
                    setShowSettings(true);
                    return;
                }
                if (!activeProgram.filename || activeProgram.filename === 'undefined') {
                    alert("Пожалуйста, укажите корректное имя файла.");
                    return;
                }
                if (!activeProgram.filename.endsWith('.json')) {
                    alert("Имя файла должно заканчиваться на .json");
                    return;
                }

                setSyncStatus(s => ({ ...s, saving: true, error: null }));
                const baseUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents`;
                const headers = getAuthHeaders();

                try {
                    // ШАГ 1: Сохранение файла программы
                    const filePath = `workouts/${activeProgram.filename}`;
                    let fileSha = activeProgram.fileSha;

                    if (!fileSha) {
                        const fileCheckRes = await fetch(`${baseUrl}/${filePath}`, { headers, cache: 'no-store' });
                        if (fileCheckRes.ok) fileSha = (await fileCheckRes.json()).sha;
                    }

                    // АДАПТЕР: Разворачиваем Exercises в линейный Protocol для Плеера
                    const protocol = [];
                    const details = activeProgram.legacyDetails || {};
                    
                    activeProgram.exercises.forEach((ex, index) => {
                        const workTime = ex.reps ? (parseInt(String(ex.reps).replace(/\D/g,'')) || 60) : 60;
                        const restTime = ex.rest ? (parseInt(String(ex.rest).replace(/\D/g,'')) || 0) : 0;
                        const setsCount = ex.sets ? (parseInt(String(ex.sets).replace(/\D/g,'')) || 1) : 1;
                        
                        for (let s = 1; s <= setsCount; s++) {
                            protocol.push({
                                ex: ex.name || `Упражнение ${index + 1}`,
                                phase: (index === 0 && s === 1) ? "Подготовка" : `Подход ${s}`,
                                type: (index === 0 && s === 1) ? "prep" : "work",
                                time: workTime,
                                voiceTxt: s === 1 ? (ex.voiceText || '') : '', // Озвучка только в первом подходе
                                toneType: (index === 0 && s === 1) ? "prep" : "work",
                                stepDesc: ex.name || ""
                            });
                            
                            // Отдых после всех подходов, кроме самого последнего в тренировке
                            const isLastOverall = (index === activeProgram.exercises.length - 1) && (s === setsCount);
                            if (restTime > 0 && !isLastOverall) {
                                protocol.push({
                                    ex: "Переход",
                                    phase: "Отдых",
                                    type: "rest",
                                    time: restTime,
                                    voiceTxt: "Отдых",
                                    toneType: "rest",
                                    stepDesc: "Восстановление"
                                });
                            }
                        }
                        
                        if (!details[ex.name]) {
                            details[ex.name] = { goal: "Выполнять правильно.", start: "-", move: "-" };
                        }
                    });
                    
                    protocol.push({
                        ex: "Финиш",
                        phase: "Завершение",
                        type: "finish",
                        time: 5,
                        voiceTxt: "Тренировка завершена.",
                        toneType: "finish",
                        stepDesc: "Конец."
                    });
                    
                    const totalTime = protocol.reduce((acc, step) => acc + (step.time || 0), 0);
                    const estTimeMin = Math.ceil(totalTime / 60);

                    const progToSave = {
                        programs: [{
                            id: activeProgram.filename.replace('.json', ''),
                            name: activeProgram.title,
                            description: activeProgram.description,
                            estimatedTime: `${estTimeMin} минут`,
                            exercisesDetails: details,
                            protocol: protocol
                        }]
                    };

                    const fileContentB64 = b64EncodeUnicode(JSON.stringify(progToSave, null, 2));
                    
                    const filePutRes = await fetch(`${baseUrl}/${filePath}`, { 
                        method: 'PUT', 
                        headers, 
                        cache: 'no-store',
                        body: JSON.stringify({
                            message: `Обновлена программа: ${activeProgram.title}`,
                            content: fileContentB64,
                            ...(fileSha && { sha: fileSha })
                        }) 
                    });
                    
                    if (!filePutRes.ok) {
                        const err = await filePutRes.json().catch(() => ({}));
                        throw new Error(`Ошибка сохранения (PUT ${filePutRes.status}): ${err.message || res.statusText}`);
                    }
                    
                    const newFileData = await filePutRes.json();
                    updateActiveProgram({ fileSha: newFileData.content.sha });

                    // ШАГ 2: Обновление workouts/index.json
                    const indexPath = `workouts/index.json`;
                    let indexSha = null;
                    let indexData = [];

                    const indexCheckRes = await fetch(`${baseUrl}/${indexPath}`, { headers, cache: 'no-store' });
                    if (indexCheckRes.ok) {
                        const indexResp = await indexCheckRes.json();
                        indexSha = indexResp.sha;
                        try { indexData = JSON.parse(b64DecodeUnicode(indexResp.content)); } catch (e) { indexData = []; }
                    }

                    if (!Array.isArray(indexData)) indexData = [];
                    const existingEntryIdx = indexData.findIndex(item => item.id === activeProgram.id || item.file === activeProgram.filename);
                    
                    const newEntry = { id: activeProgram.id, title: activeProgram.title, file: activeProgram.filename, description: activeProgram.description };

                    if (existingEntryIdx > -1) indexData[existingEntryIdx] = newEntry;
                    else indexData.push(newEntry);

                    const indexPutRes = await fetch(`${baseUrl}/${indexPath}`, { 
                        method: 'PUT', 
                        headers, 
                        cache: 'no-store',
                        body: JSON.stringify({
                            message: `Обновлен реестр (добавлено: ${activeProgram.title})`,
                            content: b64EncodeUnicode(JSON.stringify(indexData, null, 2)),
                            ...(indexSha && { sha: indexSha })
                        }) 
                    });
                    
                    if (!indexPutRes.ok) {
                         const err = await indexPutRes.json().catch(() => ({}));
                         throw new Error(`Ошибка обновления индекса: ${err.message || res.statusText}`);
                    }

                    setSyncStatus(s => ({ ...s, saving: false }));
                    showSuccess("Успешно сохранено");
                } catch (error) {
                    setSyncStatus(s => ({ ...s, saving: false, error: error.message }));
                }
            };

            // --- 4. УДАЛЕНИЕ ИЗ GITHUB ---
            const deleteFromGitHub = async () => {
                if (!confirm(`Вы уверены, что хотите удалить "${activeProgram.title}"?\n\nФайл будет удален из GitHub и локального списка.`)) return;

                if (!ghConfig.token) {
                    setPrograms(programs.filter(p => p.id !== activeId));
                    setActiveId(null);
                    return;
                }

                setSyncStatus(s => ({ ...s, deleting: true, error: null }));
                const baseUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents`;
                const headers = getAuthHeaders();

                try {
                    // ШАГ 1: Удаляем файл программы
                    let sha = activeProgram.fileSha;
                    if (!sha) {
                        const fileCheckRes = await fetch(`${baseUrl}/workouts/${activeProgram.filename}`, { headers, cache: 'no-store' });
                        if (fileCheckRes.ok) sha = (await fileCheckRes.json()).sha;
                    }

                    if (sha) {
                        const delRes = await fetch(`${baseUrl}/workouts/${activeProgram.filename}`, {
                            method: 'DELETE',
                            headers,
                            cache: 'no-store',
                            body: JSON.stringify({ message: `Удалена программа: ${activeProgram.title}`, sha: sha })
                        });
                        if (!delRes.ok && delRes.status !== 404) {
                            const err = await delRes.json().catch(() => ({}));
                            throw new Error(`Ошибка удаления файла: ${err.message || res.statusText}`);
                        }
                    }

                    // ШАГ 2: Удаляем запись из index.json
                    const indexCheckRes = await fetch(`${baseUrl}/workouts/index.json`, { headers, cache: 'no-store' });
                    if (indexCheckRes.ok) {
                        const indexResp = await indexCheckRes.json();
                        const indexSha = indexResp.sha;
                        let indexData = JSON.parse(b64DecodeUnicode(indexResp.content));
                        
                        indexData = indexData.filter(item => item.id !== activeProgram.id && item.file !== activeProgram.filename);
                        
                        const indexPutRes = await fetch(`${baseUrl}/workouts/index.json`, {
                            method: 'PUT',
                            headers,
                            cache: 'no-store',
                            body: JSON.stringify({
                                message: `Обновлен реестр (удалено: ${activeProgram.title})`,
                                content: b64EncodeUnicode(JSON.stringify(indexData, null, 2)),
                                sha: indexSha
                            })
                        });
                        if (!indexPutRes.ok) {
                             const err = await indexPutRes.json().catch(() => ({}));
                             throw new Error(`Ошибка обновления индекса при удалении: ${err.message || res.statusText}`);
                        }
                    }

                    setPrograms(prev => prev.filter(p => p.id !== activeProgram.id));
                    setActiveId(null);
                    setSyncStatus(s => ({ ...s, deleting: false }));
                    showSuccess("Программа удалена");
                } catch (error) {
                    setSyncStatus(s => ({ ...s, deleting: false, error: error.message }));
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* САЙДБАР */}
                    <div className="w-80 bg-slate-900 text-slate-300 flex flex-col shrink-0">
                        <div className="p-4 bg-slate-950 flex justify-between items-center border-b border-slate-800">
                            <h1 className="text-white font-bold flex items-center gap-2">
                                <Icon name="Dumbbell" size={18} /> CMS Тренировок
                            </h1>
                            <button onClick={() => setShowSettings(true)} className="text-slate-400 hover:text-white transition">
                                <Icon name="Settings" size={18} />
                            </button>
                        </div>
                        
                        <div className="p-4 flex gap-2">
                            <button 
                                onClick={() => {
                                    const newProg = createEmptyProgram();
                                    setPrograms([...programs, newProg]);
                                    setActiveId(newProg.id);
                                }}
                                className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg flex items-center justify-center gap-2 transition text-sm font-semibold shadow-sm"
                            >
                                <Icon name="Plus" size={16} /> Создать
                            </button>
                            <button 
                                onClick={fetchListFromGitHub} 
                                disabled={syncStatus.loadingList}
                                title="Синхронизировать список программ из GitHub"
                                className="bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 px-3 rounded-lg flex items-center justify-center transition disabled:opacity-50"
                            >
                                <Icon name="RefreshCw" size={16} className={syncStatus.loadingList ? "spinner" : ""} />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-2 space-y-1">
                            {programs.map(p => (
                                <div key={p.id} 
                                     onClick={() => selectProgram(p)}
                                     className={`p-3 rounded-lg cursor-pointer transition flex items-center justify-between group ${activeId === p.id ? 'bg-indigo-500/20 border border-indigo-500/30 text-white' : 'hover:bg-slate-800'}`}>
                                    <div className="overflow-hidden">
                                        <div className="font-semibold truncate">{p.title || 'Без названия'}</div>
                                        <div className="text-xs text-slate-500 truncate">{p.filename}</div>
                                    </div>
                                    {!p.exercises && <Icon name="Cloud" size={14} className="text-slate-500 group-hover:text-indigo-400" />}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* РАБОЧАЯ ОБЛАСТЬ */}
                    <div className="flex-1 flex flex-col bg-slate-50 relative">
                        {activeProgram ? (
                            <>
                                <div className="bg-white border-b border-slate-200 p-4 flex justify-between items-center shadow-sm z-10">
                                    <div className="flex flex-col">
                                        <span className="text-sm font-semibold text-slate-500">Редактор программы</span>
                                        <span className="text-xs text-slate-400">ID: {activeProgram.id}</span>
                                    </div>
                                    
                                    <div className="flex items-center gap-3">
                                        {syncStatus.error && <span className="text-red-500 text-sm font-medium">{syncStatus.error}</span>}
                                        {syncStatus.successMessage && <span className="text-emerald-500 text-sm font-medium flex items-center gap-1"><Icon name="CheckCircle" size={16} /> {syncStatus.successMessage}</span>}
                                        
                                        <button 
                                            onClick={syncToGitHub}
                                            disabled={syncStatus.saving || syncStatus.loadingProgram || !activeProgram.exercises}
                                            className="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition disabled:opacity-70"
                                        >
                                            {syncStatus.saving ? <Icon name="Loader2" className="spinner" size={18} /> : <Icon name="Github" size={18} />}
                                            {syncStatus.saving ? 'Сохранение...' : 'Сохранить'}
                                        </button>
                                        
                                        <button 
                                            onClick={deleteFromGitHub} 
                                            disabled={syncStatus.deleting || syncStatus.loadingProgram}
                                            title="Удалить из GitHub"
                                            className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition disabled:opacity-50"
                                        >
                                            {syncStatus.deleting ? <Icon name="Loader2" className="spinner" size={20} /> : <Icon name="Trash2" size={20} />}
                                        </button>
                                    </div>
                                </div>

                                {syncStatus.loadingProgram ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-white">
                                        <Icon name="Loader2" size={48} className="spinner text-indigo-500 mb-4" />
                                        <p className="text-lg font-medium text-slate-600">Загрузка данных из GitHub...</p>
                                    </div>
                                ) : (
                                    <div className="flex-1 overflow-y-auto p-8">
                                        <div className="max-w-4xl mx-auto space-y-6">
                                            
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-700 mb-1">Название программы</label>
                                                    <input type="text" value={activeProgram.title} onChange={e => updateActiveProgram({title: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none font-bold text-lg" placeholder="Например: Фуллбоди с гантелями"/>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-bold text-slate-700 mb-1">Имя файла (для GitHub)</label>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-slate-400 font-mono text-sm">workouts/</span>
                                                            <input type="text" value={activeProgram.filename} onChange={e => updateActiveProgram({filename: e.target.value})} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none font-mono text-sm" placeholder="file_name.json"/>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-700 mb-1">Описание (опционально)</label>
                                                    <textarea value={activeProgram.description} onChange={e => updateActiveProgram({description: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none h-24" placeholder="Краткое описание тренировки..."></textarea>
                                                </div>
                                            </div>

                                            <div className="space-y-4">
                                                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                    <Icon name="ListChecks" size={20} className="text-indigo-500"/> Упражнения
                                                </h3>
                                                
                                                {activeProgram.exercises && activeProgram.exercises.map((ex, idx) => (
                                                    <div key={ex.id} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative group hover:border-indigo-300 transition-colors">
                                                        <div className="absolute top-4 left-4 text-slate-300 font-bold text-xl">{idx + 1}</div>
                                                        <button onClick={() => removeExercise(ex.id)} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">
                                                            <Icon name="X" size={20} />
                                                        </button>
                                                        
                                                        <div className="pl-8 pr-6 space-y-4">
                                                            <input type="text" value={ex.name} onChange={e => updateExercise(ex.id, 'name', e.target.value)} placeholder="Название упражнения" className="w-full text-lg font-bold border-b-2 border-slate-100 pb-1 focus:border-indigo-500 outline-none placeholder-slate-300"/>
                                                            
                                                            <div className="grid grid-cols-3 gap-4">
                                                                <div>
                                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Подходы</label>
                                                                    <input type="number" min="1" value={ex.sets} onChange={e => updateExercise(ex.id, 'sets', e.target.value)} placeholder="Напр: 3" className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 text-sm"/>
                                                                </div>
                                                                <div>
                                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Время на подход (сек)</label>
                                                                    <input type="number" min="0" value={ex.reps} onChange={e => updateExercise(ex.id, 'reps', e.target.value)} placeholder="Напр: 60" className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 text-sm"/>
                                                                </div>
                                                                <div>
                                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Отдых (сек)</label>
                                                                    <input type="number" min="0" value={ex.rest} onChange={e => updateExercise(ex.id, 'rest', e.target.value)} placeholder="Напр: 40" className="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 text-sm"/>
                                                                </div>
                                                            </div>

                                                            <div className="flex items-start gap-2 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
                                                                <Icon name="Volume2" size={18} className="text-indigo-400 mt-1 shrink-0" />
                                                                <textarea value={ex.voiceText} onChange={e => updateExercise(ex.id, 'voiceText', e.target.value)} placeholder="Озвучка (например: 'Приготовьтесь. Держите спину ровно')" className="w-full bg-transparent outline-none resize-none h-10 text-sm text-indigo-900 placeholder-indigo-300"/>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}

                                                <button onClick={addExercise} className="w-full py-4 border-2 border-dashed border-slate-300 text-slate-500 rounded-2xl hover:border-indigo-500 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex justify-center items-center gap-2 font-bold">
                                                    <Icon name="Plus" size={20} /> Добавить упражнение
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                <div className="w-24 h-24 bg-slate-200 rounded-full flex items-center justify-center mb-6 shadow-inner text-slate-300">
                                    <Icon name="FileJson" size={40} />
                                </div>
                                <p className="text-xl font-bold text-slate-600">Выберите или скачайте программу</p>
                                <p className="text-sm mt-2 max-w-sm text-center">Используйте кнопку обновления слева для загрузки списка из GitHub, либо создайте новую.</p>
                            </div>
                        )}
                    </div>

                    {/* МОДАЛЬНОЕ ОКНО НАСТРОЕК GITHUB */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center">
                            <div className="bg-white rounded-2xl shadow-xl w-[400px] overflow-hidden">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold flex items-center gap-2"><Icon name="Github" size={18}/> Настройки синхронизации</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-700"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Owner (Владелец репозитория)</label>
                                        <input type="text" value={ghConfig.owner} onChange={e => setGhConfig({...ghConfig, owner: e.target.value})} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 font-mono text-sm" placeholder="Напр: kutya001"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Repo (Название репозитория)</label>
                                        <input type="text" value={ghConfig.repo} onChange={e => setGhConfig({...ghConfig, repo: e.target.value})} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 font-mono text-sm" placeholder="Напр: mcgill"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Personal Access Token (PAT)</label>
                                        <input type="password" value={ghConfig.token} onChange={e => setGhConfig({...ghConfig, token: e.target.value})} className="w-full p-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 font-mono text-sm" placeholder="ghp_xxxxxxxxxxxxxxxxx"/>
                                        <p className="text-xs text-slate-400 mt-1">Токен должен иметь права "repo". Сохраняется только в вашем браузере.</p>
                                    </div>
                                    
                                    {/* БЛОК ПРОВЕРКИ СОЕДИНЕНИЯ */}
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 mt-2">
                                        <button 
                                            onClick={testConnection}
                                            disabled={testStatus.loading}
                                            className="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-700 py-2 rounded-lg font-semibold text-sm transition flex items-center justify-center gap-2 disabled:opacity-50"
                                        >
                                            {testStatus.loading ? <Icon name="Loader2" size={16} className="spinner" /> : <Icon name="Wifi" size={16} />}
                                            Проверить соединение
                                        </button>
                                        {testStatus.message && (
                                            <p className={`text-xs mt-2 text-center font-medium ${testStatus.isError ? 'text-red-500' : 'text-emerald-600'}`}>
                                                {testStatus.message}
                                            </p>
                                        )}
                                    </div>

                                    <button 
                                        onClick={() => {
                                            localStorage.setItem('gh_config', JSON.stringify(ghConfig));
                                            setShowSettings(false);
                                        }}
                                        className="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-bold transition mt-4"
                                    >
                                        Сохранить и закрыть
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
