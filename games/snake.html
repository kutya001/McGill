<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Вертикальная Неоновая Змейка</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
  
  :root {
    --bg: #050508;
    --ui-bg: rgba(10, 10, 15, 0.85);
    --primary: #00e5a0;
    --food: #ff8c42;
    --danger: #ff4466;
    --wall: #5b8cff;
    --text: #f0f0f8;
    --text-dim: #8888aa;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100dvh; overflow: hidden;
  }

  #game-container {
    position: relative; width: 100%; max-width: 500px; height: 100%;
    display: flex; flex-direction: column;
    box-shadow: 0 0 40px rgba(0, 229, 160, 0.05);
  }

  canvas { display: block; width: 100%; height: 100%; background: var(--bg); }

  /* --- HUD --- */
  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 15px 20px; pointer-events: none; z-index: 10;
  }

  .hud-box { display: flex; flex-direction: column; }
  .hud-val { font-size: 2rem; font-weight: 800; line-height: 1; text-shadow: 0 0 10px currentColor; color: var(--primary); transition: transform 0.1s;}
  .hud-lbl { font-size: 0.6rem; letter-spacing: 0.1em; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; }
  .hud-center { text-align: center; }
  .hud-center .hud-val { color: #fff; font-size: 1.2rem; }
  .hud-right { align-items: flex-end; }
  .hud-right .hud-val { color: var(--food); font-size: 1.5rem; }

  /* --- OVERLAYS --- */
  .overlay {
    position: absolute; inset: 0; background: var(--ui-bg); backdrop-filter: blur(6px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }

  .menu-title {
    font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; text-align: center;
    background: linear-gradient(90deg, #00e5a0, #5b8cff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(0,229,160,0.3));
  }
  .menu-subtitle { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 30px; text-align: center; max-width: 80%; line-height: 1.5; }

  .btn {
    background: transparent; color: #fff; border: 2px solid var(--primary);
    padding: 14px 40px; border-radius: 12px; font-size: 1rem; font-weight: 700;
    font-family: inherit; cursor: pointer; margin-bottom: 15px; width: 80%; max-width: 250px;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em; position: relative; overflow: hidden;
  }
  .btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.5s;
  }
  .btn:hover::before { left: 100%; }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 229, 160, 0.4); }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(255,68,102,0.1); }

  #btn-pause {
    position: absolute; bottom: 20px; right: 20px; width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 20; backdrop-filter: blur(4px);
  }

  .swipe-hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: var(--text-dim); font-size: 0.7rem; pointer-events: none; z-index: 5;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

  #game-container::after {
    content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 15; background-size: 100% 4px, 6px 100%; pointer-events: none; mix-blend-mode: overlay;
  }
</style>
</head>
<body>

<div id="game-container">
  <div class="hud" id="hud" style="display:none;">
    <div class="hud-box">
      <div class="hud-val" id="score-val">0</div>
      <div class="hud-lbl">СЧЁТ</div>
    </div>
    <div class="hud-box hud-center">
      <div class="hud-val" id="lvl-val">УР 1</div>
      <div class="hud-lbl" id="lvl-desc">Обучение</div>
    </div>
    <div class="hud-box hud-right">
      <div class="hud-val" id="target-val">/ 5</div>
      <div class="hud-lbl">ЦЕЛЬ</div>
    </div>
  </div>

  <button id="btn-pause" style="display:none;">⏸</button>
  <div class="swipe-hint" id="swipe-hint" style="display:none;">[ СВАЙПАЙ ДЛЯ УПРАВЛЕНИЯ ]</div>

  <canvas id="c"></canvas>

  <!-- Menus -->
  <div class="overlay active" id="menu-main">
    <div class="menu-title">NEON SNAKE</div>
    <div class="menu-subtitle">Свайпай в нужную сторону.<br>Избегай красных и синих стен.</div>
    <button class="btn btn-primary" id="btn-campaign">Кампания</button>
    <button class="btn" id="btn-endless">Бесконечный</button>
  </div>

  <div class="overlay" id="menu-pause">
    <div class="menu-title" style="color:#fff;">ПАУЗА</div>
    <button class="btn btn-primary" id="btn-resume">Продолжить</button>
    <button class="btn btn-danger" id="btn-quit">В меню</button>
  </div>

  <div class="overlay" id="menu-level-up">
    <div class="menu-title" style="color:var(--primary);">УРОВЕНЬ ПРОЙДЕН!</div>
    <div class="menu-subtitle" id="lvl-stats">Змея растет, сложность повышается.</div>
    <button class="btn btn-primary" id="btn-next-level">Следующий</button>
  </div>

  <div class="overlay" id="menu-game-over">
    <div class="menu-title" style="color:var(--danger);" id="go-title">ВЫ ПОГИБЛИ</div>
    <div class="menu-subtitle" id="go-desc">Вы врезались.</div>
    <button class="btn btn-primary" id="btn-restart">Повторить</button>
    <button class="btn btn-danger" id="btn-go-menu">В меню</button>
  </div>
</div>

<script>
/**
 * AUDIO SYSTEM
 */
const AudioSys = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
  playTone(freq, type, duration, vol=0.5, slideFreq=null) {
    if(!this.ctx) return; const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
    const now = this.ctx.currentTime; osc.frequency.setValueAtTime(freq, now);
    if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, now + duration);
    gain.gain.setValueAtTime(vol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
    osc.start(now); osc.stop(now + duration);
  },
  playNoise(duration, vol=0.5) {
    if(!this.ctx) return; const bufferSize = this.ctx.sampleRate * duration, buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate), data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
    const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
    const gain = this.ctx.createGain(); gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
    noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); noise.start();
  },
  sfx: {
    eat: () => AudioSys.playTone(600, 'sine', 0.1, 0.4, 1200),
    turn: () => AudioSys.playTone(300, 'triangle', 0.05, 0.1),
    die: () => { AudioSys.playNoise(0.5, 0.5); AudioSys.playTone(150, 'sawtooth', 0.5, 0.5, 50); },
    win: () => { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => AudioSys.playTone(f, 'square', 0.15, 0.3), i*100)); }
  }
};
const vibrate = ms => navigator.vibrate && navigator.vibrate(ms);

/**
 * GAME CONFIG & LEVELS
 */
const Levels = [
  { name: "УР 1", desc: "Обучение", target: 5, speed: 180, walls: [] },
  { name: "УР 2", desc: "Разгон", target: 10, speed: 150, walls: [] },
  { name: "УР 3", desc: "Преграды", target: 15, speed: 140, walls: [{x: 'center', y: 'center', w: 1, h: 5}] },
  { name: "УР 4", desc: "Тоннель", target: 20, speed: 130, walls: [{x: 2, y: 'center', w: 1, h: 10}, {x: -3, y: 'center', w: 1, h: 10}] },
  { name: "УР 5", desc: "Крест", target: 25, speed: 120, walls: [{x: 'center', y: 'center', w: 7, h: 1}, {x: 'center', y: 'center', w: 1, h: 7}] },
  { name: "УР 6", desc: "Углы", target: 30, speed: 110, walls: [{x: 0, y: 0, w: 4, h: 1}, {x: 0, y: 0, w: 1, h: 4}, {x: -4, y: -1, w: 4, h: 1}, {x: -1, y: -4, w: 1, h: 4}] },
  { name: "УР 7", desc: "Лабиринт", target: 35, speed: 100, walls: [{x: 3, y: 5, w: 10, h: 1}, {x: -13, y: 15, w: 10, h: 1}] },
  { name: "УР 8", desc: "Скорость", target: 40, speed: 80, walls: [{x: 'center', y: 'center', w: 3, h: 3}] },
  { name: "УР 9", desc: "Коробка", target: 45, speed: 75, walls: [{x: 2, y: 2, w: 1, h: 15}, {x: -3, y: 2, w: 1, h: 15}, {x: 2, y: 2, w: 10, h: 1}, {x: 2, y: -3, w: 10, h: 1}] },
  { name: "УР 10", desc: "ФИНАЛ", target: 50, speed: 70, walls: [{x: 'center', y: 'center', w: 5, h: 5}, {x: 2, y: 'center', w: 1, h: 8}, {x: -3, y: 'center', w: 1, h: 8}] }
];

/**
 * ENTITIES
 */
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const a = Math.random() * Math.PI * 2, s = Math.random() * 4 + 1;
    this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
    this.life = 1; this.decay = Math.random() * 0.05 + 0.02;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, 3 * this.life, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
  }
}

/**
 * ENGINE
 */
const Game = {
  canvas: document.getElementById('c'),
  ctx: document.getElementById('c').getContext('2d'),
  ui: {
    hud: document.getElementById('hud'), scoreVal: document.getElementById('score-val'),
    lvlVal: document.getElementById('lvl-val'), lvlDesc: document.getElementById('lvl-desc'), targetVal: document.getElementById('target-val'),
    menus: { main: document.getElementById('menu-main'), pause: document.getElementById('menu-pause'), levelUp: document.getElementById('menu-level-up'), gameOver: document.getElementById('menu-game-over') },
    btnPause: document.getElementById('btn-pause'), swipeHint: document.getElementById('swipe-hint')
  },
  
  state: 'MENU', mode: 'CAMPAIGN', levelIdx: 0,
  cell: 20, cols: 0, rows: 0, offsetX: 0, offsetY: 0,
  
  snake: [], dir: {x:1, y:0}, inputQueue: [],
  food: {x:0, y:0}, walls: [], particles: [],
  score: 0, target: 0, speed: 150, lastTick: 0, foodAngle: 0, shakeAmt: 0,

  resize() {
    const W = this.canvas.parentElement.clientWidth, H = this.canvas.parentElement.clientHeight;
    this.canvas.width = W; this.canvas.height = H;
    this.cols = Math.floor(W / this.cell); this.rows = Math.floor(H / this.cell);
    this.offsetX = (W - this.cols * this.cell) / 2;
    this.offsetY = (H - this.rows * this.cell) / 2;
  },

  init() {
    window.addEventListener('resize', () => this.resize()); this.resize();
    
    // Inputs
    let sx, sy;
    this.canvas.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive: true});
    this.canvas.addEventListener('touchend', e => {
      if(this.state !== 'PLAYING') return;
      const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > Math.abs(dy)) {
        if(dx > 30) this.queueInput({x: 1, y: 0}); else if(dx < -30) this.queueInput({x: -1, y: 0});
      } else {
        if(dy > 30) this.queueInput({x: 0, y: 1}); else if(dy < -30) this.queueInput({x: 0, y: -1});
      }
    }, {passive: true});

    document.addEventListener('keydown', e => {
      if(e.code === 'Escape' && (this.state === 'PLAYING' || this.state === 'PAUSED')) {
        if(this.state === 'PLAYING') {
          this.state = 'PAUSED';
          this.showMenu('pause');
        } else {
          this.state = 'PLAYING';
          this.hideMenus();
        }
      }

      if(this.state !== 'PLAYING') return;
      if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') this.queueInput({x: 0, y: -1});
      if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') this.queueInput({x: 0, y: 1});
      if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.queueInput({x: -1, y: 0});
      if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.queueInput({x: 1, y: 0});
    });

    document.getElementById('btn-campaign').onclick = () => { AudioSys.init(); this.mode = 'CAMPAIGN'; this.levelIdx = 0; this.startLevel(); };
    document.getElementById('btn-endless').onclick = () => { AudioSys.init(); this.mode = 'ENDLESS'; this.levelIdx = 0; this.startLevel(); };
    this.ui.btnPause.onclick = () => { this.state = 'PAUSED'; this.showMenu('pause'); };
    document.getElementById('btn-resume').onclick = () => { this.state = 'PLAYING'; this.hideMenus(); };
    document.getElementById('btn-quit').onclick = () => { this.state = 'MENU'; this.showMenu('main'); };
    document.getElementById('btn-go-menu').onclick = () => { this.state = 'MENU'; this.showMenu('main'); };
    document.getElementById('btn-restart').onclick = () => this.startLevel();
    document.getElementById('btn-next-level').onclick = () => {
      this.levelIdx++;
      if (this.levelIdx >= Levels.length) { document.getElementById('go-title').textContent = "ПОБЕДА!"; document.getElementById('go-desc').textContent = "Кампания пройдена!"; document.getElementById('btn-restart').style.display = 'none'; this.showMenu('gameOver'); }
      else this.startLevel();
    };

    requestAnimationFrame(t => this.loop(t));
  },

  showMenu(id) {
    Object.values(this.ui.menus).forEach(m => m.classList.remove('active'));
    this.ui.menus[id].classList.add('active');
    if(id === 'main') { this.ui.hud.style.display = 'none'; this.ui.btnPause.style.display = 'none'; this.ui.swipeHint.style.display = 'none'; }
  },
  hideMenus() {
    Object.values(this.ui.menus).forEach(m => m.classList.remove('active'));
    this.ui.hud.style.display = 'flex'; this.ui.btnPause.style.display = 'block'; this.ui.swipeHint.style.display = 'block';
  },

  queueInput(newDir) {
    const lastDir = this.inputQueue.length > 0 ? this.inputQueue[this.inputQueue.length-1] : this.dir;
    if (newDir.x !== -lastDir.x && newDir.y !== -lastDir.y) {
      this.inputQueue.push(newDir);
      AudioSys.sfx.turn();
    }
  },

  startLevel() {
    this.hideMenus(); document.getElementById('btn-restart').style.display = 'block';
    this.score = 0; this.inputQueue = []; this.particles = []; this.shakeAmt = 0;
    
    const cx = Math.floor(this.cols/2), cy = Math.floor(this.rows/2);
    this.snake = [{x:cx, y:cy}, {x:cx, y:cy+1}, {x:cx, y:cy+2}];
    this.dir = {x:0, y:-1};

    const cfg = Levels[Math.min(this.levelIdx, Levels.length-1)];
    this.target = this.mode === 'ENDLESS' ? Infinity : cfg.target;
    this.speed = cfg.speed;
    
    this.ui.lvlVal.textContent = this.mode === 'ENDLESS' ? "БЕСКОН" : cfg.name;
    this.ui.lvlDesc.textContent = this.mode === 'ENDLESS' ? "Выживание" : cfg.desc;
    this.ui.targetVal.textContent = this.mode === 'ENDLESS' ? "∞" : `/ ${this.target}`;
    
    this.buildWalls(cfg.walls);
    this.spawnFood();
    this.updateHUD();
    
    this.state = 'PLAYING';
    this.lastTick = performance.now();
  },

  buildWalls(wallsCfg) {
    this.walls = [];
    if(this.mode === 'ENDLESS') return; // No walls in endless, just speed
    wallsCfg.forEach(w => {
      let wx = w.x === 'center' ? Math.floor(this.cols/2) - Math.floor(w.w/2) : (w.x < 0 ? this.cols + w.x : w.x);
      let wy = w.y === 'center' ? Math.floor(this.rows/2) - Math.floor(w.h/2) : (w.y < 0 ? this.rows + w.y : w.y);
      for(let i=0; i<w.w; i++) for(let j=0; j<w.h; j++) this.walls.push({x: wx+i, y: wy+j});
    });
  },

  spawnFood() {
    let valid = false;
    while(!valid) {
      this.food = { x: Math.floor(Math.random()*this.cols), y: Math.floor(Math.random()*this.rows) };
      valid = !this.snake.some(s => s.x === this.food.x && s.y === this.food.y) && !this.walls.some(w => w.x === this.food.x && w.y === this.food.y);
    }
  },

  spawnParticles(x, y, color, count=15) {
    const px = this.offsetX + x*this.cell + this.cell/2, py = this.offsetY + y*this.cell + this.cell/2;
    for(let i=0; i<count; i++) this.particles.push(new Particle(px, py, color));
  },

  updateHUD() {
    this.ui.scoreVal.textContent = this.score;
    this.ui.scoreVal.style.transform = 'scale(1.4)';
    setTimeout(()=>this.ui.scoreVal.style.transform = 'scale(1)', 150);
  },

  tick() {
    if (this.inputQueue.length > 0) this.dir = this.inputQueue.shift();
    
    const head = { x: this.snake[0].x + this.dir.x, y: this.snake[0].y + this.dir.y };

    // Screen wrap
    if (head.x < 0) head.x = this.cols - 1; else if (head.x >= this.cols) head.x = 0;
    if (head.y < 0) head.y = this.rows - 1; else if (head.y >= this.rows) head.y = 0;

    // Collisions
    if (this.snake.some(s => s.x === head.x && s.y === head.y) || this.walls.some(w => w.x === head.x && w.y === head.y)) {
      this.die(); return;
    }

    this.snake.unshift(head);

    if (head.x === this.food.x && head.y === this.food.y) {
      this.score++; this.updateHUD();
      this.spawnParticles(this.food.x, this.food.y, 'var(--food)');
      AudioSys.sfx.eat(); vibrate(15); this.shakeAmt = 3;
      
      if (this.mode === 'ENDLESS') this.speed = Math.max(50, this.speed - 2); // Endless speedup
      
      if (this.mode === 'CAMPAIGN' && this.score >= this.target) { this.levelComplete(); return; }
      else this.spawnFood();
    } else {
      this.snake.pop();
    }
  },

  die() {
    this.state = 'TRANSITION'; AudioSys.sfx.die(); vibrate([50,50,50]);
    this.shakeAmt = 20; this.spawnParticles(this.snake[0].x, this.snake[0].y, 'var(--danger)', 40);
    setTimeout(() => {
      document.getElementById('go-title').textContent = "ВЫ ПОГИБЛИ";
      document.getElementById('go-desc').textContent = `Счёт: ${this.score}`;
      this.showMenu('gameOver');
    }, 800);
  },

  levelComplete() {
    this.state = 'TRANSITION'; AudioSys.sfx.win();
    document.getElementById('lvl-stats').textContent = `Счёт: ${this.score}. Отличная реакция!`;
    this.showMenu('levelUp');
  },

  loop(ts) {
    requestAnimationFrame(t => this.loop(t));
    if (this.state !== 'PLAYING' && this.state !== 'TRANSITION') return;

    // Particles & Animations
    this.foodAngle += 0.1;
    if(this.shakeAmt > 0) this.shakeAmt *= 0.9;
    this.particles.forEach(p => p.update());
    this.particles = this.particles.filter(p => p.life > 0);

    // Game Logic
    if (this.state === 'PLAYING' && ts - this.lastTick > this.speed) {
      this.lastTick = ts; this.tick();
    }

    this.draw();
  },

  draw() {
    this.ctx.fillStyle = 'rgba(5, 5, 8, 1)'; this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.save();
    
    if (this.shakeAmt > 0.5) this.ctx.translate((Math.random()-0.5)*this.shakeAmt, (Math.random()-0.5)*this.shakeAmt);
    this.ctx.translate(this.offsetX, this.offsetY);

    // Grid (Subtle)
    this.ctx.strokeStyle = 'rgba(255,255,255,0.02)'; this.ctx.lineWidth = 1; this.ctx.beginPath();
    for(let i=0; i<=this.cols; i++) { this.ctx.moveTo(i*this.cell, 0); this.ctx.lineTo(i*this.cell, this.rows*this.cell); }
    for(let i=0; i<=this.rows; i++) { this.ctx.moveTo(0, i*this.cell); this.ctx.lineTo(this.cols*this.cell, i*this.cell); }
    this.ctx.stroke();

    // Walls
    this.ctx.shadowBlur = 10; this.ctx.shadowColor = 'var(--wall)'; this.ctx.fillStyle = 'var(--wall)';
    this.walls.forEach(w => { this.ctx.beginPath(); this.ctx.roundRect(w.x*this.cell+1, w.y*this.cell+1, this.cell-2, this.cell-2, 4); this.ctx.fill(); });
    this.ctx.shadowBlur = 0;

    // Food
    this.ctx.shadowBlur = 15; this.ctx.shadowColor = 'var(--food)'; this.ctx.fillStyle = 'var(--food)';
    this.ctx.beginPath();
    const fr = (this.cell/2 - 2) + Math.sin(this.foodAngle)*2;
    this.ctx.arc(this.food.x*this.cell + this.cell/2, this.food.y*this.cell + this.cell/2, fr, 0, Math.PI*2); this.ctx.fill();
    this.ctx.shadowBlur = 0;

    // Snake
    this.snake.forEach((s, i) => {
      const isHead = i === 0;
      this.ctx.fillStyle = isHead ? 'var(--primary)' : `rgba(0, 229, 160, ${Math.max(0.3, 1 - i/this.snake.length)})`;
      if (isHead) {
        this.ctx.shadowBlur = 15; this.ctx.shadowColor = 'var(--primary)';
        this.ctx.beginPath(); this.ctx.roundRect(s.x*this.cell, s.y*this.cell, this.cell, this.cell, 6); this.ctx.fill();
        this.ctx.shadowBlur = 0;
        // Eyes
        this.ctx.fillStyle = '#000';
        const ew = 4, eh = 4, off = 4;
        if(this.dir.x===1) { this.ctx.fillRect(s.x*this.cell+12, s.y*this.cell+off, ew, eh); this.ctx.fillRect(s.x*this.cell+12, s.y*this.cell+12, ew, eh); }
        else if(this.dir.x===-1) { this.ctx.fillRect(s.x*this.cell+off, s.y*this.cell+off, ew, eh); this.ctx.fillRect(s.x*this.cell+off, s.y*this.cell+12, ew, eh); }
        else if(this.dir.y===1) { this.ctx.fillRect(s.x*this.cell+off, s.y*this.cell+12, ew, eh); this.ctx.fillRect(s.x*this.cell+12, s.y*this.cell+12, ew, eh); }
        else { this.ctx.fillRect(s.x*this.cell+off, s.y*this.cell+off, ew, eh); this.ctx.fillRect(s.x*this.cell+12, s.y*this.cell+off, ew, eh); }
      } else {
        this.ctx.beginPath(); this.ctx.roundRect(s.x*this.cell+1, s.y*this.cell+1, this.cell-2, this.cell-2, 4); this.ctx.fill();
      }
    });

    this.ctx.restore();

    // Particles (Absolute coords)
    this.particles.forEach(p => p.draw(this.ctx));
  }
};

window.onload = () => Game.init();
</script>
</body>
</html>
