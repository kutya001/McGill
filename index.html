<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuApp</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Manrope:wght@400;500;700;800&display=swap');

        :root {
            --bg:#0a0a0f;--surface:#111118;--surface-2:#1a1a24;--surface-3:#22222f;
            --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.15);
            --text:#f0f0f8;--text-2:#8888aa;--text-3:#44445a;
            --c-work:#00e5a0;--c-rest:#ff8c42;--c-prep:#5b8cff;--c-finish:#ffd700;--c-danger:#ff4466;
            --radius:14px;--radius-sm:8px;--accent:var(--c-prep);--header-h:54px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

        /* ── VIEWS ── */
        .view{display:none;flex:1;overflow:hidden;flex-direction:column}.view.active{display:flex}

        /* ── AUTH SCREENS ── */
        .auth-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
        .auth-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border-hi);border-radius:var(--radius);padding:30px 28px;display:flex;flex-direction:column;gap:18px}
        .auth-logo{text-align:center}
        .auth-logo-icon{font-size:3rem;line-height:1;margin-bottom:8px}
        .auth-logo-name{font-size:1.4rem;font-weight:800}
        .auth-logo-sub{font-size:.75rem;color:var(--text-2);margin-top:4px;font-family:'JetBrains Mono',monospace}
        .inp-group{display:flex;flex-direction:column;gap:6px}
        .inp-label{font-size:.78rem;color:var(--text-2);font-weight:600}
        .inp-field{width:100%;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);color:var(--text);font-family:'Manrope',sans-serif;font-size:.88rem;outline:none;transition:border-color .15s}
        .inp-field:focus{border-color:var(--c-prep)}
        .inp-ta{resize:vertical;min-height:90px;font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.5}
        .btn-primary{width:100%;padding:12px;background:var(--c-prep);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .15s}
        .btn-primary:hover{opacity:.88}
        .btn-secondary{width:100%;padding:12px;background:transparent;border:1px solid var(--border-hi);color:var(--text-2);border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .15s}
        .btn-secondary:hover{background:var(--surface-2)}
        .auth-err{font-size:.8rem;color:var(--c-danger);min-height:18px}
        .auth-link{font-size:.8rem;color:var(--c-prep);cursor:pointer;background:none;border:none;font-family:'Manrope',sans-serif;text-align:center}
        .auth-link:hover{text-decoration:underline}
        .auth-sep{height:1px;background:var(--border)}

        /* ── PLATFORM LAYOUT ── */
        .plat-layout{display:flex;flex:1;overflow:hidden}
        .sidebar{display:none;width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);flex-direction:column}
        .side-brand{padding:18px 16px;font-weight:800;font-size:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
        .side-brand-icon{font-size:1.3rem}
        .side-nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
        .side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-2);font:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;width:100%}
        .side-item:hover{background:var(--surface-2);color:var(--text)}
        .side-item.active{background:rgba(91,140,255,.12);color:var(--c-prep);font-weight:600}
        .side-item .ico{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0}
        .side-sep{height:1px;background:var(--border);margin:6px 12px}
        .side-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
        .side-user{flex:1;font-size:.72rem;color:var(--text-2);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        .plat-main{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
        .plat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;height:var(--header-h);z-index:10}
        .plat-title{flex:1;font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .hdr-user{font-size:.72rem;color:var(--text-2);font-family:'JetBrains Mono',monospace;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .btn-icon{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-hi);background:var(--surface-2);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
        .btn-icon:hover{background:var(--surface-3);color:var(--text)}
        .btn-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

        /* ── TAB PANELS ── */
        .tab-panel{display:none;flex:1;overflow:hidden;flex-direction:column}
        .tab-panel.active{display:flex}
        .tab-scroll{flex:1;overflow-y:auto;padding:0}

        /* ── BOTTOM NAV (mobile) ── */
        .bnav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding:4px 0;padding-bottom:max(4px,env(safe-area-inset-bottom))}
        .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-3);font-size:.58rem;font-family:inherit;padding:6px 0;cursor:pointer;transition:color .2s;letter-spacing:.02em}
        .bnav-item .ico{font-size:1.2rem;line-height:1}
        .bnav-item.active{color:var(--c-prep)}

        @media(min-width:768px){
            .sidebar{display:flex}
            .bnav{display:none}
            .mob-only{display:none!important}
        }
        @media(min-width:1200px){
            .sidebar{width:260px}
        }

        /* ── APPS GRID ── */
        #apps-search-bar{padding:10px 16px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
        .search-input{width:100%;padding:9px 12px 9px 36px;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);color:var(--text);font-family:'Manrope',sans-serif;font-size:.85rem;outline:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238888aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:10px center;transition:border-color .15s}
        .search-input:focus{border-color:var(--c-prep)}
        #apps-scroll{flex:1;overflow-y:auto;padding:12px 12px 24px}
        .app-category{margin-bottom:20px}
        .app-cat-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);font-family:'JetBrains Mono',monospace;padding:0 4px 8px}
        .apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
        .app-tile{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px 12px;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;user-select:none;position:relative;overflow:hidden}
        .app-tile::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(91,140,255,.06),transparent 70%);opacity:0;transition:opacity .2s}
        .app-tile:hover{background:var(--surface-3);border-color:var(--border-hi);transform:translateY(-1px)}
        .app-tile:hover::before{opacity:1}
        .app-tile:active{transform:scale(.97)}
        .app-tile-icon{font-size:2rem;line-height:1}
        .app-tile-name{font-size:.78rem;font-weight:700;color:var(--text);line-height:1.3}
        .app-tile-desc{font-size:.66rem;color:var(--text-3);line-height:1.4;display:none}
        .app-tile-time{font-size:.58rem;color:var(--text-3);font-family:'JetBrains Mono',monospace}
        .app-tile-play{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(91,140,255,.15);border:1px solid rgba(91,140,255,.3);color:var(--c-prep);margin-top:2px}
        .app-tile-play svg{width:10px;height:10px;fill:currentColor;stroke:none}
        @media(min-width:600px){
            .apps-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
            .app-tile{padding:18px 14px 14px;gap:8px}
            .app-tile-icon{font-size:2.4rem}
            .app-tile-name{font-size:.82rem}
            .app-tile-desc{display:block}
            #apps-scroll{padding:16px 16px 32px}
        }

        /* ── PANEL SECTIONS ── */
        .panel-sec{padding:14px 18px;border-bottom:1px solid var(--border)}
        .panel-sec h3{font-size:.72rem;font-weight:700;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
        .panel-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:.82rem;color:var(--text-2)}
        .panel-badge{font-size:.7rem;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:4px;padding:2px 8px;color:var(--text);font-family:'JetBrains Mono',monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .panel-btn{width:100%;padding:10px 14px;margin-top:8px;border-radius:var(--radius-sm);border:1px solid var(--border-hi);background:var(--surface-2);color:var(--text);font:inherit;font-size:.82rem;font-weight:600;cursor:pointer;text-align:left;transition:background .15s;display:block}
        .panel-btn:hover{background:var(--surface-3)}
        .panel-btn.accent{background:rgba(91,140,255,.12);color:var(--c-prep);border-color:rgba(91,140,255,.3)}
        .panel-btn.danger{color:var(--c-danger);border-color:rgba(255,68,102,.3)}

        /* ── DATA TABLE ── */
        .table-scroll{overflow-x:auto}
        .data-table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:480px}
        .data-table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-3);font-size:.63rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
        .data-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-2)}
        .data-table td.nowrap{white-space:nowrap}
        .data-table td.ellipsis{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .data-table tr:hover td{background:var(--surface-2)}

        /* ── ADMIN USERS ── */
        .users-list{display:flex;flex-direction:column;gap:6px}
        .user-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.82rem;flex-wrap:wrap}
        .u-email{font-weight:600;flex:1;min-width:120px}
        .u-role{font-size:.65rem;background:var(--surface-3);padding:2px 8px;border-radius:4px;color:var(--text-2)}
        .u-role.admin{background:rgba(91,140,255,.15);color:var(--c-prep)}
        .u-meta{width:100%;font-size:.65rem;color:var(--text-3);margin-top:2px}
        .u-actions{display:flex;gap:4px}
        .u-actions button{padding:4px 10px;border-radius:4px;border:1px solid var(--border-hi);background:var(--surface-3);color:var(--text-2);font:inherit;font-size:.72rem;cursor:pointer;transition:background .15s}
        .u-actions button:hover{background:var(--surface-2);color:var(--text)}

        /* ── LOGS FILTERS ── */
        .logs-filters{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
        .logs-filters select{padding:8px 12px;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);color:var(--text);font:inherit;font-size:.82rem;outline:none;flex:1;min-width:120px}
        .logs-info{padding:6px 16px;font-size:.68rem;color:var(--text-3)}

        /* ── LEADERBOARD ── */
        .board-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
        .board-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
        .board-item.self{border-color:var(--c-prep);background:rgba(91,140,255,.06)}
        .board-head{display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:background .15s}
        .board-head:hover{background:var(--surface-3)}
        .board-pos{width:30px;height:30px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}
        .board-pos.top1{background:var(--c-finish);color:#000}
        .board-pos.top2{background:#b0b0b0;color:#000}
        .board-pos.top3{background:#cd7f32;color:#fff}
        .board-info{flex:1;min-width:0}
        .board-name{font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .board-meta{font-size:.65rem;color:var(--text-3);margin-top:2px}
        .board-time{font-size:1rem;font-weight:800;color:var(--c-prep);flex-shrink:0;text-align:right}
        .board-time small{font-size:.6rem;font-weight:400;color:var(--text-2)}
        .board-expand{display:none;padding:0 12px 12px;border-top:1px solid var(--border);margin-top:0}
        .board-expand.open{display:block}
        .board-app-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.78rem;color:var(--text-2);border-bottom:1px solid var(--border)}
        .board-app-row:last-child{border-bottom:none}
        .role-tag{font-size:.55rem;background:rgba(91,140,255,.15);color:var(--c-prep);padding:1px 6px;border-radius:3px;vertical-align:middle;margin-left:4px}
        .empty-state{padding:40px 20px;text-align:center;color:var(--text-2);font-size:.85rem}
        .empty-ico{font-size:2rem;margin-bottom:8px}

        /* ── STAT CARDS ── */
        .stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:12px 16px}
        .stat-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
        .stat-card-val{font-size:1.3rem;font-weight:800;color:var(--c-prep)}
        .stat-card-lbl{font-size:.65rem;color:var(--text-3);margin-top:3px}

        /* ── SETTINGS SUB-TABS ── */
        .sett-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .sett-tab{padding:10px 14px;font-size:.78rem;font-weight:600;color:var(--text-3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:inherit}
        .sett-tab:hover{color:var(--text-2)}
        .sett-tab.active{color:var(--c-prep);border-bottom-color:var(--c-prep)}

        /* ── CACHE EDITOR ── */
        .cache-list{display:flex;flex-direction:column;gap:4px;padding:12px 16px}
        .cache-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.78rem;cursor:pointer;transition:background .15s}
        .cache-item:hover{background:var(--surface-3)}
        .cache-key{flex:1;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .cache-size{font-size:.62rem;color:var(--text-3);font-family:'JetBrains Mono',monospace;flex-shrink:0}
        .cache-edit{display:flex;flex-direction:column;gap:8px;padding:12px 16px}
        .cache-edit-ta{width:100%;min-height:200px;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.5;padding:10px;resize:vertical;outline:none}
        .cache-edit-ta:focus{border-color:var(--c-prep)}
        .cache-actions{display:flex;gap:8px;flex-wrap:wrap}
        .cache-btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border-hi);background:var(--surface-2);color:var(--text);font:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
        .cache-btn:hover{background:var(--surface-3)}
        .cache-btn.pr{background:var(--c-prep);border-color:var(--c-prep);color:#fff}
        .cache-btn.dn{color:var(--c-danger);border-color:rgba(255,68,102,.3)}

        /* ── DATA BROWSER ── */
        .data-sheets{display:flex;flex-direction:column;gap:4px;padding:12px 16px}
        .data-sheet-group{margin-bottom:12px}
        .data-sheet-group-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);padding:0 0 6px;font-family:'JetBrains Mono',monospace}
        .data-sheet-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.82rem;transition:all .15s;margin-bottom:4px}
        .data-sheet-item:hover{background:var(--surface-3);border-color:var(--border-hi)}
        .data-sheet-item .ico{flex-shrink:0}
        .data-sheet-name{flex:1;font-weight:600}
        .data-sheet-arrow{color:var(--text-3);flex-shrink:0}
        .data-back{display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:.82rem;font-weight:600;color:var(--c-prep);cursor:pointer;border-bottom:1px solid var(--border)}
        .data-back:hover{background:var(--surface-2)}
        .data-toolbar{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
        .data-toolbar .cache-btn{padding:6px 12px;font-size:.72rem}
        .data-cell-edit{background:var(--surface-2);border:1px solid var(--c-prep);border-radius:2px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:4px 6px;width:100%;min-width:60px;outline:none}

        /* ── DEV GUIDE ── */
        .devguide{padding:16px;font-size:.78rem;line-height:1.7;color:var(--text-2)}
        .devguide pre{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;overflow-x:auto;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:.68rem;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word}
        .devguide h4{color:var(--text);font-size:.85rem;margin:14px 0 6px}
        .devguide code{background:var(--surface-2);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.72rem}
        .copy-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);background:var(--c-prep);color:#fff;border:none;font:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin:8px 0}
        .copy-btn:hover{opacity:.85}

        /* ── IMMERSIVE CONTAINER ── */
        #immersive-container{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg)}
        #app-iframe{width:100%;height:100%;border:none;display:block}
        #btn-float-back{position:absolute;top:max(16px,env(safe-area-inset-top));left:16px;width:44px;height:44px;border-radius:50%;background:rgba(17,17,24,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:var(--text);font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10000;transition:background .2s,transform .1s;box-shadow:0 4px 12px rgba(0,0,0,.5)}
        #btn-float-back:active{transform:scale(.92)}

        /* ── TOAST ── */
        #toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--surface-3);border:1px solid var(--border-hi);color:var(--text);padding:8px 18px;border-radius:20px;font-size:.82rem;z-index:10001;pointer-events:none;transition:opacity .3s;opacity:0;white-space:nowrap;max-width:90vw;text-align:center}
        #toast.show{opacity:1}
        #toast.ok{background:rgba(0,229,160,.12);border-color:var(--c-work);color:var(--c-work)}
        #toast.err{background:rgba(255,68,102,.10);border-color:var(--c-danger);color:var(--c-danger)}

        /* ── LOADER ── */
        #loader{position:fixed;inset:0;background:rgba(10,10,15,.82);display:none;align-items:center;justify-content:center;z-index:20000;flex-direction:column;gap:12px}
        #loader.show{display:flex}

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════════
 * CONSTANTS
 * ═════════════════════════════════════════════════════════════════ */
const LS_CFG  = 'mcg_config';
const LS_SA   = 'wl_sa';
const LS_USER = 'mcg_user';
const LS_LAUNCHES = 'mcg_launches';
const SHEETS_BASE = 'https://sheets.googleapis.com/v4/spreadsheets';
const TOKEN_URI   = 'https://oauth2.googleapis.com/token';
const SCOPE       = 'https://www.googleapis.com/auth/spreadsheets';

/* ── DB Schema (sys_ prefix) ── */
const DB_SYSTEM_SCHEMA = {
    sys_Users:  { headers: ['ID','Email','Password','Role','TotalXP','CreatedAt','Status'] },
    sys_Logs:   { headers: ['Timestamp','Email','AppID','EventType','Details'] },
    sys_Scores: { headers: ['Timestamp','Email','AppID','RawScore','XP'] }
};

/* ══════════════════════════════════════════════════════════════════
 * STATE
 * ═════════════════════════════════════════════════════════════════ */
let cfg = { spreadsheetId: '' };
let sa  = null;
let currentUser    = null;
let accessToken    = null;
let tokenExpiry    = 0;
let appsData       = null;
let searchQuery    = '';
let currentSession = { appId: null, startTime: null };
let swRegistration = null;
let activeTab      = 'apps';
let _dbSheetCache  = null;   // Set<string>
let _dbSheetMeta   = null;   // Map<title, sheetId>
let _adminUsers    = [];
let _logsRawRows   = [];
let _settTab       = 'general';
let _dataViewSheet = null;   // currently viewed sheet name
let _dataRows      = [];
let _dataHeaders   = [];
let _cacheEditKey  = null;

/* ══════════════════════════════════════════════════════════════════
 * UTILS
 * ═════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg, type = '') {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'show' + (type ? ' ' + type : '');
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3000);
}

function showLoader(on) { $('loader').classList.toggle('show', !!on); }

function formatTs(ts) {
    try { return new Date(ts).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
    catch { return ts || ''; }
}

function formatDuration(sec) {
    sec = Math.round(sec);
    if (sec < 60) return sec + ' сек';
    const m = Math.floor(sec / 60);
    if (m < 60) return m + ' мин ' + (sec % 60 ? (sec % 60) + ' сек' : '');
    const h = Math.floor(m / 60);
    return h + ' ч ' + (m % 60 ? (m % 60) + ' мин' : '');
}

function formatRelative(ts) {
    if (!ts) return '';
    const diff = Date.now() - ts;
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return 'только что';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + ' мин. назад';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' ч. назад';
    const days = Math.floor(hr / 24);
    if (days === 1) return 'вчера';
    return days + ' дн. назад';
}

function getLastLaunch(appId) {
    try { return JSON.parse(localStorage.getItem(LS_LAUNCHES) || '{}')[appId] || null; } catch { return null; }
}
function setLastLaunch(appId) {
    try { const d = JSON.parse(localStorage.getItem(LS_LAUNCHES) || '{}'); d[appId] = Date.now(); localStorage.setItem(LS_LAUNCHES, JSON.stringify(d)); } catch {}
}

/* ══════════════════════════════════════════════════════════════════
 * CONFIG / STORAGE
 * ═════════════════════════════════════════════════════════════════ */
function loadCfg()  { try { const s = localStorage.getItem(LS_CFG);  if (s) cfg = JSON.parse(s); } catch {} }
function saveCfg()  { localStorage.setItem(LS_CFG, JSON.stringify(cfg)); }
function loadSA()   { try { const s = localStorage.getItem(LS_SA);   if (s) sa  = JSON.parse(s); } catch {} }
function saveSA()   { if (sa) localStorage.setItem(LS_SA, JSON.stringify(sa)); else localStorage.removeItem(LS_SA); }
function loadUser() { try { const s = localStorage.getItem(LS_USER); if (s) currentUser = JSON.parse(s); } catch {} }
function saveUser() { if (currentUser) localStorage.setItem(LS_USER, JSON.stringify(currentUser)); else localStorage.removeItem(LS_USER); }

/* ══════════════════════════════════════════════════════════════════
 * VIEW SWITCHING
 * ═════════════════════════════════════════════════════════════════ */
function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const el = $('v-' + name);
    if (el) el.classList.add('active');
}

/* ══════════════════════════════════════════════════════════════════
 * JWT / SERVICE ACCOUNT AUTH
 * ═════════════════════════════════════════════════════════════════ */
function b64url(input) {
    const str = input instanceof ArrayBuffer
        ? String.fromCharCode(...new Uint8Array(input))
        : typeof input === 'string' ? input : JSON.stringify(input);
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function pemToArrayBuffer(pem) {
    const b64 = pem.replace(/-----BEGIN PRIVATE KEY-----/, '').replace(/-----END PRIVATE KEY-----/, '').replace(/\s/g, '');
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
}
async function importPrivateKey(pem) {
    return crypto.subtle.importKey('pkcs8', pemToArrayBuffer(pem),
        { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' }, false, ['sign']);
}
async function createSignedJWT() {
    if (!sa) throw new Error('Сервисный аккаунт не настроен');
    const header = { alg: 'RS256', typ: 'JWT' };
    const now    = Math.floor(Date.now() / 1000);
    const claim  = { iss: sa.client_email, scope: SCOPE, aud: TOKEN_URI, iat: now, exp: now + 3600 };
    const input  = b64url(JSON.stringify(header)) + '.' + b64url(JSON.stringify(claim));
    const key    = await importPrivateKey(sa.private_key);
    const sig    = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, new TextEncoder().encode(input));
    return input + '.' + b64url(sig);
}
async function ensureAuth() {
    if (accessToken && Date.now() < tokenExpiry) return accessToken;
    const jwt = await createSignedJWT();
    const r = await fetch(TOKEN_URI, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=' + jwt
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error_description || e.error || `HTTP ${r.status}`); }
    const d = await r.json();
    accessToken = d.access_token;
    tokenExpiry = Date.now() + (d.expires_in - 60) * 1000;
    return accessToken;
}

/* ══════════════════════════════════════════════════════════════════
 * GOOGLE SHEETS API
 * ═════════════════════════════════════════════════════════════════ */
async function apiRead(range) {
    const token = await ensureAuth();
    const url = `${SHEETS_BASE}/${encodeURIComponent(cfg.spreadsheetId)}/values/${encodeURIComponent(range)}`;
    const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${r.status}`); }
    return r.json();
}
async function apiAppend(range, values) {
    const token = await ensureAuth();
    const url = `${SHEETS_BASE}/${encodeURIComponent(cfg.spreadsheetId)}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`;
    const r = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ values }) });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${r.status}`); }
    return r.json();
}
async function apiUpdate(range, values) {
    const token = await ensureAuth();
    const body  = Array.isArray(values) ? { values: [values] } : { values: [[values]] };
    const url   = `${SHEETS_BASE}/${encodeURIComponent(cfg.spreadsheetId)}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
    const r = await fetch(url, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) throw new Error('Update failed');
    return r.json();
}
async function apiBatchValues(data) {
    const token = await ensureAuth();
    const url = `${SHEETS_BASE}/${encodeURIComponent(cfg.spreadsheetId)}/values:batchUpdate`;
    const r = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data }) });
    if (!r.ok) throw new Error('Batch values update failed');
    return r.json();
}
async function apiBatchStructural(requests) {
    const token = await ensureAuth();
    const url = `${SHEETS_BASE}/${encodeURIComponent(cfg.spreadsheetId)}:batchUpdate`;
    const r = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ requests }) });
    if (!r.ok) throw new Error('Structural batch update failed');
    return r.json();
}

/* ══════════════════════════════════════════════════════════════════
 * SHEET NAME VALIDATION & DB CACHE
 * ═════════════════════════════════════════════════════════════════ */
function validateSheetName(name) {
    if (!/^[a-zA-Z0-9_]+$/.test(name)) {
        throw new Error('Недопустимое имя таблицы: ' + name + '. Разрешены только буквы, цифры и _');
    }
}
function validateSheetRange(range) {
    const sheetName = range.split('!')[0];
    validateSheetName(sheetName);
}
async function refreshDbCache() {
    const token = await ensureAuth();
    const url = `${SHEETS_BASE}/${encodeURIComponent(cfg.spreadsheetId)}?fields=sheets.properties`;
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) throw new Error('Ошибка метаданных таблицы');
    const sheets = (await res.json()).sheets || [];
    _dbSheetCache = new Set(sheets.map(s => s.properties.title));
    _dbSheetMeta = new Map(sheets.map(s => [s.properties.title, s.properties.sheetId]));
    return _dbSheetCache;
}

/* ══════════════════════════════════════════════════════════════════
 * DB INITIALIZATION — ensureTables
 * ═════════════════════════════════════════════════════════════════ */
async function dbEnsureTables(tablesConfig) {
    for (const t of tablesConfig) validateSheetName(t.name);
    if (!_dbSheetCache) await refreshDbCache();
    const missing = tablesConfig.filter(t => !_dbSheetCache.has(t.name));
    if (!missing.length) return;
    const createReqs = missing.map(t => ({ addSheet: { properties: { title: t.name } } }));
    await apiBatchStructural(createReqs);
    for (const t of missing) {
        try { await apiAppend(`${t.name}!A1`, [t.headers]); } catch {}
        _dbSheetCache.add(t.name);
    }
    await refreshDbCache();
}

async function dbInitAllSheets() {
    const systemTables = Object.entries(DB_SYSTEM_SCHEMA).map(([name, desc]) => ({
        name, headers: desc.headers
    }));
    await dbEnsureTables(systemTables);
}

/* ══════════════════════════════════════════════════════════════════
 * USER AUTH
 * sys_Users: [ID, Email, Password, Role, TotalXP, CreatedAt, Status]
 *             0    1      2         3     4        5          6
 * ═════════════════════════════════════════════════════════════════ */
async function loginUser(email, password) {
    const res  = await apiRead('sys_Users!A2:G5000');
    const rows = res.values || [];
    const row  = rows.find(r => r[1] === email && r[2] === password && r[6] !== 'blocked');
    if (!row) return null;
    return { login: row[1], role: row[3] || 'user', total_xp: parseInt(row[4]) || 0 };
}

async function registerUser(email, password) {
    const res  = await apiRead('sys_Users!A2:G5000');
    const rows = res.values || [];
    if (rows.some(r => r[1] === email)) throw new Error('Пользователь уже существует');
    const isFirst = rows.length === 0;
    const id  = 'u_' + Date.now().toString(36);
    const now = new Date().toISOString();
    await apiAppend('sys_Users!A:G', [[id, email, password, isFirst ? 'admin' : 'user', '0', now, 'active']]);
    return { login: email, role: isFirst ? 'admin' : 'user', total_xp: 0 };
}

/* ══════════════════════════════════════════════════════════════════
 * PLATFORM API (accessible from iframes via window.parent.PlatformAPI)
 * ═════════════════════════════════════════════════════════════════ */
window.PlatformAPI = {
    user: {
        getProfile: () => currentUser ? { login: currentUser.login, role: currentUser.role, total_xp: currentUser.total_xp } : null,
        isAdmin: () => (currentUser?.role || '').toLowerCase() === 'admin',
        getRole: () => (currentUser?.role || 'user').toLowerCase()
    },
    db: {
        read: async (range) => { validateSheetRange(range); return apiRead(range); },
        append: async (range, values) => { validateSheetRange(range); return apiAppend(range, values); },
        update: async (range, values) => { validateSheetRange(range); return apiUpdate(range, values); },
        batchValues: async (data) => {
            if (Array.isArray(data)) data.forEach(d => { if (d.range) validateSheetRange(d.range); });
            return apiBatchValues(data);
        },
        batchStructural: async (requests) => apiBatchStructural(requests),
        ensureTables: async (tablesConfig) => {
            showLoader(true);
            try { await dbEnsureTables(tablesConfig); toast('✓ Таблицы готовы', 'ok'); }
            catch (e) { toast('Ошибка БД: ' + e.message, 'err'); throw e; }
            finally { showLoader(false); }
        },
        getSpreadsheetId: () => cfg.spreadsheetId
    },
    gameplay: {
        submitScore: async (appId, rawScore, xpEarned) => {
            if (!currentUser) return;
            const ts = new Date().toISOString();
            await apiAppend('sys_Scores!A:E', [[ts, currentUser.login, appId, String(rawScore), String(xpEarned)]]).catch(() => {});
            try {
                const res  = await apiRead('sys_Users!A2:G5000');
                const rows = res.values || [];
                const idx  = rows.findIndex(r => r[1] === currentUser.login);
                if (idx >= 0) {
                    const rowNum = idx + 2;
                    const curXp  = parseInt(rows[idx][4]) || 0;
                    await apiUpdate(`sys_Users!E${rowNum}`, String(curXp + xpEarned));
                    currentUser.total_xp = curXp + xpEarned;
                    saveUser();
                }
            } catch {}
        }
    },
    system: {
        logSession: async (appId, durationSec) => {
            if (!currentUser) return;
            try { await apiAppend('sys_Logs!A:E', [[new Date().toISOString(), currentUser.login, appId, 'session', String(durationSec)]]); } catch {}
        },
        log: async (appId, eventType, details) => {
            if (!currentUser) return;
            try { await apiAppend('sys_Logs!A:E', [[new Date().toISOString(), currentUser.login, appId, eventType, String(details || '')]]); } catch {}
        }
    },
    ui: {
        showToast:  (msg, type) => toast(msg, type),
        showLoader: (on)        => showLoader(on),
        openSettings: ()        => switchTab('settings')
    }
};

/* ══════════════════════════════════════════════════════════════════
 * TAB NAVIGATION
 * ═════════════════════════════════════════════════════════════════ */
function switchTab(tabName) {
    activeTab = tabName;
    document.querySelectorAll('.side-item, .bnav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
    });
    document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === 'tab-' + tabName);
    });
    const titles = { apps: 'Приложения', stats: 'Статистика', board: 'Рейтинг', data: 'Справочники', settings: 'Настройки' };
    $('content-title').textContent = titles[tabName] || '';
    if (tabName === 'stats') renderStatsTab();
    else if (tabName === 'board') renderBoardTab();
    else if (tabName === 'data') renderDataTab();
    else if (tabName === 'settings') renderSettingsTab();
}

/* ══════════════════════════════════════════════════════════════════
 * APP LAUNCH / SESSION TRACKING
 * ═════════════════════════════════════════════════════════════════ */
function launchApp(file, appId) {
    currentSession = { appId, startTime: Date.now() };
    setLastLaunch(appId);
    $('app-iframe').src = `./apps/${file}`;
    $('immersive-container').style.display = 'block';
}

$('btn-float-back').addEventListener('click', () => {
    if (currentSession.appId && currentSession.startTime) {
        const durationSec = Math.round((Date.now() - currentSession.startTime) / 1000);
        if (durationSec > 5) {
            window.PlatformAPI.system.logSession(currentSession.appId, durationSec);
        }
    }
    currentSession = { appId: null, startTime: null };
    $('immersive-container').style.display = 'none';
    $('app-iframe').src = 'about:blank';
    if (activeTab === 'apps') renderAppsGrid();
});

/* ══════════════════════════════════════════════════════════════════
 * APPS GRID
 * ═════════════════════════════════════════════════════════════════ */
const BUILTIN_APPS = [
    { id: 'trainer',    name: 'Тренер',  icon: '🏋️', desc: 'Таймер тренировки McGill Big 3.',  file: 'trainer.html' },
    { id: 'dictionary', name: 'Словарь', icon: '📖', desc: 'Изучай слова на разных языках.',    file: 'dictionary.html' }
];

async function fetchAndRenderApps() {
    let categories = [{ id: 'apps', label: '⭐ Приложения', games: BUILTIN_APPS }];
    try {
        const res = await fetch('./apps/index.json');
        if (res.ok) {
            const data = await res.json();
            if (data.categories) {
                const extraCats = data.categories
                    .map(cat => ({ ...cat, games: (cat.games || []).filter(g =>
                        !['wordlearning','dictionary','trainer'].includes(g.id) &&
                        !['WordLearning.html','dictionary.html','trainer.html'].includes(g.file))
                    }))
                    .filter(cat => (cat.games || []).length > 0);
                categories = [...categories, ...extraCats];
            }
        }
    } catch {}
    appsData = categories;
    renderAppsGrid();
}

function renderAppsGrid() {
    const el = $('apps-scroll');
    const q  = searchQuery.toLowerCase().trim();
    let html = '';
    (appsData || []).forEach(cat => {
        const apps = q
            ? (cat.games || []).filter(g => g.name.toLowerCase().includes(q) || (g.desc || '').toLowerCase().includes(q))
            : (cat.games || []);
        if (!apps.length) return;
        html += `<div class="app-category"><div class="app-cat-label">${cat.label}</div><div class="apps-grid">`;
        apps.forEach(g => {
            const appId = g.id || g.file;
            const ll = getLastLaunch(appId);
            const llText = ll ? formatRelative(ll) : '';
            html += `<div class="app-tile" data-file="${g.file}" data-id="${appId}" data-name="${g.name}" role="button" tabindex="0">
                <div class="app-tile-icon">${g.icon || '🎮'}</div>
                <div class="app-tile-name">${g.name}</div>
                <div class="app-tile-desc">${g.desc || ''}</div>
                ${llText ? `<div class="app-tile-time">🕐 ${llText}</div>` : ''}
                <div class="app-tile-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
            </div>`;
        });
        html += '</div></div>';
    });
    if (!html) html = '<div style="color:var(--text-3);font-size:.82rem;padding:20px 4px">Приложения не найдены</div>';
    el.innerHTML = html;
    el.querySelectorAll('.app-tile').forEach(tile => {
        const open = () => launchApp(tile.dataset.file, tile.dataset.id || tile.dataset.file);
        tile.addEventListener('click', open);
        tile.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
    });
}

$('apps-search').addEventListener('input', e => { searchQuery = e.target.value; renderAppsGrid(); });

/* ══════════════════════════════════════════════════════════════════
 * STATS TAB — Session statistics
 * ═════════════════════════════════════════════════════════════════ */
async function renderStatsTab() {
    const c = $('stats-content');
    c.innerHTML = '<div class="empty-state"><div class="loader-spin" style="margin:0 auto"></div></div>';
    try {
        const res = await apiRead('sys_Logs!A2:E5000');
        const allRows = (res.values || []).filter(r => r[0] && r[3] === 'session');

        if (!allRows.length) {
            c.innerHTML = '<div class="empty-state"><div class="empty-ico">📊</div>Нет данных о сессиях</div>';
            return;
        }

        // Summary cards
        const totalSessions = allRows.length;
        const totalSec = allRows.reduce((s, r) => s + (parseInt(r[4]) || 0), 0);
        const uniqueUsers = new Set(allRows.map(r => r[1])).size;
        const uniqueApps = new Set(allRows.map(r => r[2])).size;

        // Per-user per-app aggregation
        const agg = {};
        allRows.forEach(r => {
            const user = r[1] || '?', app = r[2] || '?', sec = parseInt(r[4]) || 0, ts = r[0];
            const key = user + '|' + app;
            if (!agg[key]) agg[key] = { user, app, count: 0, totalSec: 0, lastTs: '' };
            agg[key].count++;
            agg[key].totalSec += sec;
            if (ts > agg[key].lastTs) agg[key].lastTs = ts;
        });

        const rows = Object.values(agg).sort((a, b) => b.totalSec - a.totalSec);

        // Filters
        const appIds = [...new Set(allRows.map(r => r[2]).filter(Boolean))];
        const users  = [...new Set(allRows.map(r => r[1]).filter(Boolean))];

        let html = `
        <div class="stat-cards">
            <div class="stat-card"><div class="stat-card-val">${totalSessions}</div><div class="stat-card-lbl">Сессий</div></div>
            <div class="stat-card"><div class="stat-card-val">${formatDuration(totalSec)}</div><div class="stat-card-lbl">Общее время</div></div>
            <div class="stat-card"><div class="stat-card-val">${uniqueUsers}</div><div class="stat-card-lbl">Пользователей</div></div>
            <div class="stat-card"><div class="stat-card-val">${uniqueApps}</div><div class="stat-card-lbl">Приложений</div></div>
        </div>
        <div class="logs-filters">
            <select id="stats-f-app" onchange="filterStatsTable()"><option value="">Все приложения</option>${appIds.map(id => `<option value="${esc(id)}">${esc(id)}</option>`).join('')}</select>
            <select id="stats-f-user" onchange="filterStatsTable()"><option value="">Все пользователи</option>${users.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('')}</select>
        </div>
        <div style="flex:1;overflow:auto;padding:0 16px 16px"><div class="table-scroll">
        <table class="data-table" id="stats-table">
            <tr><th>Пользователь</th><th>Приложение</th><th>Сессий</th><th>Общее время</th><th>Последний запуск</th></tr>`;
        rows.forEach(r => {
            html += `<tr data-app="${esc(r.app)}" data-user="${esc(r.user)}">
                <td>${esc(r.user)}</td>
                <td>${esc(r.app)}</td>
                <td>${r.count}</td>
                <td class="nowrap">${formatDuration(r.totalSec)}</td>
                <td class="nowrap">${formatTs(r.lastTs)}</td>
            </tr>`;
        });
        html += '</table></div></div>';
        c.innerHTML = html;
    } catch (e) {
        c.innerHTML = `<div class="empty-state" style="color:var(--c-danger)">Ошибка: ${esc(e.message)}</div>`;
    }
}

function filterStatsTable() {
    const fApp = $('stats-f-app')?.value || '';
    const fUser = $('stats-f-user')?.value || '';
    document.querySelectorAll('#stats-table tr[data-app]').forEach(tr => {
        const matchApp = !fApp || tr.dataset.app === fApp;
        const matchUser = !fUser || tr.dataset.user === fUser;
        tr.style.display = (matchApp && matchUser) ? '' : 'none';
    });
}

/* ══════════════════════════════════════════════════════════════════
 * LEADERBOARD TAB — by time spent, expandable
 * ═════════════════════════════════════════════════════════════════ */
async function renderBoardTab() {
    const c = $('board-content');
    c.innerHTML = '<div class="empty-state"><div class="loader-spin" style="margin:0 auto"></div></div>';
    try {
        const res = await apiRead('sys_Logs!A2:E5000');
        const sessions = (res.values || []).filter(r => r[0] && r[3] === 'session');
        if (!sessions.length) {
            c.innerHTML = '<div class="empty-state"><div class="empty-ico">🏆</div>Нет данных для рейтинга</div>';
            return;
        }

        // Aggregate per user
        const userMap = {};
        sessions.forEach(r => {
            const user = r[1] || '?', app = r[2] || '?', sec = parseInt(r[4]) || 0;
            if (!userMap[user]) userMap[user] = { totalSec: 0, apps: {} };
            userMap[user].totalSec += sec;
            if (!userMap[user].apps[app]) userMap[user].apps[app] = 0;
            userMap[user].apps[app] += sec;
        });

        const sorted = Object.entries(userMap).sort((a, b) => b[1].totalSec - a[1].totalSec);

        let html = '<div class="board-list">';
        sorted.forEach(([user, data], i) => {
            const pos = i + 1;
            const posClass = pos <= 3 ? ' top' + pos : '';
            const isSelf = user === currentUser?.login;
            const appEntries = Object.entries(data.apps).sort((a, b) => b[1] - a[1]);

            html += `<div class="board-item${isSelf ? ' self' : ''}">
                <div class="board-head" onclick="this.nextElementSibling.classList.toggle('open')">
                    <div class="board-pos${posClass}">${pos}</div>
                    <div class="board-info">
                        <div class="board-name">${esc(user)}${isSelf ? '<span class="role-tag">вы</span>' : ''}</div>
                        <div class="board-meta">${appEntries.length} приложений · ${sessions.filter(r => r[1] === user).length} сессий</div>
                    </div>
                    <div class="board-time">${formatDuration(data.totalSec)}</div>
                </div>
                <div class="board-expand">`;
            appEntries.forEach(([app, sec]) => {
                html += `<div class="board-app-row"><span>${esc(app)}</span><span>${formatDuration(sec)}</span></div>`;
            });
            html += '</div></div>';
        });
        html += '</div>';
        c.innerHTML = html;
    } catch (e) {
        c.innerHTML = `<div class="empty-state" style="color:var(--c-danger)">Ошибка: ${esc(e.message)}</div>`;
    }
}

/* ══════════════════════════════════════════════════════════════════
 * DATA TAB — Full CRUD on all sheets
 * ═════════════════════════════════════════════════════════════════ */
function renderDataTab() {
    if (_dataViewSheet) { renderDataSheet(); return; }
    const c = $('data-content');
    if (!_dbSheetCache || !_dbSheetCache.size) {
        c.innerHTML = '<div class="empty-state"><div class="empty-ico">📚</div>Нет листов. Откройте настройки и инициализируйте БД.</div>';
        return;
    }
    // Group sheets by prefix
    const groups = {};
    for (const name of _dbSheetCache) {
        const prefix = name.includes('_') ? name.split('_')[0] : 'other';
        if (!groups[prefix]) groups[prefix] = [];
        groups[prefix].push(name);
    }

    let html = '<div class="data-sheets">';
    for (const [prefix, sheets] of Object.entries(groups).sort()) {
        html += `<div class="data-sheet-group"><div class="data-sheet-group-title">${esc(prefix)}</div>`;
        sheets.sort().forEach(name => {
            html += `<div class="data-sheet-item" onclick="openDataSheet('${esc(name)}')">
                <span class="ico">📄</span><span class="data-sheet-name">${esc(name)}</span><span class="data-sheet-arrow">→</span>
            </div>`;
        });
        html += '</div>';
    }
    html += `<div style="padding:12px 0">
        <button class="panel-btn accent" onclick="createNewSheet()">+ Создать новый лист</button>
        <button class="panel-btn" onclick="refreshDataSheets()">🔄 Обновить список</button>
    </div></div>`;
    c.innerHTML = html;
}

async function openDataSheet(name) {
    _dataViewSheet = name;
    const c = $('data-content');
    c.innerHTML = '<div class="empty-state"><div class="loader-spin" style="margin:0 auto"></div></div>';
    try {
        const res = await apiRead(`${name}!A1:ZZ5000`);
        const all = res.values || [];
        _dataHeaders = all.length > 0 ? all[0] : [];
        _dataRows = all.slice(1);
        renderDataSheet();
    } catch (e) {
        c.innerHTML = `<div class="data-back" onclick="closeDataSheet()">← Назад к листам</div><div class="empty-state" style="color:var(--c-danger)">Ошибка: ${esc(e.message)}</div>`;
    }
}

function closeDataSheet() { _dataViewSheet = null; renderDataTab(); }

function renderDataSheet() {
    const c = $('data-content');
    const name = _dataViewSheet;
    const sheetId = _dbSheetMeta?.get(name);

    let html = `<div class="data-back" onclick="closeDataSheet()">← ${esc(name)}</div>`;
    html += `<div class="data-toolbar">
        <button class="cache-btn" onclick="addDataRow()">+ Строка</button>
        <button class="cache-btn" onclick="openDataSheet('${esc(name)}')">🔄 Обновить</button>
        ${sheetId !== undefined ? `<button class="cache-btn dn" onclick="deleteSheet('${esc(name)}',${sheetId})">🗑 Удалить лист</button>` : ''}
    </div>`;

    if (!_dataHeaders.length && !_dataRows.length) {
        html += '<div class="empty-state">Лист пуст</div>';
    } else {
        html += '<div style="flex:1;overflow:auto;padding:0 12px 16px"><div class="table-scroll"><table class="data-table">';
        if (_dataHeaders.length) {
            html += '<tr><th>#</th>';
            _dataHeaders.forEach(h => { html += `<th>${esc(h)}</th>`; });
            html += '<th></th></tr>';
        }
        _dataRows.forEach((row, i) => {
            const rowNum = i + 2; // 1-indexed, row 1 is header
            html += `<tr><td style="color:var(--text-3);font-size:.65rem">${rowNum}</td>`;
            const maxCols = Math.max(_dataHeaders.length, row.length);
            for (let col = 0; col < maxCols; col++) {
                const val = row[col] || '';
                const colLetter = colToLetter(col);
                html += `<td class="ellipsis" ondblclick="editDataCell(this,'${esc(name)}','${colLetter}${rowNum}','${esc(val)}')" title="${esc(val)}" style="cursor:text">${esc(val)}</td>`;
            }
            html += `<td><button style="background:none;border:none;color:var(--c-danger);cursor:pointer;font-size:.8rem" onclick="deleteDataRow('${esc(name)}',${sheetId},${rowNum})" title="Удалить строку">✕</button></td></tr>`;
        });
        html += '</table></div></div>';
    }
    c.innerHTML = html;
}

function colToLetter(col) {
    let s = '';
    col++;
    while (col > 0) { col--; s = String.fromCharCode(65 + (col % 26)) + s; col = Math.floor(col / 26); }
    return s;
}

function editDataCell(td, sheet, cellRef, oldVal) {
    const input = document.createElement('input');
    input.className = 'data-cell-edit';
    input.value = oldVal;
    td.textContent = '';
    td.appendChild(input);
    input.focus();
    input.select();
    const save = async () => {
        const newVal = input.value;
        td.textContent = newVal;
        if (newVal !== oldVal) {
            try { await apiUpdate(`${sheet}!${cellRef}`, newVal); toast('✓ Сохранено', 'ok'); }
            catch (e) { toast('Ошибка: ' + e.message, 'err'); td.textContent = oldVal; }
        }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { td.textContent = oldVal; } });
}

async function addDataRow() {
    const name = _dataViewSheet;
    if (!name) return;
    const colCount = Math.max(_dataHeaders.length, 1);
    const emptyRow = Array(colCount).fill('');
    showLoader(true);
    try {
        await apiAppend(`${name}!A1`, [emptyRow]);
        toast('✓ Строка добавлена', 'ok');
        await openDataSheet(name);
    } catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

async function deleteDataRow(sheet, sheetId, rowNum) {
    if (!confirm(`Удалить строку ${rowNum}?`)) return;
    showLoader(true);
    try {
        await apiBatchStructural([{
            deleteDimension: { range: { sheetId: sheetId, dimension: 'ROWS', startIndex: rowNum - 1, endIndex: rowNum } }
        }]);
        toast('✓ Строка удалена', 'ok');
        await openDataSheet(sheet);
    } catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

async function createNewSheet() {
    const name = prompt('Имя нового листа (латиница, цифры, _):');
    if (!name) return;
    try { validateSheetName(name); } catch (e) { toast(e.message, 'err'); return; }
    showLoader(true);
    try {
        await apiBatchStructural([{ addSheet: { properties: { title: name } } }]);
        await refreshDbCache();
        toast('✓ Лист создан: ' + name, 'ok');
        renderDataTab();
    } catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

async function deleteSheet(name, sheetId) {
    if (!confirm(`Удалить лист "${name}" полностью?`)) return;
    showLoader(true);
    try {
        await apiBatchStructural([{ deleteSheet: { sheetId: sheetId } }]);
        await refreshDbCache();
        _dataViewSheet = null;
        toast('✓ Лист удалён', 'ok');
        renderDataTab();
    } catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

async function refreshDataSheets() {
    showLoader(true);
    try { await refreshDbCache(); renderDataTab(); toast('✓ Обновлено', 'ok'); }
    catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

                    <button onclick="adminToggleBlock(${i})">${isBlocked ? '✓ разблок.' : '⛔ блок.'}</button>
                </div>`}
            </div>`;
        });
        html += '</div>';
        c.innerHTML = html;
    } catch (e) {
        c.innerHTML = `<p style="color:var(--c-danger);font-size:.82rem">Ошибка: ${esc(e.message)}</p>`;
    }
}

async function adminToggleRole(idx) {
    const r = _adminUsers[idx]; if (!r) return;
    const newRole = (r[3] || 'user') === 'admin' ? 'user' : 'admin';
    showLoader(true);
    try { await apiUpdate(`sys_Users!D${idx + 2}`, newRole); toast('Роль изменена', 'ok'); loadAdminUsers(); }
    catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

async function adminToggleBlock(idx) {
    const r = _adminUsers[idx]; if (!r) return;
    const newStatus = (r[6] || 'active') === 'blocked' ? 'active' : 'blocked';
    showLoader(true);
    try { await apiUpdate(`sys_Users!G${idx + 2}`, newStatus); toast(newStatus === 'blocked' ? 'Заблокирован' : 'Разблокирован', 'ok'); loadAdminUsers(); }
    catch (e) { toast('Ошибка: ' + e.message, 'err'); }
    showLoader(false);
}

    showLoader(true);

    catch (e) { toast('Ошибка: ' + e.message, 'err'); }

}

async function doRefreshCache() {
    showLoader(true);

async function renderLogsInSettings() {
    const c = $('logs-container');

        const res = await apiRead('sys_Logs!A2:E5000');

        rows.forEach(r => {
            html += `<tr><td class="nowrap">${esc(formatTs(r[0]))}</td><td>${esc(r[1]||'')}</td><td>${esc(r[2]||'')}</td><td>${esc(r[3]||'')}</td><td class="ellipsis" title="${esc(r[4]||'')}">${esc(r[4]||'')}</td></tr>`;
        });

/* ── Settings: Cache Management ── */
function renderSettCache(c) {
    if (_cacheEditKey !== null) { renderCacheEditor(c); return; }

    const keys = Object.keys(localStorage).sort();
    let totalBytes = 0;
    keys.forEach(k => totalBytes += ((localStorage.getItem(k) || '').length * 2));

    let html = `
        <div class="panel-sec">
            <h3>💾 Управление кэшем</h3>
            <div class="panel-row"><span>Всего ключей</span><span class="panel-badge">${keys.length}</span></div>
            <div class="panel-row"><span>Размер</span><span class="panel-badge">~${(totalBytes / 1024).toFixed(1)} КБ</span></div>
            <button class="panel-btn accent" onclick="createCacheKey()">+ Создать новый ключ</button>
            <button class="panel-btn" onclick="clearAppCache()">🧹 Очистить кэш приложений</button>
            <button class="panel-btn danger" onclick="resetAllData()">⚠️ Сбросить ВСЕ данные</button>
        </div>
        <div class="cache-list">`;
    keys.forEach(k => {
        const val = localStorage.getItem(k) || '';
        const size = (val.length * 2);
        const sizeLabel = size < 1024 ? size + ' B' : (size / 1024).toFixed(1) + ' KB';
        html += `<div class="cache-item" onclick="openCacheKey('${esc(k)}')">
            <span class="cache-key">${esc(k)}</span>
            <span class="cache-size">${sizeLabel}</span>
            <span style="color:var(--text-3)">→</span>
        </div>`;
    });
    html += '</div>';
    c.innerHTML = html;
}

function openCacheKey(key) { _cacheEditKey = key; renderSettingsTab(); }

function renderCacheEditor(c) {
    const key = _cacheEditKey;
    const val = localStorage.getItem(key) || '';
    let formatted = val;
    try { formatted = JSON.stringify(JSON.parse(val), null, 2); } catch {}

    c.innerHTML = `
        <div class="data-back" onclick="closeCacheEditor()">← ${esc(key)}</div>
        <div class="cache-edit">
            <textarea class="cache-edit-ta" id="cache-val">${esc(formatted)}</textarea>
            <div class="cache-actions">
                <button class="cache-btn pr" onclick="saveCacheKey()">💾 Сохранить</button>
                <button class="cache-btn dn" onclick="deleteCacheKey()">🗑 Удалить</button>
                <button class="cache-btn" onclick="closeCacheEditor()">Отмена</button>
            </div>
        </div>`;
}

function closeCacheEditor() { _cacheEditKey = null; renderSettingsTab(); }

function saveCacheKey() {
    const key = _cacheEditKey;
    const val = $('cache-val').value;
    localStorage.setItem(key, val);
    toast('✓ Сохранено: ' + key, 'ok');
    closeCacheEditor();
}

function deleteCacheKey() {
    const key = _cacheEditKey;
    if (!confirm(`Удалить ключ "${key}"?`)) return;
    localStorage.removeItem(key);
    toast('✓ Удалён: ' + key, 'ok');
    closeCacheEditor();
}

function createCacheKey() {
    const key = prompt('Имя нового ключа:');
    if (!key || !key.trim()) return;
    if (localStorage.getItem(key.trim()) !== null) {
        openCacheKey(key.trim());
    } else {
        localStorage.setItem(key.trim(), '');
        openCacheKey(key.trim());
    }
}

function clearAppCache() {
    const keep = new Set([LS_CFG, LS_SA, LS_USER, LS_LAUNCHES]);
    for (const k of Object.keys(localStorage)) if (!keep.has(k)) localStorage.removeItem(k);
    if ('caches' in window) caches.keys().then(names => names.forEach(n => caches.delete(n)));
    toast('Кэш приложений очищен', 'ok');
    renderSettingsTab();
}

function resetAllData() {
    if (!confirm('Удалить ВСЕ данные платформы? Потребуется настройка заново.')) return;
    localStorage.clear();
    if ('caches' in window) caches.keys().then(names => names.forEach(n => caches.delete(n)));
    location.reload();
}

/* ── Settings: Update ── */
function renderSettUpdate(c) {
    c.innerHTML = `
        <div class="panel-sec">
            <h3>🔄 Обновление приложения</h3>
            <div class="panel-row"><span>Service Worker</span><span class="panel-badge" id="sw-badge">…</span></div>
            <button class="panel-btn accent" onclick="checkForUpdate()">🔍 Проверить обновление</button>
            <button class="panel-btn" onclick="forceUpdateAll()">⚡ Принудительное обновление всех файлов</button>
            <button class="panel-btn" onclick="location.reload()">↺ Перезагрузить приложение</button>
        </div>
        <div class="panel-sec">
            <h3>ℹ️ Информация</h3>
            <div class="panel-row"><span>Платформа</span><span class="panel-badge">KuApp v2.0</span></div>
            <div class="panel-row"><span>Режим</span><span class="panel-badge">PWA / Offline</span></div>
        </div>`;
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(reg => {
            const el = $('sw-badge'); if (!el) return;
            if (!reg) { el.textContent = 'Не активен'; return; }
            if (reg.waiting) { el.textContent = '⚡ Обновление ждёт'; el.style.color = 'var(--c-work)'; return; }
            el.textContent = '✓ Актуально';
        }).catch(() => { const el = $('sw-badge'); if (el) el.textContent = '—'; });
    }
}

async function checkForUpdate() {
    if (!swRegistration) { toast('Service Worker не активен', ''); return; }
    showLoader(true);
    try {
        await swRegistration.update();
        showLoader(false);
        if (swRegistration.waiting) {
            toast('Обновление готово — перезагрузите', 'ok');
            swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
        } else {
            toast('Версия актуальна', 'ok');
        }
        renderSettContent();
    } catch (e) { showLoader(false); toast('Ошибка: ' + e.message, 'err'); }
}

async function forceUpdateAll() {
    showLoader(true);
    try {
        if ('caches' in window) {
            const names = await caches.keys();
            await Promise.all(names.map(n => caches.delete(n)));
        }
        if (swRegistration) {
            await swRegistration.update();
            if (swRegistration.waiting) swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        showLoader(false);
        toast('Кэши очищены — перезагружаю…', 'ok');
        setTimeout(() => location.reload(true), 800);
    } catch (e) { showLoader(false); toast('Ошибка: ' + e.message, 'err'); }
}

/* ── Settings: Dev Guide ── */
function renderSettDevGuide(c) {
    const guide = `# Руководство по разработке приложений для KuApp Platform

## Архитектура

Каждое приложение — это отдельный HTML-файл в папке \`apps/\`.
Приложение загружается внутри \`<iframe>\` с sandbox="allow-scripts allow-same-origin".
Платформа предоставляет API через \`window.parent.PlatformAPI\`.

## Доступ к PlatformAPI

\`\`\`javascript
const Platform = window.parent?.PlatformAPI || null;
if (!Platform) {
  // Приложение открыто вне платформы — показать заглушку
}
\`\`\`

## API: Пользователь

\`\`\`javascript
// Получить профиль текущего пользователя
const profile = Platform.user.getProfile();
// → { login: "user@email.com", role: "admin", total_xp: 150 }

// Проверка роли
Platform.user.isAdmin()  // → true/false
Platform.user.getRole()  // → "admin" | "user"
\`\`\`

## API: База данных (Google Sheets)

\`\`\`javascript
// Создать таблицы (вызывать один раз при инициализации)
await Platform.db.ensureTables([
  { name: 'myapp_scores', headers: ['User','Score','Date'] },
  { name: 'myapp_config', headers: ['Key','Value'] }
]);

// Чтение данных
const res = await Platform.db.read('myapp_scores!A2:C5000');
const rows = res.values || [];

// Добавление строки
await Platform.db.append('myapp_scores!A:C', [
  ['user@email.com', '100', new Date().toISOString()]
]);

// Обновление ячейки
await Platform.db.update('myapp_config!B2', 'new_value');

// Пакетное обновление
await Platform.db.batchValues([
  { range: 'myapp_scores!B2', values: [['200']] },
  { range: 'myapp_scores!B3', values: [['300']] }
]);
\`\`\`

## API: Очки и XP

\`\`\`javascript
// Отправить результат игры
await Platform.gameplay.submitScore('my_app_id', rawScore, xpEarned);
\`\`\`

## API: Логирование

\`\`\`javascript
// Сессии трекаются автоматически платформой (session + длительность в секундах)
// Для кастомных событий:
await Platform.system.log('my_app_id', 'achievement', 'Прошёл уровень 5');
\`\`\`

## API: UI

\`\`\`javascript
Platform.ui.showToast('Сохранено!', 'ok');    // ok | err | ''
Platform.ui.showLoader(true);                   // показать/скрыть лоадер
Platform.ui.openSettings();                     // открыть настройки платформы
\`\`\`

## Именование таблиц

Используйте префикс приложения: \`myapp_tablename\`.
Разрешены только: латиница, цифры, подчёркивание [a-zA-Z0-9_].

Примеры: \`dict_words\`, \`tetris_scores\`, \`trainer_sessions\`.

Системные таблицы: \`sys_Users\`, \`sys_Logs\`, \`sys_Scores\`.

## Регистрация приложения

Добавьте запись в \`apps/index.json\`:

\`\`\`json
{
  "id": "myapp",
  "name": "Моё Приложение",
  "icon": "🎮",
  "desc": "Описание.",
  "file": "myapp.html"
}
\`\`\`

## Ролевая модель

Роль пользователя определяется платформой и хранится в sys_Users.
Для проверки используйте \`Platform.user.isAdmin()\`.
Не реализуйте собственную авторизацию — доверяйте платформе.

## Шаблон приложения

\`\`\`html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My App</title>
</head>
<body>
  <div id="app">Загрузка...</div>
  <script>
    const Platform = window.parent?.PlatformAPI || null;

    async function init() {
      if (!Platform) {
        document.getElementById('app').textContent =
          'Откройте через платформу KuApp';
        return;
      }
      const profile = Platform.user.getProfile();
      if (!profile) {
        document.getElementById('app').textContent =
          'Войдите в платформу';
        return;
      }

      // Инициализация таблиц
      await Platform.db.ensureTables([
        { name: 'myapp_data', headers: ['Col1','Col2'] }
      ]);

      // Запуск приложения
      document.getElementById('app').textContent =
        'Привет, ' + profile.login + '!';
    }

    init();
  <\/script>
</body>
</html>
\`\`\``;

    c.innerHTML = `
        <div class="panel-sec">
            <h3>📝 Инструкция для разработчиков</h3>
            <p style="font-size:.78rem;color:var(--text-2);margin-bottom:8px">Скопируйте промт ниже и используйте его при создании новых приложений для платформы KuApp.</p>
            <button class="copy-btn" onclick="copyDevGuide()">📋 Копировать полный промт</button>
        </div>
        <div class="devguide" id="devguide-text">${renderMarkdown(guide)}</div>
        <textarea id="devguide-raw" style="display:none">${esc(guide)}</textarea>`;
}

function renderMarkdown(md) {
    return md
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre>${esc(code.trim())}</pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^# (.+)$/gm, '<h4 style="font-size:1rem;margin-top:0">$1</h4>')
        .replace(/^## (.+)$/gm, '<h4>$1</h4>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
}

function copyDevGuide() {
    const raw = $('devguide-raw').value;
    navigator.clipboard.writeText(raw).then(() => toast('✓ Скопировано!', 'ok')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = raw; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        toast('✓ Скопировано!', 'ok');
    });
}

/* ══════════════════════════════════════════════════════════════════
 * Backward compat: openPlatformSettings (called by apps)
 * ═════════════════════════════════════════════════════════════════ */
function openPlatformSettings() { switchTab('settings'); }
function closePlatformSettings() {} // no-op now

/* ══════════════════════════════════════════════════════════════════
 * SETUP HANDLER
 * ═════════════════════════════════════════════════════════════════ */
$('btn-setup-save').addEventListener('click', async () => {
    const sid   = $('setup-sid').value.trim();
    const saRaw = $('setup-sa').value.trim();
    const errEl = $('setup-err');
    errEl.textContent = '';
    if (!sid || !saRaw) { errEl.textContent = 'Заполните все поля'; return; }
    let parsed;
    try { parsed = JSON.parse(saRaw); } catch (e) { errEl.textContent = 'Некорректный JSON: ' + e.message; return; }
    if (!parsed.client_email || !parsed.private_key) { errEl.textContent = 'SA JSON не содержит client_email или private_key'; return; }
    cfg.spreadsheetId = sid;
    sa = parsed;
    saveCfg(); saveSA();
    showLoader(true);
    try {
        await ensureAuth();
        _dbSheetCache = null;
        await dbInitAllSheets();
        showLoader(false);
        toast('✓ Подключено!', 'ok');
        showView('login');
    } catch (e) {
        showLoader(false);
        errEl.textContent = 'Ошибка подключения: ' + e.message;
        cfg.spreadsheetId = '';
        sa = null;
    }
});

/* ══════════════════════════════════════════════════════════════════
 * LOGIN / REGISTER
 * ═════════════════════════════════════════════════════════════════ */
$('btn-show-reg').addEventListener('click', () => {
    $('login-form').style.display = 'none';
    $('reg-form').style.display   = '';
    $('login-sub-text').textContent = 'Регистрация';
});
$('btn-show-login').addEventListener('click', () => {
    $('reg-form').style.display   = 'none';
    $('login-form').style.display = '';
    $('login-sub-text').textContent = 'Вход в систему';
});
$('btn-goto-setup').addEventListener('click', () => showView('setup'));

async function doLoginAction() {
    const login = $('login-login').value.trim();
    const pass  = $('login-pass').value;
    const errEl = $('login-err');
    errEl.textContent = '';
    if (!login || !pass) { errEl.textContent = 'Заполните все поля'; return; }
    showLoader(true);
    try {
        const user = await loginUser(login, pass);
        if (!user) { errEl.textContent = 'Неверный логин или пароль'; showLoader(false); return; }
        currentUser = user;
        saveUser();
        showLoader(false);
        afterLogin();
    } catch (e) { showLoader(false); errEl.textContent = 'Ошибка: ' + e.message; }
}

async function doRegisterAction() {
    const login = $('reg-login').value.trim();
    const pass  = $('reg-pass').value;
    const errEl = $('reg-err');
    errEl.textContent = '';
    if (!login || !pass) { errEl.textContent = 'Заполните все поля'; return; }
    if (pass.length < 4) { errEl.textContent = 'Пароль — минимум 4 символа'; return; }
    showLoader(true);
    try {
        const user = await registerUser(login, pass);
        currentUser = user;
        saveUser();
        showLoader(false);
        afterLogin();
    } catch (e) { showLoader(false); errEl.textContent = 'Ошибка: ' + e.message; }
}

$('btn-do-login').addEventListener('click', doLoginAction);
$('btn-do-reg').addEventListener('click', doRegisterAction);
$('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLoginAction(); });
$('reg-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doRegisterAction(); });

/* ══════════════════════════════════════════════════════════════════
 * LOGOUT
 * ═════════════════════════════════════════════════════════════════ */
function doLogout() {
    if (!confirm('Выйти из аккаунта?')) return;
    currentUser = null;
    saveUser();
    accessToken = null;
    tokenExpiry = 0;
    $('login-login').value = '';
    $('login-pass').value  = '';
    $('login-sub-text').textContent = 'Вход в систему';
    $('login-form').style.display = '';
    $('reg-form').style.display   = 'none';
    showView('login');
}

/* ══════════════════════════════════════════════════════════════════
 * AFTER LOGIN + INIT
 * ═════════════════════════════════════════════════════════════════ */
function afterLogin() {
    $('hdr-user-name').textContent  = currentUser.login;
    $('side-user-name').textContent = currentUser.login;
    showView('platform');
    switchTab('apps');
    fetchAndRenderApps();
    refreshDbCache().catch(() => {});
}

(function init() {
    loadCfg(); loadSA(); loadUser();

    if (!cfg.spreadsheetId) {
        try {
            const old = JSON.parse(localStorage.getItem('wl_config') || 'null');
            if (old?.spreadsheetId) { cfg.spreadsheetId = old.spreadsheetId; saveCfg(); }
        } catch {}
    }

    if (!sa || !cfg.spreadsheetId) {
        if (sa) $('setup-sa').value = JSON.stringify(sa, null, 2);
        if (cfg.spreadsheetId) $('setup-sid').value = cfg.spreadsheetId;
        showView('setup');
    } else if (!currentUser) {
        showView('login');
    } else {
        afterLogin();
    }
})();

/* ══════════════════════════════════════════════════════════════════
 * SERVICE WORKER
 * ═════════════════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => {
                swRegistration = reg;
                reg.addEventListener('updatefound', () => {
                    const nw = reg.installing;
                    nw?.addEventListener('statechange', () => {
                        if (nw.state === 'installed' && navigator.serviceWorker.controller)
                            toast('Обновление доступно — обновите страницу', 'ok');
                    });
                });
            })
            .catch(e => console.error('SW error:', e));
        navigator.serviceWorker.addEventListener('message', e => {
            if (e.data?.type === 'CACHE_UPDATED') toast('Файлы обновлены', 'ok');
        });
    });
}
