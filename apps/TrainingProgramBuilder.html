<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CMS Тренировок</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/drag-drop-touch"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;600;700&family=Onest:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg:      #0e0e10;
    --bg2:     #16161a;
    --bg3:     #1e1e24;
    --bg4:     #26262e;
    --border:  rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text:    #e8e6e0;
    --text2:   #8e8c86;
    --text3:   #5e5c58;
    --accent:  #7c6af7;
    --accent2: #5b4fd4;
    --green:   #4ade80;
    --red:     #f87171;
    --yellow:  #fbbf24;
    --blue:    #60a5fa;
    --orange:  #fb923c;
    --radius:  10px;
    --radius2: 16px;
  }

  body {
    font-family: 'Onest', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    -webkit-tap-highlight-color: transparent;
    font-size: 14px;
  }

  /* JSON EDITOR */
  .json-container { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden; border-radius: var(--radius); }
  .json-ta, .json-pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; line-height: 1.6;
    padding: 14px; width: 100%; flex: 1;
    border: none; margin: 0; white-space: pre; overflow: auto;
    tab-size: 2; position: absolute; inset: 0;
  }
  .json-ta  { background: transparent; color: transparent; caret-color: var(--text); outline: none; resize: none; z-index: 10; }
  .json-pre { pointer-events: none; background: var(--bg2); color: var(--text2); }
  .jk  { color: #c4b5fd; font-weight: 600; }
  .js  { color: #6ee7b7; }
  .jn  { color: #93c5fd; }
  .jb  { color: #fcd34d; font-weight: bold; }
  .jnl { color: #64748b; font-style: italic; }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border2); }

  /* SPINNER */
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DRAG */
  .drag-handle { cursor: grab; touch-action: none; }
  .drag-handle:active { cursor: grabbing; }
  .is-dragging { opacity: .4; outline: 2px dashed var(--accent); outline-offset: 2px; }

  /* TABS */
  .tab-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; border: none; white-space: nowrap; }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:not(.active) { background: transparent; color: var(--text2); }
  .tab-btn:not(.active):hover { background: var(--bg4); color: var(--text); }

  /* INPUTS */
  .inp {
    background: var(--bg3); border: 1.5px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 8px 12px; outline: none; transition: border-color .15s;
    font-family: 'Onest', sans-serif; font-size: 13px; width: 100%;
  }
  .inp:focus { border-color: var(--accent); background: var(--bg2); }
  .inp::placeholder { color: var(--text3); }
  select.inp { cursor: pointer; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius); font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: all .15s;
    white-space: nowrap; font-family: 'Onest', sans-serif;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: var(--bg4); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
  .btn-danger:hover { background: rgba(248,113,113,.25); }
  .btn-success { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid rgba(74,222,128,.2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 6px; border-radius: 8px; background: transparent; border: none; cursor: pointer; color: var(--text2); transition: all .15s; display: inline-flex; align-items: center; justify-content: center; }
  .btn-icon:hover { background: var(--bg4); color: var(--text); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-work { background: rgba(96,165,250,.15); color: var(--blue); }
  .badge-rest { background: rgba(74,222,128,.15); color: var(--green); }
  .badge-prep { background: rgba(251,191,36,.15); color: var(--yellow); }
  .badge-finish { background: rgba(248,113,113,.15); color: var(--red); }

  /* STEP ROW */
  .step-row {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    padding: 8px 10px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .step-row:hover { border-color: var(--border2); }

  /* EXERCISE CARD */
  .ex-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius2); overflow: hidden;
    transition: border-color .2s;
  }
  .ex-card:focus-within { border-color: rgba(124,106,247,.3); }

  /* SIDEBAR ITEM */
  .prog-item {
    padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
    transition: background .12s; border: 1px solid transparent;
  }
  .prog-item:hover { background: var(--bg3); }
  .prog-item.active { background: rgba(124,106,247,.15); border-color: rgba(124,106,247,.3); }

  /* NOTIF */
  .notif {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600;
    z-index: 9999; display: flex; align-items: center; gap: 8px;
    animation: notifIn .2s ease; pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .notif-success { background: #166534; color: var(--green); border: 1px solid rgba(74,222,128,.3); }
  .notif-error   { background: #7f1d1d; color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
  .notif-info    { background: #1e3a5f; color: var(--blue);  border: 1px solid rgba(96,165,250,.3); }
  @keyframes notifIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
  @media (min-width: 640px) { .modal-bg { align-items: center; padding: 24px; } }
  .modal-box {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius2) var(--radius2) 0 0;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    animation: modalUp .22s cubic-bezier(.32,.72,0,1);
  }
  @media (min-width: 640px) { .modal-box { border-radius: var(--radius2); } }
  @keyframes modalUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* INDEX EDITOR TABLE */
  .idx-row {
    display: grid; gap: 0;
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .idx-row:hover { background: var(--bg3); }
  .idx-row:last-child { border-bottom: none; }
  .idx-cell { padding: 10px 12px; font-size: 13px; display: flex; align-items: center; min-width: 0; }
  .idx-cell input { background: transparent; border: none; outline: none; color: var(--text); font-family: 'Onest',sans-serif; font-size: 13px; width: 100%; }
  .idx-cell input:focus { color: #fff; }

  /* PROG STATS */
  .stat-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; background: var(--bg3); border: 1px solid var(--border); font-size: 12px; color: var(--text2); font-weight: 500; }

  /* MOBILE NAV */
  .mobile-nav { display: none; }
  @media (max-width: 767px) {
    .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .mobile-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; color: var(--text3); font-size: 10px; font-weight: 600; cursor: pointer; border: none; background: none; transition: color .15s; }
    .mobile-nav-btn.active { color: var(--accent); }
    body { padding-bottom: 60px; }
  }

  /* RESPONSIVE LAYOUT */
  @media (max-width: 767px) {
    .sidebar-col { display: none !important; }
    .sidebar-col.open { display: flex !important; position: fixed; inset: 0; z-index: 200; width: 100% !important; max-width: 100% !important; }
  }
  @media (max-width: 1023px) {
    .json-col { display: none !important; }
    .json-col.open { display: flex !important; }
  }

  .title-font { font-family: 'Unbounded', sans-serif; }
  @media (max-width: 767px) { .desktop-only { display: none !important; } }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* GENERATOR */
  .gen-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; background: rgba(124,106,247,.06); border: 1px solid rgba(124,106,247,.15); border-radius: var(--radius); padding: 12px; }
  .gen-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); font-weight: 700; margin-bottom: 4px; }
  .gen-field input { background: var(--bg2); border: 1.5px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 8px; outline: none; font-family: monospace; font-size: 13px; width: 68px; text-align: center; }
  .gen-field input:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ═══ UTILS ═══════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2, 10);
const b64enc = s => btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g, (_, p) => String.fromCharCode('0x'+p)));
const b64dec = s => decodeURIComponent(atob(s).split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
const fmtTime = s => { if(!s) return '0с'; const m = Math.floor(s/60), r = s%60; return m ? `${m}м${r?` ${r}с`:''}` : `${r}с`; };

const hlJson = json => {
  if (!json) return '';
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      let c = 'jn';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'jk' : 'js';
      else if (/true|false/.test(m)) c = 'jb';
      else if (/null/.test(m)) c = 'jnl';
      return `<span class="${c}">${m}</span>`;
    });
};

const newProg  = () => ({ id: uid(), title: 'Новая программа', filename: `program_${uid()}.json`, description: '', exercises: [] });
const newEx    = () => ({ id: uid(), name: 'Новый блок', details: { goal:'', start:'', move:'' }, steps: [
  { id: uid(), type:'prep', phase:'Подготовка', time:15, voiceTxt:'Приготовьтесь' },
  { id: uid(), type:'work', phase:'Подход 1',   time:60, voiceTxt:'Начали' }
]});

// ═══ FORMAT CONVERTERS ═══════════════════════════════════
const toGH = prog => {
  const protocol = [], details = {};
  (prog.exercises||[]).forEach((ex, i) => {
    const name = ex.name || `Блок ${i+1}`;
    details[name] = { goal: ex.details?.goal||'-', start: ex.details?.start||'-', move: ex.details?.move||'-' };
    (ex.steps||[]).forEach(s => protocol.push({
      ex: name, phase: s.phase||'', type: s.type||'work',
      time: Number(s.time)||0, voiceTxt: s.voiceTxt||'',
      toneType: s.toneType||s.type||'work', stepDesc: s.stepDesc||name
    }));
  });
  const mins = Math.ceil(protocol.reduce((a,s)=>a+(s.time||0),0)/60);
  return { programs: [{ id: prog.filename.replace('.json',''), name: prog.title, description: prog.description, estimatedTime: `${mins} минут`, exercisesDetails: details, protocol }] };
};

const fromGH = full => {
  let exercises = [], title = 'Без названия', description = '';
  if (full.programs?.[0]) {
    const src = full.programs[0];
    title = src.name || title; description = src.description || description;
    const det = src.exercisesDetails || {};
    if (src.protocol?.length) {
      let cur = null;
      src.protocol.forEach(s => {
        if (!cur || cur.name !== s.ex) {
          cur = { id: uid(), name: s.ex||'Блок', details: det[s.ex]||{goal:'',start:'',move:''}, steps: [] };
          exercises.push(cur);
        }
        cur.steps.push({ id: uid(), type: s.type||'work', phase: s.phase||'', time: s.time||0, voiceTxt: s.voiceTxt||'', toneType: s.toneType||s.type, stepDesc: s.stepDesc||'' });
      });
    }
  }
  return { title, description, exercises };
};

// ═══ ICON ════════════════════════════════════════════════
const Ico = ({ name, size=18, cls='' }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const i = document.createElement('i');
    i.setAttribute('data-lucide', name.replace(/([a-z])([A-Z])/g,'$1-$2').toLowerCase());
    ref.current.appendChild(i);
    window.lucide.createIcons({ root: ref.current });
    const svg = ref.current.querySelector('svg');
    if (svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); if(cls) svg.classList.add(...cls.split(' ')); }
  }, [name, size, cls]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0}}></span>;
};

// ═══ NOTIFICATION ═════════════════════════════════════════
let notifTimer;
const Notif = ({ notif, setNotif }) => {
  useEffect(() => {
    if (!notif) return;
    clearTimeout(notifTimer);
    notifTimer = setTimeout(() => setNotif(null), 3200);
  }, [notif]);
  if (!notif) return null;
  return <div className={`notif notif-${notif.type}`}><Ico name={notif.type==='success'?'CheckCircle':notif.type==='error'?'XCircle':'Info'} size={15}/>{notif.msg}</div>;
};

// ═══ GITHUB API ══════════════════════════════════════════
const useGitHub = (cfg) => {
  const headers = useCallback(() => {
    const h = { 'Accept':'application/vnd.github.v3+json','Content-Type':'application/json' };
    if (cfg.token) h['Authorization'] = `token ${cfg.token}`;
    return h;
  }, [cfg.token]);

  const base = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents`;

  const getFile = useCallback(async path => {
    const r = await fetch(`${base}/${path}`, { headers: headers(), cache:'no-store' });
    if (!r.ok) { if(r.status===404) return null; throw new Error(`${r.status} ${r.statusText}`); }
    return r.json();
  }, [base, headers]);

  const putFile = useCallback(async (path, content, sha, message) => {
    const r = await fetch(`${base}/${path}`, {
      method:'PUT', headers: headers(), cache:'no-store',
      body: JSON.stringify({ message, content: b64enc(content), ...(sha && { sha }) })
    });
    if (!r.ok) throw new Error(`Ошибка сохранения: ${r.statusText}`);
    return r.json();
  }, [base, headers]);

  const deleteFile = useCallback(async (path, sha, message) => {
    const r = await fetch(`${base}/${path}`, {
      method:'DELETE', headers: headers(), cache:'no-store',
      body: JSON.stringify({ message, sha })
    });
    if (!r.ok && r.status!==404) throw new Error(`Ошибка удаления`);
    return true;
  }, [base, headers]);

  const listDir = useCallback(async dir => {
    const r = await fetch(`${base}/${dir}`, { headers: headers(), cache:'no-store' });
    if (!r.ok) throw new Error(`Директория ${dir} не найдена`);
    return r.json();
  }, [base, headers]);

  return { getFile, putFile, deleteFile, listDir };
};

// ═══ STEP GENERATOR ══════════════════════════════════════
const StepGen = ({ onGenerate }) => {
  const [sets, setSets] = useState(3);
  const [work, setWork] = useState(60);
  const [rest, setRest] = useState(40);
  return (
    <div className="gen-row">
      <div className="gen-field"><label>Подходов</label><input type="number" min="1" value={sets} onChange={e=>setSets(+e.target.value)}/></div>
      <div className="gen-field"><label>Работа (с)</label><input type="number" min="0" value={work} onChange={e=>setWork(+e.target.value)}/></div>
      <div className="gen-field"><label>Отдых (с)</label><input type="number" min="0" value={rest} onChange={e=>setRest(+e.target.value)}/></div>
      <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>onGenerate(sets,work,rest)}><Ico name="Wand2" size={13}/>Авто-генерация</button>
    </div>
  );
};

// ═══ JSON PANEL ══════════════════════════════════════════
const JsonPanel = ({ json, onChange, editing, setEditing, onApply, error }) => {
  const preRef = useRef(null);
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--bg)',padding:'16px',gap:'12px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,gap:8}}>
        <div>
          <div className="title-font" style={{fontSize:13,color:'var(--text)',fontWeight:600,display:'flex',alignItems:'center',gap:6}}><Ico name="Code2" size={15}/>Live JSON</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Формат плеера</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>window.open(location.pathname+'?view=json','_blank')} title="Открыть в новом окне"><Ico name="ExternalLink" size={13}/></button>
          {editing
            ? <button className="btn btn-success btn-sm" onClick={onApply}><Ico name="Check" size={13}/>Применить</button>
            : <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(true)}><Ico name="Pencil" size={13}/>Изменить</button>
          }
        </div>
      </div>
      {error && <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.2)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--red)',flexShrink:0}}>{error}</div>}
      <div className="json-container" style={{border:`1.5px solid ${editing?'var(--accent)':'var(--border)'}`,flex:1}}>
        <textarea className="json-ta" spellCheck="false" value={json} readOnly={!editing}
          onChange={e=>onChange(e.target.value)}
          onScroll={e=>{ if(preRef.current){ preRef.current.scrollTop=e.target.scrollTop; preRef.current.scrollLeft=e.target.scrollLeft; }}}
        />
        <pre className="json-pre" ref={preRef} aria-hidden><code dangerouslySetInnerHTML={{__html:hlJson(json)}}/></pre>
      </div>
    </div>
  );
};

// ═══ INDEX EDITOR ════════════════════════════════════════
const IndexEditor = ({ gh, cfg, notify, indexKey }) => {
  const paths = { workouts: 'workouts/index.json', games: 'games/index.json' };
  const path = paths[indexKey];

  const [raw,      setRaw]      = useState('');
  const [sha,      setSha]      = useState(null);
  const [parsed,   setParsed]   = useState(null); // null = ещё не загружено
  const [parseErr, setParseErr] = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [saving,   setSaving]   = useState(false);
  const [jsonMode, setJsonMode] = useState(false);
  const [expandedCat, setExpandedCat] = useState({});
  const preRef = useRef(null);

  // Определяем формат: массив [] или объект с категориями {categories:[]}
  const isCatFormat = parsed !== null && !Array.isArray(parsed) && parsed?.categories;
  const isArrayFormat = Array.isArray(parsed);

  const load = async () => {
    setLoading(true);
    try {
      const f = await gh.getFile(path);
      if (!f) {
        const empty = indexKey === 'games' ? '{\n  "categories": []\n}' : '[]';
        setRaw(empty); setParsed(indexKey === 'games' ? { categories: [] } : []); setSha(null);
        notify('info', 'Файл не найден — создан новый');
        setLoading(false); return;
      }
      const content = b64dec(f.content);
      setRaw(content); setSha(f.sha);
      try {
        const p = JSON.parse(content);
        setParsed(p); setParseErr(null);
      } catch(e) { setParseErr(e.message); setParsed([]); }
    } catch(e) { notify('error', e.message); }
    setLoading(false);
  };

  useEffect(() => { setParsed(null); setRaw(''); setJsonMode(false); load(); }, [path]);

  const syncRaw = (next) => { setParsed(next); setRaw(JSON.stringify(next, null, 2)); };

  const save = async () => {
    setSaving(true);
    try {
      const content = jsonMode ? raw : JSON.stringify(parsed, null, 2);
      const res = await gh.putFile(path, content, sha, `CMS: Update ${path}`);
      setSha(res.content.sha);
      notify('success', `${path} сохранён`);
    } catch(e) { notify('error', e.message); }
    setSaving(false);
  };

  // ── Операции для формата МАССИВ (workouts) ──────────────
  const arrUpdate = (i, field, val) => {
    const next = parsed.map((item, idx) => {
      if (idx !== i) return item;
      if (typeof item === 'string') return item;
      return { ...item, [field]: val };
    });
    syncRaw(next);
  };
  const arrAdd    = () => syncRaw([...parsed, { id: uid(), title: '', file: '', category: '', description: '' }]);
  const arrRemove = i  => syncRaw(parsed.filter((_,idx) => idx !== i));

  // Drag reorder (массив)
  const dragArrIdx = useRef(null);
  const [dragArrOver, setDragArrOver] = useState(null);
  const arrDragEnd = () => {
    if (dragArrIdx.current !== null && dragArrOver !== null && dragArrIdx.current !== dragArrOver) {
      const next = [...parsed];
      const [item] = next.splice(dragArrIdx.current, 1);
      next.splice(dragArrOver, 0, item);
      syncRaw(next);
    }
    dragArrIdx.current = null; setDragArrOver(null);
  };

  // ── Операции для формата КАТЕГОРИИ (games) ──────────────
  const catUpdateField = (ci, field, val) => {
    const cats = parsed.categories.map((c,i) => i===ci ? {...c,[field]:val} : c);
    syncRaw({...parsed, categories: cats});
  };
  const catAddGame = (ci) => {
    const cats = parsed.categories.map((c,i) => i===ci
      ? {...c, games: [...(c.games||[]), {id:uid(), name:'', icon:'', desc:'', file:''}]}
      : c);
    syncRaw({...parsed, categories: cats});
  };
  const catUpdateGame = (ci, gi, field, val) => {
    const cats = parsed.categories.map((c,i) => i!==ci ? c : {
      ...c, games: c.games.map((g,j) => j!==gi ? g : {...g,[field]:val})
    });
    syncRaw({...parsed, categories: cats});
  };
  const catRemoveGame = (ci, gi) => {
    const cats = parsed.categories.map((c,i) => i!==ci ? c : {
      ...c, games: c.games.filter((_,j) => j!==gi)
    });
    syncRaw({...parsed, categories: cats});
  };
  const catAdd    = () => syncRaw({...parsed, categories:[...(parsed.categories||[]), {id:uid(),label:'',games:[]}]});
  const catRemove = ci => syncRaw({...parsed, categories: parsed.categories.filter((_,i)=>i!==ci)});

  // Drag reorder games внутри категории
  const dragGame = useRef(null);
  const [dragGameOver, setDragGameOver] = useState(null);
  const gameDragEnd = (ci) => {
    if (dragGame.current!==null && dragGameOver!==null && dragGame.current!==dragGameOver) {
      const games = [...parsed.categories[ci].games];
      const [item] = games.splice(dragGame.current, 1);
      games.splice(dragGameOver, 0, item);
      const cats = parsed.categories.map((c,i) => i===ci ? {...c,games} : c);
      syncRaw({...parsed, categories: cats});
    }
    dragGame.current = null; setDragGameOver(null);
  };

  // Drag reorder самих категорий
  const dragCat = useRef(null);
  const [dragCatOver, setDragCatOver] = useState(null);
  const catDragEnd = () => {
    if (dragCat.current !== null && dragCatOver !== null && dragCat.current !== dragCatOver) {
      const cats = [...parsed.categories];
      const [item] = cats.splice(dragCat.current, 1);
      cats.splice(dragCatOver, 0, item);
      syncRaw({...parsed, categories: cats});
      // Сохраняем состояние раскрытия под новыми индексами
      setExpandedCat(prev => {
        const next = {};
        cats.forEach((_, ni) => { next[ni] = prev[ni] !== undefined ? prev[ni] : true; });
        return next;
      });
    }
    dragCat.current = null; setDragCatOver(null);
  };

  // ── FIELD LABEL ─────────────────────────────────────────
  const FL = ({label}) => <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--text3)',fontWeight:700,marginBottom:4}}>{label}</div>;

  // ── РЕНДЕР КАТЕГОРИАЛЬНОГО ФОРМАТА (games) ───────────────
  const renderCatFormat = () => {
    const cats = parsed.categories || [];
    return (
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px 24px'}}>
        {cats.length === 0 && (
          <div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)'}}>
            <div style={{fontSize:36,marginBottom:8}}>🎮</div>
            <div style={{fontSize:13}}>Нет категорий. Нажмите «Добавить категорию»</div>
          </div>
        )}
        {cats.map((cat, ci) => {
          const isOpen = expandedCat[ci] !== false;
          const isDraggingOver = dragCatOver === ci && dragCat.current !== null && dragCat.current !== ci;
          return (
            <div key={ci}
              onDragOver={e=>{e.preventDefault();setDragCatOver(ci);}}
              onDrop={catDragEnd}
              style={{background:'var(--bg2)',border:`1px solid ${isDraggingOver?'var(--accent)':'var(--border)'}`,borderRadius:14,marginBottom:12,overflow:'hidden',opacity:dragCat.current===ci?0.45:1,transition:'border-color .15s,opacity .15s'}}>
              {/* Шапка категории */}
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
                <div className="drag-handle btn-icon"
                  draggable
                  onDragStart={()=>{dragCat.current=ci;}}
                  onDragEnd={catDragEnd}
                  style={{cursor:'grab',flexShrink:0}}
                  title="Перетащить категорию">
                  <Ico name="GripVertical" size={16}/>
                </div>
                <button className="btn-icon" style={{fontSize:16,flexShrink:0}} onClick={()=>setExpandedCat(p=>({...p,[ci]:!isOpen}))}>
                  {isOpen ? '▾' : '▸'}
                </button>
                <input className="inp" style={{flex:1,fontWeight:700,fontSize:14,padding:'6px 10px'}}
                  value={cat.label||''} onChange={e=>catUpdateField(ci,'label',e.target.value)}
                  placeholder="🕹️ Название категории"/>
                <input className="inp mono" style={{width:90,fontSize:11,padding:'6px 8px'}}
                  value={cat.id||''} onChange={e=>catUpdateField(ci,'id',e.target.value)}
                  placeholder="id"/>
                <span style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>{(cat.games||[]).length} игр</span>
                <button className="btn-icon" style={{color:'var(--red)'}} onClick={()=>catRemove(ci)}>
                  <Ico name="Trash2" size={15}/>
                </button>
              </div>

              {isOpen && (
                <div style={{padding:'10px 14px 14px'}}>
                  {/* Список игр */}
                  {(cat.games||[]).map((game, gi) => (
                    <div key={gi}
                      className={dragGameOver===gi&&dragGame.current!==null?'is-dragging':''}
                      onDragOver={e=>{e.preventDefault();setDragGameOver(gi);}}
                      onDrop={()=>gameDragEnd(ci)}
                      style={{display:'grid',gridTemplateColumns:'24px 44px 1fr 1fr 1fr 36px',gap:6,alignItems:'center',
                        padding:'8px 10px',background:'var(--bg3)',border:'1px solid var(--border)',
                        borderRadius:10,marginBottom:6}}>
                      <div className="drag-handle btn-icon" draggable
                        onDragStart={()=>{dragGame.current=gi;}}
                        onDragEnd={()=>gameDragEnd(ci)}>
                        <Ico name="GripVertical" size={14}/>
                      </div>
                      {/* Иконка */}
                      <input className="inp" style={{textAlign:'center',fontSize:20,padding:'4px',height:38}}
                        value={game.icon||''} onChange={e=>catUpdateGame(ci,gi,'icon',e.target.value)}
                        placeholder="🎮" title="Иконка (эмодзи)"/>
                      {/* Название */}
                      <input className="inp" style={{fontSize:13,padding:'6px 10px'}}
                        value={game.name||''} onChange={e=>catUpdateGame(ci,gi,'name',e.target.value)}
                        placeholder="Название игры"/>
                      {/* Описание */}
                      <input className="inp" style={{fontSize:12,padding:'6px 10px',color:'var(--text2)'}}
                        value={game.desc||''} onChange={e=>catUpdateGame(ci,gi,'desc',e.target.value)}
                        placeholder="Короткое описание"/>
                      {/* Файл */}
                      <input className="inp mono" style={{fontSize:11,padding:'6px 8px'}}
                        value={game.file||''} onChange={e=>catUpdateGame(ci,gi,'file',e.target.value)}
                        placeholder="game.html"/>
                      <button className="btn-icon" style={{color:'var(--red)'}} onClick={()=>catRemoveGame(ci,gi)}>
                        <Ico name="X" size={15}/>
                      </button>
                    </div>
                  ))}
                  <button className="btn btn-ghost btn-sm" style={{marginTop:4,width:'100%',justifyContent:'center'}}
                    onClick={()=>catAddGame(ci)}>
                    <Ico name="Plus" size={13}/>Добавить игру
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  // ── РЕНДЕР МАССИВА (workouts) ────────────────────────────
  const renderArrayFormat = () => {
    const arr = Array.isArray(parsed) ? parsed : [];
    return (
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 24px'}}>
        {arr.length === 0 && (
          <div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)'}}>
            <div style={{fontSize:36,marginBottom:8}}>📋</div>
            <div style={{fontSize:13}}>Список пуст. Нажмите «Добавить»</div>
          </div>
        )}
        {arr.map((item, i) => {
          const isStr = typeof item === 'string';
          return (
            <div key={i}
              className={dragArrOver===i?'is-dragging':''}
              onDragOver={e=>{e.preventDefault();setDragArrOver(i);}}
              onDrop={arrDragEnd}
              style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,marginBottom:8,overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
                <div className="drag-handle btn-icon" draggable
                  onDragStart={()=>{dragArrIdx.current=i;}}
                  onDragEnd={arrDragEnd} style={{cursor:'grab'}}>
                  <Ico name="GripVertical" size={16}/>
                </div>
                <span style={{fontSize:12,color:'var(--text3)',fontWeight:700,flex:1}}>
                  #{i+1} {isStr ? item : (item.title||item.file||'—')}
                </span>
                <button className="btn-icon" style={{color:'var(--red)'}} onClick={()=>arrRemove(i)}>
                  <Ico name="Trash2" size={15}/>
                </button>
              </div>
              {isStr ? (
                <div style={{padding:'10px 12px'}}>
                  <input className="inp" value={item}
                    onChange={e=>{const n=[...arr];n[i]=e.target.value;syncRaw(n);}}
                    placeholder="file.json"/>
                </div>
              ) : (
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:8,padding:12}}>
                  <div><FL label="ID"/><input className="inp mono" style={{fontSize:11}} value={item.id||''} onChange={e=>arrUpdate(i,'id',e.target.value)} placeholder="auto"/></div>
                  <div><FL label="Название"/><input className="inp" value={item.title||item.name||''} onChange={e=>arrUpdate(i,'title',e.target.value)} placeholder="Название"/></div>
                  <div><FL label="Файл"/><input className="inp mono" style={{fontSize:11}} value={item.file||item.filename||''} onChange={e=>arrUpdate(i,'file',e.target.value)} placeholder="file.json"/></div>
                  <div><FL label="Категория"/><input className="inp" style={{fontSize:12}} value={item.category||''} onChange={e=>arrUpdate(i,'category',e.target.value)} placeholder="rehab / hiit / ..."/></div>
                  <div style={{gridColumn:'1/-1'}}><FL label="Описание"/>
                    <textarea className="inp" style={{resize:'vertical',minHeight:52,fontSize:12}}
                      value={item.description||''} onChange={e=>arrUpdate(i,'description',e.target.value)} placeholder="Описание..."/>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  // ── TOOLBAR ──────────────────────────────────────────────
  const toolbarAddBtn = () => {
    if (jsonMode) return null;
    if (isCatFormat) return (
      <button className="btn btn-ghost btn-sm" onClick={catAdd}>
        <Ico name="Plus" size={13}/>Категорию
      </button>
    );
    if (isArrayFormat) return (
      <button className="btn btn-ghost btn-sm" onClick={arrAdd}>
        <Ico name="Plus" size={13}/>Добавить
      </button>
    );
    return null;
  };

  // ── MAIN RENDER ──────────────────────────────────────────
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{display:'flex',gap:8,alignItems:'center',padding:'12px 16px',borderBottom:'1px solid var(--border)',flexShrink:0,flexWrap:'wrap'}}>
        <div className="title-font" style={{fontSize:13,fontWeight:600,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{path}</div>
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',flexShrink:0}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setJsonMode(!jsonMode)}>
            <Ico name={jsonMode?'Table':'Code2'} size={13}/>{jsonMode?'Таблица':'JSON'}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={load} disabled={loading}>
            <Ico name="RefreshCw" size={13} cls={loading?'spin':''}/>
          </button>
          {toolbarAddBtn()}
          <button className="btn btn-primary btn-sm" onClick={save} disabled={saving||loading}>
            <Ico name={saving?'Loader2':'Save'} size={13} cls={saving?'spin':''}/>
            {saving?'Сохр...':'Сохранить'}
          </button>
        </div>
      </div>

      {loading ? (
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',flexDirection:'column',gap:10}}>
          <Ico name="Loader2" size={32} cls="spin"/>
          <span style={{fontSize:13}}>Загрузка {path}...</span>
        </div>
      ) : jsonMode ? (
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',padding:16}}>
          {parseErr && <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.2)',borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--red)',marginBottom:8,flexShrink:0}}>{parseErr}</div>}
          <div className="json-container" style={{border:'1.5px solid var(--accent)',flex:1}}>
            <textarea className="json-ta" spellCheck="false" value={raw}
              onChange={e=>{
                setRaw(e.target.value);
                try { setParsed(JSON.parse(e.target.value)); setParseErr(null); }
                catch(ex) { setParseErr(ex.message); }
              }}
              onScroll={e=>{ if(preRef.current){preRef.current.scrollTop=e.target.scrollTop;preRef.current.scrollLeft=e.target.scrollLeft;}}}
            />
            <pre className="json-pre" ref={preRef} aria-hidden><code dangerouslySetInnerHTML={{__html:hlJson(raw)}}/></pre>
          </div>
        </div>
      ) : parsed === null ? null
        : isCatFormat   ? renderCatFormat()
        : isArrayFormat ? renderArrayFormat()
        : (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,color:'var(--text3)'}}>
            <div style={{fontSize:36}}>⚠️</div>
            <div style={{fontSize:13}}>Неизвестный формат. Используйте вкладку JSON для редактирования.</div>
          </div>
        )
      }
    </div>
  );
};

// ═══ MAIN APP ═════════════════════════════════════════════
const App = () => {
  const [programs, setPrograms]   = useState([]);
  const [activeId, setActiveId]   = useState(null);
  const [cfg, setCfg]             = useState({ token:'', owner:'kutya001', repo:'mcgill' });
  const [showSettings, setShowSettings] = useState(false);
  const [notif, setNotif]         = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [mobileTab, setMobileTab] = useState('editor'); // editor | json | sidebar
  const [mainTab, setMainTab]     = useState('editor'); // editor | workouts-index | games-index

  // JSON editor
  const [rawJson, setRawJson]     = useState('');
  const [jsonEditing, setJsonEditing] = useState(false);
  const [jsonError, setJsonError] = useState(null);
  const [showJsonCol, setShowJsonCol] = useState(false);

  // Editor UI
  const [collapsed, setCollapsed] = useState({});
  const [detailsOpen, setDetailsOpen] = useState({});

  // Sync
  const [sync, setSync] = useState({ saving:false, loadingList:false, loadingProg:false, deleting:false });

  // Drag & drop
  const dragEx   = useRef(null);
  const dragExTo = useRef(null);
  const [draggingEx, setDraggingEx] = useState(null);
  const dragStep   = useRef(null);
  const dragStepTo = useRef(null);
  const [draggingStep, setDraggingStep] = useState(null);

  const gh = useGitHub(cfg);
  const notify = (type, msg) => setNotif({ type, msg });

  useEffect(() => {
    try {
      const p = localStorage.getItem('cms_programs'); if (p) setPrograms(JSON.parse(p));
      const c = localStorage.getItem('cms_cfg');      if (c) setCfg(JSON.parse(c));
    } catch(e) {}
  }, []);

  useEffect(() => { if (programs.length) localStorage.setItem('cms_programs', JSON.stringify(programs)); }, [programs]);

  const active = programs.find(p => p.id === activeId);

  useEffect(() => {
    if (active && !jsonEditing) {
      const j = JSON.stringify(toGH(active), null, 2);
      setRawJson(j);
      localStorage.setItem('cms_live_json', j);
    }
  }, [active, jsonEditing]);

  const updateActive = upd => setPrograms(p => p.map(x => x.id === activeId ? {...x, ...upd} : x));

  // STATS
  const stats = useMemo(() => {
    if (!active) return { time:0, sets:0, blocks:0 };
    let time=0, sets=0;
    (active.exercises||[]).forEach(ex => (ex.steps||[]).forEach(s => { time+=+s.time||0; if(s.type==='work') sets++; }));
    return { time, sets, blocks: (active.exercises||[]).length };
  }, [active]);

  const exStats = ex => {
    let time=0, sets=0;
    (ex.steps||[]).forEach(s => { time+=+s.time||0; if(s.type==='work') sets++; });
    return { time, sets };
  };

  // EXERCISES
  const addEx    = () => { const e = newEx(); updateActive({ exercises:[...(active.exercises||[]),e] }); setCollapsed(p=>({...p,[e.id]:false})); };
  const removeEx = id => updateActive({ exercises: active.exercises.filter(e=>e.id!==id) });
  const updateExName = (id,v) => updateActive({ exercises: active.exercises.map(e=>e.id===id?{...e,name:v}:e) });
  const updateExDetail = (id,f,v) => updateActive({ exercises: active.exercises.map(e=>e.id===id?{...e,details:{...e.details,[f]:v}}:e) });

  // STEPS
  const addStep    = (exId,type='work') => { const s={id:uid(),type,phase:type==='rest'?'Отдых':type==='prep'?'Подготовка':'Подход',time:60,voiceTxt:''}; updateActive({exercises:active.exercises.map(e=>e.id===exId?{...e,steps:[...e.steps,s]}:e)}); };
  const updateStep = (exId,sId,f,v) => updateActive({exercises:active.exercises.map(e=>e.id===exId?{...e,steps:e.steps.map(s=>s.id===sId?{...s,[f]:v}:s)}:e)});
  const removeStep = (exId,sId) => updateActive({exercises:active.exercises.map(e=>e.id===exId?{...e,steps:e.steps.filter(s=>s.id!==sId)}:e)});
  const genSteps   = (exId,sets,work,rest) => {
    const steps=[{id:uid(),type:'prep',phase:'Подготовка',time:15,voiceTxt:'Приготовьтесь'}];
    for(let i=1;i<=sets;i++){
      steps.push({id:uid(),type:'work',phase:`Подход ${i}`,time:+work,voiceTxt:i===1?'Начали':''});
      if(i<sets&&rest>0) steps.push({id:uid(),type:'rest',phase:'Отдых',time:+rest,voiceTxt:'Отдых'});
    }
    updateActive({exercises:active.exercises.map(e=>e.id===exId?{...e,steps}:e)});
  };

  // D&D exercises
  const exDragStart = (e,i) => { dragEx.current=i; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',i+''); setTimeout(()=>setDraggingEx(i),0); };
  const exDragEnd   = () => { setDraggingEx(null); if(dragEx.current!==null&&dragExTo.current!==null&&dragEx.current!==dragExTo.current){const a=[...active.exercises];const[item]=a.splice(dragEx.current,1);a.splice(dragExTo.current,0,item);updateActive({exercises:a});} dragEx.current=null; dragExTo.current=null; };

  // D&D steps
  const stepDragStart = (e,exId,i) => { dragStep.current={exId,i}; e.dataTransfer.setData('text/plain',i+''); setTimeout(()=>setDraggingStep({exId,i}),0); };
  const stepDragEnd   = exId => { setDraggingStep(null); if(dragStep.current&&dragStepTo.current&&dragStep.current.exId===exId&&dragStepTo.current.exId===exId&&dragStep.current.i!==dragStepTo.current.i){const eI=active.exercises.findIndex(e=>e.id===exId);const s=[...active.exercises[eI].steps];const[item]=s.splice(dragStep.current.i,1);s.splice(dragStepTo.current.i,0,item);updateActive({exercises:active.exercises.map(e=>e.id===exId?{...e,steps:s}:e)});} dragStep.current=null; dragStepTo.current=null; };

  // GITHUB
  const fetchList = async () => {
    if (!cfg.token) { setShowSettings(true); return; }
    setSync(s=>({...s,loadingList:true}));
    try {
      const files = (await gh.listDir('workouts')).filter(f=>f.type==='file'&&f.name.endsWith('.json')&&f.name!=='index.json');
      let index = [];
      try { const f=await gh.getFile('workouts/index.json'); if(f) index=JSON.parse(b64dec(f.content)); } catch(e){}
      if(!Array.isArray(index)) index=[];
      const progs = files.map(f=>{
        const meta = index.find(m=>(typeof m==='object')&&(m.file===f.name||m.filename===f.name)) || {};
        return { id:meta.id||uid(), title:meta.title||f.name.replace('.json','').replace(/_/g,' '), filename:f.name, description:meta.description||'', fileSha:f.sha };
      });
      setPrograms(progs); setActiveId(null); notify('success',`Загружено: ${progs.length} программ`);
    } catch(e) { notify('error', e.message); }
    setSync(s=>({...s,loadingList:false}));
  };

  const selectProg = async prog => {
    setActiveId(prog.id); setSidebarOpen(false); setJsonEditing(false); setCollapsed({});
    setMainTab('editor');
    if (mobileTab === 'sidebar') setMobileTab('editor');
    if (prog.exercises) return;
    if (!cfg.token) { notify('info','Нужен токен для загрузки'); return; }
    setSync(s=>({...s,loadingProg:true}));
    try {
      const f = await gh.getFile(`workouts/${prog.filename}`);
      if (!f) { setPrograms(p=>p.map(x=>x.id===prog.id?{...x,exercises:[]}:x)); throw new Error('Файл не найден'); }
      setPrograms(p=>p.map(x=>x.id===prog.id?{...x,...fromGH(JSON.parse(b64dec(f.content))),fileSha:f.sha}:x));
    } catch(e) { notify('error',e.message); }
    setSync(s=>({...s,loadingProg:false}));
  };

  const saveProg = async () => {
    if (!cfg.token) { setShowSettings(true); return; }
    setSync(s=>({...s,saving:true}));
    try {
      const path = `workouts/${active.filename}`;
      let sha = active.fileSha;
      if (!sha) { const f=await gh.getFile(path); if(f) sha=f.sha; }
      const res = await gh.putFile(path, JSON.stringify(toGH(active),null,2), sha, `CMS: ${active.title}`);
      updateActive({ fileSha: res.content.sha });

      // Update index
      const idxFile = await gh.getFile('workouts/index.json');
      let idx = idxFile ? JSON.parse(b64dec(idxFile.content)) : [];
      if (!Array.isArray(idx)) idx = [];
      const entry = { id:active.id, title:active.title, file:active.filename, description:active.description };
      const ei = idx.findIndex(m=>(typeof m==='object')&&(m.id===active.id||m.file===active.filename));
      if (ei>-1) idx[ei]=entry; else idx.push(entry);
      await gh.putFile('workouts/index.json', JSON.stringify(idx,null,2), idxFile?.sha, 'CMS: Update index');
      notify('success','Сохранено в GitHub');
    } catch(e) { notify('error',e.message); }
    setSync(s=>({...s,saving:false}));
  };

  const deleteProg = async () => {
    if (!confirm(`Удалить "${active.title}"?`)) return;
    setSync(s=>({...s,deleting:true}));
    try {
      if (cfg.token && active.fileSha) {
        await gh.deleteFile(`workouts/${active.filename}`, active.fileSha, `CMS: Delete ${active.title}`);
        const idxFile = await gh.getFile('workouts/index.json');
        if (idxFile) {
          let idx = JSON.parse(b64dec(idxFile.content)).filter(m=>typeof m!=='object'||(m.id!==active.id&&m.file!==active.filename));
          await gh.putFile('workouts/index.json', JSON.stringify(idx,null,2), idxFile.sha, 'CMS: Index after delete');
        }
      }
      setPrograms(p=>p.filter(x=>x.id!==active.id)); setActiveId(null); notify('success','Удалено');
    } catch(e) { notify('error',e.message); }
    setSync(s=>({...s,deleting:false}));
  };

  const applyJson = () => {
    try { updateActive(fromGH(JSON.parse(rawJson))); setJsonEditing(false); setJsonError(null); notify('success','JSON применён'); }
    catch(e) { setJsonError(`Синтаксическая ошибка: ${e.message}`); }
  };

  const collapseAll = () => {
    const any = active.exercises.some(e=>!collapsed[e.id]);
    const next = {}; active.exercises.forEach(e=>next[e.id]=any);
    setCollapsed(next);
  };

  const STEP_COLORS = { prep:{label:'Подготовка',color:'var(--yellow)'}, work:{label:'Работа',color:'var(--blue)'}, rest:{label:'Отдых',color:'var(--green)'}, finish:{label:'Финиш',color:'var(--red)'} };

  // ── SIDEBAR ──────────────────────────────────────────────
  const Sidebar = () => (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)',borderRight:'1px solid var(--border)'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div className="title-font" style={{fontSize:14,fontWeight:700,color:'var(--text)',display:'flex',alignItems:'center',gap:7}}><Ico name="Dumbbell" size={16}/>CMS</div>
        <div style={{display:'flex',gap:4}}>
          <button className="btn-icon" onClick={()=>setShowSettings(true)}><Ico name="Settings" size={16}/></button>
          <button className="btn-icon desktop-only" onClick={()=>setSidebarOpen(false)}><Ico name="X" size={18}/></button>
        </div>
      </div>

      {/* Tabs: Programs / Indexes */}
      <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',display:'flex',gap:4,flexShrink:0}}>
        <button className={`tab-btn ${mainTab==='editor'?'active':''}`} style={{fontSize:12,padding:'6px 10px'}} onClick={()=>setMainTab('editor')}>Программы</button>
        <button className={`tab-btn ${mainTab==='workouts-index'?'active':''}`} style={{fontSize:12,padding:'6px 10px'}} onClick={()=>{setMainTab('workouts-index');setSidebarOpen(false);}}>workouts/</button>
        <button className={`tab-btn ${mainTab==='games-index'?'active':''}`} style={{fontSize:12,padding:'6px 10px'}} onClick={()=>{setMainTab('games-index');setSidebarOpen(false);}}>games/</button>
      </div>

      {mainTab === 'editor' && <>
        <div style={{padding:'10px',display:'flex',gap:6,flexShrink:0}}>
          <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={()=>{const p=newProg();setPrograms(x=>[...x,p]);setActiveId(p.id);setSidebarOpen(false);setMainTab('editor');}}>
            <Ico name="Plus" size={15}/>Создать
          </button>
          <button className="btn btn-ghost btn-sm" onClick={fetchList} disabled={sync.loadingList} title="Загрузить список из GitHub">
            <Ico name="RefreshCw" size={15} cls={sync.loadingList?'spin':''}/>
          </button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'0 8px 8px'}}>
          {programs.length===0 && <div style={{textAlign:'center',padding:'32px 16px',color:'var(--text3)',fontSize:13}}>Нет программ.<br/>Создайте или загрузите из GitHub.</div>}
          {programs.map(p=>(
            <div key={p.id} className={`prog-item ${activeId===p.id&&mainTab==='editor'?'active':''}`} onClick={()=>selectProg(p)}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.title||'Без названия'}</div>
              <div className="mono" style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',display:'flex',alignItems:'center',gap:4}}>
                {!p.exercises && <Ico name="Cloud" size={11}/>}
                {p.filename}
              </div>
            </div>
          ))}
        </div>
      </>}
    </div>
  );

  // ── EDITOR ────────────────────────────────────────────────
  const Editor = () => {
    if (sync.loadingProg) return (
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'var(--text3)'}}>
        <Ico name="Loader2" size={40} cls="spin"/><span>Загрузка...</span>
      </div>
    );
    if (!active) return (
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,color:'var(--text3)'}}>
        <div style={{width:72,height:72,background:'var(--bg3)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico name="FileJson" size={32}/></div>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:16,fontWeight:600,color:'var(--text2)',marginBottom:4}}>Выберите программу</div>
          <div style={{fontSize:13}}>или создайте новую</div>
        </div>
        <button className="btn btn-ghost" onClick={()=>setSidebarOpen(true)}><Ico name="Menu" size={16}/>Открыть список</button>
      </div>
    );

    return (
      <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
        <div style={{maxWidth:780,margin:'0 auto',display:'flex',flexDirection:'column',gap:16}}>

          {/* Meta */}
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:16,padding:'16px 20px',display:'flex',flexDirection:'column',gap:12}}>
            <input className="inp" style={{background:'transparent',border:'none',borderBottom:'1.5px solid var(--border)',borderRadius:0,padding:'4px 0',fontSize:20,fontWeight:700,fontFamily:'Unbounded,sans-serif'}}
              value={active.title} onChange={e=>updateActive({title:e.target.value})} placeholder="Название программы"/>

            {/* Stats */}
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              <div className="stat-pill"><Ico name="Clock" size={13}/>Время: {fmtTime(stats.time)}</div>
              <div className="stat-pill"><Ico name="Activity" size={13}/>Подходов: {stats.sets}</div>
              <div className="stat-pill"><Ico name="Layers" size={13}/>Блоков: {stats.blocks}</div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
              <div>
                <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:6}}>Файл (GitHub)</div>
                <input className="inp mono" style={{fontSize:12}} value={active.filename} onChange={e=>updateActive({filename:e.target.value})} placeholder="file_name.json"/>
              </div>
            </div>

            <div>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:6}}>Описание</div>
              <textarea className="inp" style={{resize:'vertical',minHeight:64,fontSize:13}} value={active.description} onChange={e=>updateActive({description:e.target.value})} placeholder="Описание тренировки..."/>
            </div>
          </div>

          {/* Exercises header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:700,display:'flex',alignItems:'center',gap:8}}><Ico name="ListChecks" size={16} cls="text-accent"/>Блоки и упражнения</div>
            <button className="btn btn-ghost btn-sm" onClick={collapseAll}><Ico name="UnfoldVertical" size={13}/>Свернуть/Развернуть</button>
          </div>

          {/* Exercise cards */}
          {(active.exercises||[]).map((ex, idx) => {
            const isC = collapsed[ex.id];
            const es  = exStats(ex);
            return (
              <div key={ex.id} className={`ex-card ${draggingEx===idx?'is-dragging':''}`}
                onDragOver={e=>{e.preventDefault();dragExTo.current=idx;}}>

                {/* Card header */}
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 14px',borderBottom:isC?'none':'1px solid var(--border)',flexWrap:'wrap'}}>
                  <div className="drag-handle btn-icon" draggable onDragStart={e=>exDragStart(e,idx)} onDragEnd={exDragEnd}><Ico name="GripVertical" size={18}/></div>
                  <div style={{width:26,height:26,borderRadius:'50%',background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--text2)',flexShrink:0}}>{idx+1}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <input style={{background:'transparent',border:'none',outline:'none',color:'var(--text)',fontFamily:'Onest,sans-serif',fontSize:16,fontWeight:700,width:'100%'}}
                      value={ex.name} onChange={e=>updateExName(ex.id,e.target.value)} placeholder="Название блока"/>
                    <div style={{display:'flex',gap:10,marginTop:3}}>
                      <span style={{fontSize:11,color:'var(--text3)',display:'flex',alignItems:'center',gap:3}}><Ico name="Clock" size={11}/>{fmtTime(es.time)}</span>
                      <span style={{fontSize:11,color:'var(--text3)',display:'flex',alignItems:'center',gap:3}}><Ico name="Activity" size={11}/>{es.sets} подх.</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,alignItems:'center',flexShrink:0}}>
                    <button className="btn-icon" onClick={()=>setCollapsed(p=>({...p,[ex.id]:!p[ex.id]}))} title={isC?'Развернуть':'Свернуть'}><Ico name={isC?'ChevronDown':'ChevronUp'} size={18}/></button>
                    {!isC && <button className="btn-icon" style={{color:'var(--red)'}} onClick={()=>removeEx(ex.id)}><Ico name="Trash2" size={16}/></button>}
                  </div>
                </div>

                {/* Card body */}
                {!isC && (
                  <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>

                    {/* Details toggle */}
                    <button style={{background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:5,padding:0,paddingLeft:4}}
                      onClick={()=>setDetailsOpen(p=>({...p,[ex.id]:!p[ex.id]}))}>
                      <Ico name={detailsOpen[ex.id]?'ChevronUp':'ChevronDown'} size={13}/>
                      {detailsOpen[ex.id]?'Скрыть детали':'Детали (цель, позиция, движение)'}
                    </button>

                    {detailsOpen[ex.id] && (
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8,paddingLeft:4,paddingBottom:4}}>
                        {['goal','start','move'].map(f=>(
                          <div key={f}>
                            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.4px',marginBottom:4}}>{{goal:'Цель',start:'Позиция',move:'Движение'}[f]}</div>
                            <input className="inp" style={{fontSize:12}} value={ex.details?.[f]||''} onChange={e=>updateExDetail(ex.id,f,e.target.value)} placeholder="..."/>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Steps */}
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                      {(ex.steps||[]).map((s,si)=>{
                        const sc = STEP_COLORS[s.type] || STEP_COLORS.work;
                        const isDS = draggingStep?.exId===ex.id && draggingStep?.si===si;
                        return (
                          <div key={s.id} className={`step-row ${isDS?'is-dragging':''}`}
                            onDragOver={e=>{e.preventDefault();dragStepTo.current={exId:ex.id,i:si};}}>
                            <div className="drag-handle btn-icon" draggable onDragStart={e=>stepDragStart(e,ex.id,si)} onDragEnd={()=>stepDragEnd(ex.id)} style={{flexShrink:0}}>
                              <Ico name="GripVertical" size={14}/>
                            </div>

                            {/* Type select */}
                            <select className="inp" style={{width:110,padding:'5px 8px',fontSize:12,flexShrink:0,border:'none',color:sc.color,background:'var(--bg4)',fontWeight:600}}
                              value={s.type} onChange={e=>updateStep(ex.id,s.id,'type',e.target.value)}>
                              <option value="prep">⏱ Подготовка</option>
                              <option value="work">💪 Работа</option>
                              <option value="rest">😴 Отдых</option>
                              <option value="finish">🏁 Финиш</option>
                            </select>

                            {/* Phase name */}
                            <input className="inp" style={{width:100,padding:'5px 8px',fontSize:12,flexShrink:0}} value={s.phase} onChange={e=>updateStep(ex.id,s.id,'phase',e.target.value)} placeholder="Подход 1"/>

                            {/* Time */}
                            <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                              <Ico name="Timer" size={13} cls=""/>
                              <input className="inp" style={{width:54,padding:'5px 6px',fontSize:12,textAlign:'center'}} type="number" min="0" value={s.time} onChange={e=>updateStep(ex.id,s.id,'time',e.target.value)}/>
                              <span style={{fontSize:11,color:'var(--text3)'}}>с</span>
                            </div>

                            {/* Voice */}
                            <div style={{display:'flex',alignItems:'center',gap:4,flex:1,minWidth:100}}>
                              <Ico name="Volume2" size={13}/>
                              <input className="inp" style={{fontSize:12,padding:'5px 8px'}} value={s.voiceTxt} onChange={e=>updateStep(ex.id,s.id,'voiceTxt',e.target.value)} placeholder="Текст озвучки..."/>
                            </div>

                            <button className="btn-icon" style={{color:'var(--text3)',flexShrink:0}} onClick={()=>removeStep(ex.id,s.id)}><Ico name="X" size={15}/></button>
                          </div>
                        );
                      })}
                    </div>

                    {/* Add step buttons */}
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,paddingLeft:4}}>
                      {[['prep','⏱ Разминка'],['work','💪 Подход'],['rest','😴 Отдых'],['finish','🏁 Финиш']].map(([t,l])=>(
                        <button key={t} className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>addStep(ex.id,t)}>+{l}</button>
                      ))}
                    </div>

                    <StepGen onGenerate={(sets,work,rest)=>genSteps(ex.id,sets,work,rest)}/>
                  </div>
                )}
              </div>
            );
          })}

          {/* Add exercise */}
          <button style={{width:'100%',padding:'16px',border:'2px dashed var(--border)',borderRadius:16,color:'var(--text3)',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:14,fontWeight:600,transition:'all .15s'}}
            onMouseEnter={e=>{e.target.style.borderColor='var(--accent)';e.target.style.color='var(--accent)';}}
            onMouseLeave={e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text3)';}}
            onClick={addEx}>
            <Ico name="Plus" size={20}/>Добавить блок
          </button>
        </div>
      </div>
    );
  };

  // ── RENDER ────────────────────────────────────────────────
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',position:'relative'}}>
      <Notif notif={notif} setNotif={setNotif}/>

      {/* SIDEBAR — desktop always visible, mobile = overlay */}
      {(sidebarOpen || window.innerWidth >= 768) && (
        <div style={{width:240,flexShrink:0,height:'100%',overflow:'hidden',display:'flex',flexDirection:'column',zIndex:sidebarOpen?200:1,
          ...(window.innerWidth<768 ? {position:'fixed',top:0,left:0,bottom:0,right:0,width:'100%'} : {})}}>
          {sidebarOpen && window.innerWidth < 768 && <div onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:-1}}/>}
          <div style={{...(window.innerWidth<768?{width:'85%',maxWidth:320,height:'100%',position:'relative',zIndex:1}:{width:'100%',height:'100%'})}}>
            <Sidebar/>
          </div>
        </div>
      )}

      {/* MAIN AREA */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

        {/* Top bar */}
        {active && mainTab==='editor' && (
          <div style={{background:'var(--bg2)',borderBottom:'1px solid var(--border)',padding:'10px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap'}}>
            <button className="btn-icon" onClick={()=>setSidebarOpen(true)} style={{display:'flex'}}><Ico name="Menu" size={20}/></button>

            <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:8}}>
              <div className="mono" style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{active.filename}</div>
            </div>

            <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
              {/* JSON toggle on tablet */}
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowJsonCol(p=>!p)} title="JSON Preview">
                <Ico name="Code2" size={14}/><span style={{display:'none'}}>JSON</span>
              </button>
              <button className="btn btn-ghost btn-sm" onClick={saveProg} disabled={sync.saving||sync.loadingProg||!active.exercises}>
                <Ico name={sync.saving?'Loader2':'Github'} size={15} cls={sync.saving?'spin':''}/>{sync.saving?'Сохр...':'Сохранить'}
              </button>
              <button className="btn btn-danger btn-sm" onClick={deleteProg} disabled={sync.deleting}>
                <Ico name={sync.deleting?'Loader2':'Trash2'} size={14} cls={sync.deleting?'spin':''}/>
              </button>
            </div>
          </div>
        )}

        {/* Content area */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>

          {/* Main tab content */}
          {mainTab === 'workouts-index' || mainTab === 'games-index' ? (
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                <button className="btn-icon" onClick={()=>setSidebarOpen(true)}><Ico name="Menu" size={18}/></button>
                <div style={{display:'flex',gap:6}}>
                  <button className={`tab-btn ${mainTab==='workouts-index'?'active':''}`} style={{fontSize:12}} onClick={()=>setMainTab('workouts-index')}>workouts/index.json</button>
                  <button className={`tab-btn ${mainTab==='games-index'?'active':''}`} style={{fontSize:12}} onClick={()=>setMainTab('games-index')}>games/index.json</button>
                </div>
              </div>
              <div style={{flex:1,overflow:'hidden'}}>
                <IndexEditor gh={gh} cfg={cfg} notify={notify} indexKey={mainTab==='workouts-index'?'workouts':'games'}/>
              </div>
            </div>
          ) : (
            <>
              {/* Editor */}
              {(mobileTab==='editor'||window.innerWidth>=768) && (
                <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                  <Editor/>
                </div>
              )}

              {/* JSON col */}
              {(showJsonCol || mobileTab==='json') && active && (
                <div style={{
                  width: showJsonCol && window.innerWidth>=768 ? 400 : '100%',
                  borderLeft:'1px solid var(--border)',
                  display:'flex', flexDirection:'column', flexShrink:0,
                  ...(mobileTab==='json'&&window.innerWidth<768 ? {position:'absolute',inset:0,zIndex:50} : {})
                }}>
                  <JsonPanel
                    json={rawJson} onChange={setRawJson}
                    editing={jsonEditing} setEditing={setJsonEditing}
                    onApply={applyJson} error={jsonError}
                  />
                </div>
              )}
            </>
          )}
        </div>
      </div>

      {/* MOBILE BOTTOM NAV */}
      <nav className="mobile-nav">
        <button className={`mobile-nav-btn ${(mobileTab==='sidebar'||sidebarOpen)?'active':''}`} onClick={()=>{setSidebarOpen(!sidebarOpen); setMobileTab('sidebar');}}>
          <Ico name="Menu" size={20}/><span>Меню</span>
        </button>
        <button className={`mobile-nav-btn ${mobileTab==='editor'&&mainTab==='editor'?'active':''}`} onClick={()=>{setMobileTab('editor');setMainTab('editor');setSidebarOpen(false);}}>
          <Ico name="Edit3" size={20}/><span>Редактор</span>
        </button>
        <button className={`mobile-nav-btn ${mobileTab==='json'&&mainTab==='editor'?'active':''}`} onClick={()=>{setMobileTab('json');setMainTab('editor');setSidebarOpen(false);}}>
          <Ico name="Code2" size={20}/><span>JSON</span>
        </button>
        <button className={`mobile-nav-btn ${mainTab==='workouts-index'?'active':''}`} onClick={()=>{setMainTab('workouts-index');setSidebarOpen(false);setMobileTab('editor');}}>
          <Ico name="List" size={20}/><span>Индексы</span>
        </button>
        <button className={`mobile-nav-btn`} onClick={()=>setShowSettings(true)}>
          <Ico name="Settings" size={20}/><span>Настройки</span>
        </button>
      </nav>

      {/* SETTINGS MODAL */}
      {showSettings && (
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false);}}>
          <div className="modal-box">
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div className="title-font" style={{fontSize:14,fontWeight:700,display:'flex',alignItems:'center',gap:8}}><Ico name="Github" size={16}/>Настройки GitHub</div>
              <button className="btn-icon" onClick={()=>setShowSettings(false)}><Ico name="X" size={18}/></button>
            </div>
            <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
              {['owner','repo'].map(k=>(
                <div key={k}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:6}}>{k}</div>
                  <input className="inp mono" style={{fontSize:13}} value={cfg[k]} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} placeholder={k}/>
                </div>
              ))}
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:6}}>Token (PAT)</div>
                <input className="inp mono" style={{fontSize:13}} type="password" value={cfg.token} onChange={e=>setCfg(p=>({...p,token:e.target.value}))} placeholder="ghp_..."/>
              </div>
              <button className="btn btn-primary" style={{justifyContent:'center'}} onClick={()=>{localStorage.setItem('cms_cfg',JSON.stringify(cfg));setShowSettings(false);notify('success','Настройки сохранены');}}>
                <Ico name="Save" size={15}/>Сохранить
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// JSON VIEWER MODE
if (new URLSearchParams(location.search).get('view') === 'json') {
  const Viewer = () => {
    const [json, setJson] = useState(localStorage.getItem('cms_live_json') || '{}');
    useEffect(()=>{
      const h = e => { if(e.key==='cms_live_json') setJson(e.newValue); };
      window.addEventListener('storage', h);
      return ()=>window.removeEventListener('storage',h);
    },[]);
    const preRef = useRef(null);
    return (
      <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)',padding:16,gap:12}}>
        <div className="title-font" style={{fontSize:14,fontWeight:700,color:'var(--text)',display:'flex',alignItems:'center',gap:8,flexShrink:0}}><span style={{color:'var(--accent)'}}>◆</span>Live JSON — Внешнее окно</div>
        <div className="json-container" style={{flex:1,border:'1px solid var(--border)'}}>
          <textarea className="json-ta" readOnly value={json} onScroll={e=>{if(preRef.current){preRef.current.scrollTop=e.target.scrollTop;preRef.current.scrollLeft=e.target.scrollLeft;}}}/>
          <pre className="json-pre" ref={preRef} aria-hidden><code dangerouslySetInnerHTML={{__html:hlJson(json)}}/></pre>
        </div>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<Viewer/>);
} else {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
</script>
</body>
</html>
