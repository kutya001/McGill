<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Неоновое Судоку</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0; user-select: none; touch-action: manipulation;}
:root{--bg:#050508;--s1:rgba(10, 10, 15, 0.85);--s2:#22222f;--t:#f0f0f8;--t2:#8888aa;--g:#00e5a0;--b:#5b8cff;--r:#ff4466;--y:#ffd700}
body{background:var(--bg);color:var(--t);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;overflow:hidden;}

#game-wrapper {
  position: relative;
  width: 100%;
  max-width: 400px;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 40px rgba(0, 229, 160, 0.05);
}

/* Scanlines */
#game-wrapper::after {
  content: " ";
  display: block;
  position: absolute;
  inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 5;
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
}

#top {display:flex;justify-content:space-between;align-items:center;width:min(94vw,360px);padding:8px 0 12px; z-index: 10;}
#timer {font-size:1rem;font-weight:700;color:var(--t); text-shadow: 0 0 8px currentColor;}

#btn-pause {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  backdrop-filter: blur(4px);
}

#board {
  display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:rgba(255,255,255,0.1);
  border:2px solid var(--g); border-radius:4px;width:min(94vw,360px);margin-bottom:15px; z-index: 10;
  box-shadow: 0 0 15px rgba(0, 229, 160, 0.2);
}
.cell {
  aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;
  font-size:clamp(1rem,4vw,1.2rem);cursor:pointer;transition:all .1s;position:relative;
}
.cell.given {font-weight:700;color:var(--t);}
.cell.user {color:var(--g); text-shadow: 0 0 10px var(--g);}
.cell.sel {background:rgba(0, 229, 160, 0.2);}
.cell.err {color:var(--r)!important; text-shadow: 0 0 10px var(--r)!important; background:rgba(255, 68, 102, 0.1);}
.cell.hint-hi {background:rgba(0, 229, 160, 0.1);}
.cell.box-r {border-right:2px solid var(--g);}
.cell.box-b {border-bottom:2px solid var(--g);}

#numpad {display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:min(94vw,360px); z-index: 10;}
.nBtn {
  background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:12px 4px;
  font-size:1.2rem;font-weight:700;color:var(--t);cursor:pointer;transition:all .1s; font-family: inherit;
}
.nBtn:active {background:rgba(255,255,255,0.1); transform:scale(0.95);}

#actions {display:flex;gap:10px;width:min(94vw,360px);margin-top:15px; z-index: 10;}
.aBtn {
  flex:1;background:transparent;border:1px solid var(--s2);color:var(--t2);border-radius:8px;
  padding:10px 4px;font-family:inherit;font-size:.8rem;cursor:pointer; transition: all 0.2s;
}
.aBtn:active {transform:scale(0.95);}

/* Overlays */
.overlay {
  position: absolute; inset: 0; background: var(--s1); backdrop-filter: blur(6px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.overlay.active { opacity: 1; pointer-events: auto; }

.menu-title {
  font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; text-align: center;
  background: linear-gradient(90deg, var(--g), var(--b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 10px rgba(0, 229, 160, 0.3));
}

.btn {
  background: transparent; color: #fff; border: 2px solid var(--g);
  padding: 12px 30px; border-radius: 12px; font-size: 1rem; font-weight: 700;
  font-family: inherit; cursor: pointer; margin-bottom: 15px; width: 80%; max-width: 250px;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em;
}
.btn:active { transform: scale(0.95); }
.btn-primary { background: var(--g); color: #000; box-shadow: 0 0 20px rgba(0,229,160, 0.4); }

#diff-selectors { display: flex; gap: 8px; margin-bottom: 20px; width: 80%; max-width: 250px; }
.diff-btn {
  flex: 1; background: transparent; border: 1px solid var(--text2); color: var(--text2);
  padding: 8px 0; border-radius: 8px; font-family: inherit; font-size: 0.8rem; cursor: pointer;
  transition: all 0.2s;
}
.diff-btn.active { border-color: var(--g); color: var(--g); background: rgba(0,229,160,0.1); }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="top">
    <div style="width: 36px;"></div>
    <div id="timer">00:00</div>
    <button id="btn-pause">⏸</button>
  </div>

  <div id="board"></div>
  <div id="numpad"></div>

  <div id="actions">
    <button class="aBtn" id="aErase">⌫ Стереть</button>
    <button class="aBtn" id="aHint">💡 Подсказка</button>
  </div>

  <!-- Main Menu Overlay -->
  <div class="overlay active" id="menu-main">
    <div class="menu-title">NEON SUDOKU</div>
    <div style="color:var(--text2); font-size:0.8rem; margin-bottom:10px;">Сложность</div>
    <div id="diff-selectors">
      <button class="diff-btn active" data-d="0">Легко</button>
      <button class="diff-btn" data-d="1">Средне</button>
      <button class="diff-btn" data-d="2">Сложно</button>
    </div>
    <button class="btn btn-primary" id="btn-start">Начать игру</button>
  </div>

  <!-- Pause Menu Overlay -->
  <div class="overlay" id="menu-pause">
    <div class="menu-title" style="background:var(--text); -webkit-text-fill-color:var(--text);">ПАУЗА</div>
    <button class="btn btn-primary" id="btn-resume">Продолжить</button>
    <button class="btn" id="btn-restart" style="border-color:var(--text2); color:var(--text);">Новая игра</button>
    <button class="btn" id="btn-quit" style="border-color:var(--r); color:var(--r);">В меню</button>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay" id="menu-game-over">
    <div class="menu-title" style="background:var(--g); -webkit-text-fill-color:var(--g);">РЕШЕНО!</div>
    <p id="final-time" style="color:var(--t2); margin-bottom:20px;">Время: 00:00</p>
    <button class="btn btn-primary" id="btn-go-menu">В меню</button>
  </div>
</div>

<script>
/**
 * AUDIO SYSTEM
 */
const AudioSys = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
  playTone(freq, type, duration, vol=0.5) {
    if(!this.ctx) return; const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    osc.connect(gain); gain.connect(this.ctx.destination);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
    osc.start(); osc.stop(this.ctx.currentTime + duration);
  },
  sfx: {
    select: () => AudioSys.playTone(400, 'sine', 0.05, 0.1),
    place: () => AudioSys.playTone(600, 'triangle', 0.1, 0.2),
    erase: () => AudioSys.playTone(300, 'triangle', 0.1, 0.2),
    err: () => AudioSys.playTone(200, 'sawtooth', 0.2, 0.3),
    win: () => { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => AudioSys.playTone(f, 'square', 0.15, 0.3), i*100)); }
  }
};

const REMOVE=[30,45,55];
let puzzle,solution,given,selected=null,diff=0,seconds=0,timerID,hints=3;

function gen(){
  // Simple backtracking fill
  const b=Array(81).fill(0);
  fill(b,0);
  return b;
}
function fill(b,pos){
  if(pos===81) return true;
  const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-.5);
  for(const n of nums){
    if(ok(b,pos,n)){b[pos]=n;if(fill(b,pos+1)) return true;b[pos]=0;}
  }
  return false;
}
function ok(b,pos,n){
  const r=Math.floor(pos/9),c=pos%9;
  for(let i=0;i<9;i++){if(b[r*9+i]===n||b[i*9+c]===n) return false;}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++) for(let j=0;j<3;j++){if(b[(br+i)*9+bc+j]===n) return false;}
  return true;
}

function newGame(){
  solution=gen();
  puzzle=solution.slice();
  given=Array(81).fill(false);
  let rem=REMOVE[diff];
  const idxs=[...Array(81).keys()].sort(()=>Math.random()-.5);
  for(let i=0;i<rem;i++) puzzle[idxs[i]]=0;
  for(let i=0;i<81;i++) given[i]=puzzle[i]!==0;
  selected=null; hints=3;
  document.getElementById('aHint').textContent=`💡 Подсказка (3)`;
  clearInterval(timerID); seconds=0; updateTimer();
  timerID=setInterval(()=>{
    if(!document.getElementById('menu-pause').classList.contains('active') && !document.getElementById('menu-main').classList.contains('active')) {
      seconds++;updateTimer();
    }
  },1000);
  render();
  document.querySelectorAll('.overlay').forEach(el=>el.classList.remove('active'));
}

function updateTimer(){
  const m=String(Math.floor(seconds/60)).padStart(2,'0');
  const s=String(seconds%60).padStart(2,'0');
  document.getElementById('timer').textContent=`${m}:${s}`;
}

function render(){
  const bd=document.getElementById('board');
  bd.innerHTML='';
  for(let i=0;i<81;i++){
    const c=document.createElement('div');
    const r=Math.floor(i/9),col=i%9;
    c.className='cell'+(given[i]?' given':puzzle[i]?' user':'')+
      (selected===i?' sel':'')+
      (selected!==null&&puzzle[selected]&&puzzle[i]===puzzle[selected]&&i!==selected?' hint-hi':'')+
      (!ok(puzzle,i,puzzle[i])&&puzzle[i]&&!given[i]?' err':'')+
      (col===2||col===5?' box-r':'')+(r===2||r===5?' box-b':'');
    c.textContent=puzzle[i]||'';
    c.addEventListener('click',()=>{
       selected=i;
       AudioSys.sfx.select();
       render();
    });
    bd.appendChild(c);
  }
}

function input(n){
  if(selected===null||given[selected]) return;
  puzzle[selected]=n;

  if (n === 0) AudioSys.sfx.erase();
  else if (!ok(puzzle, selected, n)) AudioSys.sfx.err();
  else AudioSys.sfx.place();

  render();
  if(puzzle.every((v,i)=>v===solution[i])){
    clearInterval(timerID);
    AudioSys.sfx.win();
    const m=String(Math.floor(seconds/60)).padStart(2,'0'),s=String(seconds%60).padStart(2,'0');
    document.getElementById('final-time').textContent = `Время: ${m}:${s}`;
    document.getElementById('menu-game-over').classList.add('active');
  }
}

document.getElementById('numpad').innerHTML=[1,2,3,4,5,6,7,8,9,'✕'].map(n=>
  `<button class="nBtn" data-n="${n}">${n}</button>`).join('');
document.getElementById('numpad').addEventListener('click',e=>{
  const n=e.target.dataset.n; if(n===undefined) return;
  input(n==='✕'?0:+n);
});

document.getElementById('aErase').addEventListener('click',()=>input(0));
document.getElementById('aHint').addEventListener('click',()=>{
  if(!hints||selected===null||given[selected]) return;
  puzzle[selected]=solution[selected]; hints--; render();
  AudioSys.sfx.place();
  document.getElementById('aHint').textContent=`💡 Подсказка (${hints})`;
});

// UI Bindings
document.getElementById('btn-start').addEventListener('click', () => {
    AudioSys.init();
    newGame();
});

document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>{
  diff=+b.dataset.d;
  document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}));

document.getElementById('btn-pause').addEventListener('click', () => {
   document.getElementById('menu-pause').classList.add('active');
});

document.getElementById('btn-resume').addEventListener('click', () => {
   document.getElementById('menu-pause').classList.remove('active');
});

document.getElementById('btn-restart').addEventListener('click', () => {
   newGame();
});

document.getElementById('btn-quit').addEventListener('click', () => {
   document.getElementById('menu-pause').classList.remove('active');
   document.getElementById('menu-main').classList.add('active');
});

document.getElementById('btn-go-menu').addEventListener('click', () => {
   document.getElementById('menu-game-over').classList.remove('active');
   document.getElementById('menu-main').classList.add('active');
});

document.addEventListener('keydown',e=>{
  if (document.querySelector('.overlay.active')) return;
  if(e.key>='1'&&e.key<='9') input(+e.key);
  if(e.key==='Backspace'||e.key==='Delete') input(0);
  if(!selected) return;
  const r=Math.floor(selected/9),c=selected%9;
  if(e.key==='ArrowRight') { selected=r*9+Math.min(8,c+1); render(); AudioSys.sfx.select(); }
  if(e.key==='ArrowLeft') { selected=r*9+Math.max(0,c-1); render(); AudioSys.sfx.select(); }
  if(e.key==='ArrowDown') { selected=Math.min(80,selected+9); render(); AudioSys.sfx.select(); }
  if(e.key==='ArrowUp') { selected=Math.max(0,selected-9); render(); AudioSys.sfx.select(); }
});
</script>
</body>
</html>
