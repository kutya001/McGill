<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basketball Pro - Physics, Levels & Survival</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --text-main: #f0f0f8;
            --text-muted: #8888aa;
            --accent: #5b8cff;
            --accent-hover: #4671d5;
            --success: #00e5a0;
            --danger: #ff4d4d;
            --ui-bg: rgba(20, 21, 30, 0.95);
            --font-main: 'JetBrains Mono', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            flex-grow: 1;
            z-index: 1;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        .hud-stats {
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: auto;
        }

        .hud-stat-item {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .level-indicator {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(91, 140, 255, 0.5);
        }

        .sound-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            margin-top: 10px;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ui-bg);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(45deg, #ff8c42, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 8px 0;
            box-shadow: 0 4px 15px rgba(91, 140, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 80%;
            max-width: 250px;
        }

        button.survival-btn { background: #ff4d4d; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); }
        button.survival-btn:hover { background: #d33c3c; }

        button:hover, button:active {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        button.secondary {
            background: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-main);
            box-shadow: none;
        }

        /* Level Grid */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .level-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px 0;
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .level-btn.unlocked { border-color: var(--accent); background: rgba(91, 140, 255, 0.1); }
        .level-btn.unlocked:hover { background: var(--accent); color: white; }
        .level-btn.locked { opacity: 0.5; cursor: not-allowed; background: rgba(255, 0, 0, 0.05); }

        /* Skin Grid */
        .skin-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .skin-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .skin-btn:hover { transform: scale(1.1); }
        .skin-btn.selected { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .floating-text {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 15;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }

        #wind-indicator {
            position: absolute;
            top: 80px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .wind-arrow {
            width: 30px;
            height: 2px;
            background: var(--text-muted);
            position: relative;
        }
        .wind-arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 5px solid var(--text-muted);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="hud-stats">
            <div class="hud-stat-item">Счет <span class="hud-stat-value" id="hud-score">0</span></div>
            <div class="hud-stat-item" id="hud-target-container">Цель <span class="hud-stat-value" id="hud-target">0</span></div>
        </div>
        <div class="hud-stats" style="align-items: flex-end;">
            <div class="level-indicator" id="hud-mode-indicator">Уровень <span id="hud-level">1</span></div>
            <div class="hud-stat-item">Мячи <span class="hud-stat-value" id="hud-balls">3</span></div>
            <button class="sound-toggle" onclick="GameApp.toggleSound()" id="hud-sound-btn">🔊</button>
        </div>
    </div>

    <div id="wind-indicator">
        Ветер <div class="wind-arrow" id="wind-arrow"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Main Menu -->
    <div class="screen active" id="screen-menu">
        <h1>BASKETBALL PRO</h1>
        <p class="subtitle">Аналитика траекторий и физика бросков</p>
        <button onclick="GameApp.showLevelSelect()">Кампания</button>
        <button class="survival-btn" onclick="GameApp.startSurvival()">Выживание</button>
        <button class="secondary" onclick="GameApp.showSettings()">Настройки</button>
    </div>

    <!-- Level Select -->
    <div class="screen" id="screen-levels">
        <h2>Кампания</h2>
        <div class="level-grid" id="level-grid"></div>
        <button class="secondary" onclick="GameApp.showMenu()">Назад</button>
    </div>

    <!-- Settings & Skins -->
    <div class="screen" id="screen-settings">
        <h2>Кастомизация</h2>
        <p class="subtitle">Скины мяча</p>
        <div class="skin-grid" id="skin-grid">
            <div class="skin-btn" style="background: radial-gradient(#ffac62, #c25000);" onclick="GameApp.setSkin(0)"></div>
            <div class="skin-btn" style="background: radial-gradient(#00ffff, #0055ff);" onclick="GameApp.setSkin(1)"></div>
            <div class="skin-btn" style="background: radial-gradient(#ffd700, #b8860b);" onclick="GameApp.setSkin(2)"></div>
            <div class="skin-btn" style="background: radial-gradient(#39ff14, #008000);" onclick="GameApp.setSkin(3)"></div>
        </div>
        <button class="secondary" onclick="GameApp.toggleSound()" id="settings-sound-btn">Звук: Вкл</button>
        <button class="secondary" onclick="GameApp.showMenu()">В меню</button>
    </div>

    <!-- Level Complete / Game Over -->
    <div class="screen" id="screen-end">
        <h2 id="end-title">Завершено</h2>
        <p class="subtitle" id="end-stats">Счет: 0</p>
        <button id="end-action-btn" onclick="GameApp.nextLevel()">Далее</button>
        <button class="secondary" onclick="GameApp.showMenu()">В меню</button>
    </div>
</div>

<script>
class Vec2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
    sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
    mult(n) { return new Vec2(this.x * n, this.y * n); }
    div(n) { return new Vec2(this.x / n, this.y / n); }
    magSq() { return this.x * this.x + this.y * this.y; }
    mag() { return Math.sqrt(this.magSq()); }
    normalize() { const m = this.mag(); return m === 0 ? new Vec2() : this.div(m); }
    dot(v) { return this.x * v.x + this.y * v.y; }
    dist(v) { return this.sub(v).mag(); }
    clone() { return new Vec2(this.x, this.y); }
    set(x, y) { this.x = x; this.y = y; return this; }
}

class AudioEngine {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.3;
        this.masterGain.connect(this.ctx.destination);
        this.muted = localStorage.getItem('bball_mute') === 'true';
    }

    resume() { if (this.ctx.state === 'suspended') this.ctx.resume(); }

    setMute(isMuted) {
        this.muted = isMuted;
        localStorage.setItem('bball_mute', isMuted);
    }

    playTone(freq, type, duration, vol=1) {
        if (!this.ctx || this.muted) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playNoise(duration, vol=1) {
        if (!this.ctx || this.muted) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        noise.start();
    }

    bounce() { this.playTone(150, 'sine', 0.2, 0.8); }
    swish() { this.playNoise(0.4, 1.5); }
    score() { this.playTone(440, 'sine', 0.1); setTimeout(()=>this.playTone(660, 'sine', 0.2), 100); }
    error() { this.playTone(200, 'sawtooth', 0.3, 0.5); }
}

class ParticleSystem {
    constructor() { this.particles = []; }
    emit(x, y, count, color, speed, life) {
        for(let i=0; i<count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const v = Math.random() * speed;
            this.particles.push({
                pos: new Vec2(x, y),
                vel: new Vec2(Math.cos(angle) * v, Math.sin(angle) * v),
                color: color,
                life: life,
                maxLife: life,
                size: Math.random() * 3 + 1
            });
        }
    }
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.pos = p.pos.add(p.vel.mult(dt * 60));
            p.vel.y += 0.1 * dt * 60;
            p.life -= dt;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }
    draw(ctx) {
        this.particles.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.pos.x, p.pos.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;
    }
}

class NetNode {
    constructor(x, y, isFixed = false) {
        this.pos = new Vec2(x, y);
        this.oldPos = new Vec2(x, y);
        this.isFixed = isFixed;
    }
}
class NetLink {
    constructor(n1, n2, distance) {
        this.n1 = n1;
        this.n2 = n2;
        this.targetDist = distance;
    }
    solve() {
        const axis = this.n1.pos.sub(this.n2.pos);
        const dist = axis.mag();
        if (dist === 0) return;
        const diff = (this.targetDist - dist) / dist;
        const offset = axis.mult(0.5 * diff);
        if (!this.n1.isFixed) this.n1.pos = this.n1.pos.add(offset);
        if (!this.n2.isFixed) this.n2.pos = this.n2.pos.sub(offset);
    }
}
class BasketballNet {
    constructor(x, y, width) {
        this.nodes = [];
        this.links = [];
        this.width = width;
        this.buildNet(x, y);
    }
    buildNet(rx, ry) {
        const rows = 5, cols = 6;
        const hStep = 12;
        for (let r = 0; r < rows; r++) {
            const currentWidth = this.width - (r * 4);
            const startX = rx - currentWidth / 2;
            const cwStep = currentWidth / (cols - 1);
            for (let c = 0; c < cols; c++) {
                this.nodes.push(new NetNode(startX + c * cwStep, ry + r * hStep, r === 0));
            }
        }
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols - 1; c++) {
                const i1 = r * cols + c, i2 = r * cols + c + 1;
                this.links.push(new NetLink(this.nodes[i1], this.nodes[i2], this.nodes[i1].pos.dist(this.nodes[i2].pos)));
            }
        }
        for (let r = 0; r < rows - 1; r++) {
            for (let c = 0; c < cols; c++) {
                const i1 = r * cols + c, i2 = (r + 1) * cols + c;
                this.links.push(new NetLink(this.nodes[i1], this.nodes[i2], this.nodes[i1].pos.dist(this.nodes[i2].pos)));
            }
        }
        for (let r = 0; r < rows - 1; r++) {
            for (let c = 0; c < cols - 1; c++) {
                const i1 = r * cols + c, i2 = (r + 1) * cols + c + 1;
                this.links.push(new NetLink(this.nodes[i1], this.nodes[i2], this.nodes[i1].pos.dist(this.nodes[i2].pos)));
                const i3 = r * cols + c + 1, i4 = (r + 1) * cols + c;
                this.links.push(new NetLink(this.nodes[i3], this.nodes[i4], this.nodes[i3].pos.dist(this.nodes[i4].pos)));
            }
        }
    }
    updatePosition(rx, ry) {
        const cols = 6;
        for (let c = 0; c < cols; c++) {
            const node = this.nodes[c];
            const cwStep = this.width / (cols - 1);
            node.pos.set(rx - this.width/2 + c * cwStep, ry);
            node.oldPos.set(node.pos.x, node.pos.y);
        }
    }
    update() {
        for (let node of this.nodes) {
            if (!node.isFixed) {
                const vel = node.pos.sub(node.oldPos);
                node.oldPos = node.pos.clone();
                node.pos = node.pos.add(vel.mult(0.98)).add(new Vec2(0, 0.5));
            }
        }
        for (let i = 0; i < 5; i++) for (let link of this.links) link.solve();
    }
    interactWithBall(ballPos, ballRadius) {
        for (let node of this.nodes) {
            if (node.isFixed) continue;
            const dist = node.pos.dist(ballPos);
            if (dist < ballRadius) {
                const dir = node.pos.sub(ballPos).normalize();
                node.pos = ballPos.add(dir.mult(ballRadius));
            }
        }
    }
    draw(ctx) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let link of this.links) {
            ctx.moveTo(link.n1.pos.x, link.n1.pos.y);
            ctx.lineTo(link.n2.pos.x, link.n2.pos.y);
        }
        ctx.stroke();
    }
}

const SKINS = [
    { id: 0, c1: '#ffac62', c2: '#c25000', line: '#2a1200' }, // Classic
    { id: 1, c1: '#00ffff', c2: '#0055ff', line: '#ffffff' }, // Neon
    { id: 2, c1: '#ffd700', c2: '#b8860b', line: '#4a3500' }, // Gold
    { id: 3, c1: '#39ff14', c2: '#008000', line: '#002200' }  // Toxic
];

class Ball {
    constructor(x, y, radius, skinId) {
        this.pos = new Vec2(x, y);
        this.vel = new Vec2(0, 0);
        this.radius = radius;
        this.mass = 1.5; 
        this.restitution = 0.85; // ИСПРАВЛЕНИЕ: Увеличен коэффициент упругости для сохранения кинетической энергии
        this.isFlying = false;
        this.rotation = 0;
        this.angularVel = 0;
        this.skin = SKINS[skinId] || SKINS[0];
    }

    shoot(startVec, endVec, powerScale) {
        const dir = startVec.sub(endVec);
        this.vel = dir.mult(powerScale);
        this.isFlying = true;
        this.angularVel = (Math.random() - 0.5) * 0.5;
    }

    update(dt, windVec) {
        if (!this.isFlying) return;
        this.vel.y += 0.6 * dt * 60; // Gravity
        if (windVec) this.vel = this.vel.add(windVec.mult(dt));
        this.vel = this.vel.mult(0.999); // ИСПРАВЛЕНИЕ: Снижено аэродинамическое сопротивление
        this.pos = this.pos.add(this.vel.mult(dt * 60));
        this.angularVel *= 0.99;
        this.rotation += this.angularVel * dt * 60;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.rotation);

        ctx.shadowColor = this.skin.c1;
        ctx.shadowBlur = this.skin.id === 1 ? 20 : 10;

        const gr = ctx.createRadialGradient(-this.radius*0.3, -this.radius*0.3, 0, 0, 0, this.radius);
        gr.addColorStop(0, this.skin.c1);
        gr.addColorStop(1, this.skin.c2);
        
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = this.skin.line;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-this.radius, 0); ctx.lineTo(this.radius, 0);
        ctx.moveTo(0, -this.radius); ctx.lineTo(0, this.radius);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(this.radius*0.8, 0, this.radius*0.7, Math.PI/2, Math.PI*1.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(-this.radius*0.8, 0, this.radius*0.7, -Math.PI/2, Math.PI/2);
        ctx.stroke();
        ctx.restore();
    }
}

class Hoop {
    constructor(x, y) {
        this.basePos = new Vec2(x, y);
        this.pos = new Vec2(x, y);
        this.width = 60;
        this.net = new BasketballNet(x, y, this.width);
        this.scoreBox = { x: x - this.width/2 + 10, y: y, w: this.width - 20, h: 20 };
        this.scored = false;
        this.moveType = 'none';
        this.moveSpeed = 0;
        this.moveRange = 0;
        this.time = 0;
    }
    update(dt) {
        if (this.moveType === 'horizontal') {
            this.time += dt;
            this.pos.x = this.basePos.x + Math.sin(this.time * this.moveSpeed) * this.moveRange;
        } else if (this.moveType === 'vertical') {
            this.time += dt;
            this.pos.y = this.basePos.y + Math.sin(this.time * this.moveSpeed) * this.moveRange;
        }
        this.scoreBox.x = this.pos.x - this.width/2 + 10;
        this.scoreBox.y = this.pos.y;
        this.net.updatePosition(this.pos.x, this.pos.y);
        this.net.update(dt);
    }
    draw(ctx) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.strokeStyle = '#f0f0f8';
        ctx.lineWidth = 3;
        ctx.fillRect(this.pos.x - 40, this.pos.y - 70, 80, 60);
        ctx.strokeRect(this.pos.x - 40, this.pos.y - 70, 80, 60);
        ctx.strokeStyle = '#ff4d4d';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.pos.x - 15, this.pos.y - 35, 30, 25);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(this.pos.x, this.pos.y - 40);
        ctx.lineTo(this.pos.x, 0);
        ctx.stroke();

        this.net.draw(ctx);

        ctx.strokeStyle = '#ff4d4d';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(this.pos.x - this.width/2, this.pos.y);
        ctx.lineTo(this.pos.x + this.width/2, this.pos.y);
        ctx.stroke();
    }
}

class Obstacle {
    constructor(x, y, w, h, type='static', speed=2) {
        this.basePos = new Vec2(x, y);
        this.pos = new Vec2(x, y);
        this.w = w; this.h = h;
        this.type = type;
        this.speed = speed;
        this.time = 0;
    }
    update(dt) {
        if (this.type === 'moving_h') {
            this.time += dt;
            this.pos.x = this.basePos.x + Math.sin(this.time * this.speed) * 60;
        } else if (this.type === 'moving_v') {
            this.time += dt;
            this.pos.y = this.basePos.y + Math.sin(this.time * this.speed) * 40;
        }
    }
    draw(ctx) {
        ctx.fillStyle = '#22222a';
        ctx.strokeStyle = '#5b8cff';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.rect(this.pos.x, this.pos.y, this.w, this.h);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(this.pos.x + 5, this.pos.y + 5);
        ctx.lineTo(this.pos.x + this.w - 5, this.pos.y + this.h - 5);
        ctx.strokeStyle = 'rgba(91, 140, 255, 0.3)';
        ctx.stroke();
    }
}

// РАСШИРЕНИЕ: 12 Уровней
const LEVELS = [
    { id: 1, target: 1, balls: 3, hoopY: 0.3, hoopMove: 'none' },
    { id: 2, target: 2, balls: 4, hoopY: 0.2, hoopMove: 'none' },
    { id: 3, target: 2, balls: 4, hoopY: 0.25, hoopMove: 'horizontal', speed: 1.5, range: 60 },
    { id: 4, target: 3, balls: 5, hoopY: 0.3, hoopMove: 'none', wind: 0.08 },
    { id: 5, target: 3, balls: 5, hoopY: 0.2, hoopMove: 'none', obs: [{x: 0.5, y: 0.5, w: 100, h: 20}] },
    { id: 6, target: 3, balls: 6, hoopY: 0.25, hoopMove: 'horizontal', speed: 2, range: 80, wind: -0.05, obs: [{x: 0.5, y: 0.6, w: 80, h: 20, type:'moving_h'}] },
    { id: 7, target: 4, balls: 6, hoopY: 0.15, hoopMove: 'vertical', speed: 1.5, range: 40 },
    { id: 8, target: 4, balls: 6, hoopY: 0.25, hoopMove: 'none', wind: 0.12, obs: [{x: 0.3, y: 0.4, w: 20, h: 100}, {x: 0.7, y: 0.4, w: 20, h: 100}] },
    { id: 9, target: 5, balls: 7, hoopY: 0.2, hoopMove: 'horizontal', speed: 2.5, range: 90, obs: [{x: 0.5, y: 0.5, w: 60, h: 20, type:'moving_v', speed: 3}] },
    { id: 10, target: 5, balls: 7, hoopY: 0.15, hoopMove: 'horizontal', speed: 1, range: 50, wind: -0.1 },
    { id: 11, target: 6, balls: 8, hoopY: 0.25, hoopMove: 'none', obs: [{x: 0.5, y: 0.3, w: 150, h: 20}] },
    { id: 12, target: 7, balls: 10, hoopY: 0.2, hoopMove: 'horizontal', speed: 3, range: 100, wind: 0.08, obs: [{x: 0.5, y: 0.55, w: 100, h: 20, type:'moving_h'}] }
];

const GameApp = (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let cw = window.innerWidth, ch = window.innerHeight;
    
    let audio = null;
    let particles = new ParticleSystem();
    
    let state = 'MENU';
    let mode = 'CAMPAIGN'; // CAMPAIGN, SURVIVAL
    let currentLevelIdx = 0;
    let unlockedLevel = parseInt(localStorage.getItem('bball_unlocked')) || 1;
    let currentSkin = parseInt(localStorage.getItem('bball_skin')) || 0;
    let bestSurvival = parseInt(localStorage.getItem('bball_survival')) || 0;
    
    let score = 0, ballsLeft = 0, targetScore = 0;
    let ball = null, hoop = null, obstacles = [], windForce = new Vec2(0, 0);
    
    let dragStart = null, dragCurrent = null, isDragging = false;
    let lastTime = 0, animFrame = null;

    function resize() {
        const container = document.getElementById('game-container');
        cw = container.clientWidth; ch = container.clientHeight;
        canvas.width = cw; canvas.height = ch;
    }

    function initAudio() {
        if (!audio) audio = new AudioEngine();
        audio.resume();
        updateSoundUI();
    }

    function updateSoundUI() {
        if(!audio) return;
        const stateStr = audio.muted ? 'Выкл' : 'Вкл';
        document.getElementById('settings-sound-btn').textContent = `Звук: ${stateStr}`;
        document.getElementById('hud-sound-btn').textContent = audio.muted ? '🔇' : '🔊';
    }

    function buildLevelGrid() {
        const grid = document.getElementById('level-grid');
        grid.innerHTML = '';
        LEVELS.forEach((lvl, idx) => {
            const btn = document.createElement('div');
            btn.className = `level-btn ${lvl.id <= unlockedLevel ? 'unlocked' : 'locked'}`;
            btn.textContent = lvl.id;
            if (lvl.id <= unlockedLevel) btn.onclick = () => loadCampaign(idx);
            grid.appendChild(btn);
        });
    }

    function updateSkinUI() {
        document.querySelectorAll('.skin-btn').forEach((btn, idx) => {
            btn.classList.toggle('selected', idx === currentSkin);
        });
    }

    function switchState(newState) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        state = newState;
        if (state === 'MENU') document.getElementById('screen-menu').classList.add('active');
        if (state === 'LEVELS') { buildLevelGrid(); document.getElementById('screen-levels').classList.add('active'); }
        if (state === 'SETTINGS') { updateSkinUI(); document.getElementById('screen-settings').classList.add('active'); }
        if (state === 'END') document.getElementById('screen-end').classList.add('active');
    }

    function spawnBall() {
        ball = new Ball(cw / 2, ch - 80, 16, currentSkin);
        isDragging = false; dragStart = null;
    }

    function setupEnvironment(windVal) {
        windForce = new Vec2(windVal, 0);
        const windInd = document.getElementById('wind-indicator');
        if (windForce.x !== 0) {
            windInd.style.opacity = 1;
            const arrow = document.getElementById('wind-arrow');
            arrow.style.transform = windForce.x > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            arrow.style.width = `${Math.abs(windForce.x) * 400}px`;
        } else {
            windInd.style.opacity = 0;
        }
    }

    function loadCampaign(idx) {
        initAudio();
        mode = 'CAMPAIGN';
        currentLevelIdx = idx;
        const lvl = LEVELS[idx];
        score = 0; ballsLeft = lvl.balls; targetScore = lvl.target;
        
        document.getElementById('hud-mode-indicator').innerHTML = `Уровень <span id="hud-level">${lvl.id}</span>`;
        document.getElementById('hud-target-container').style.display = 'block';
        document.getElementById('hud-target').textContent = targetScore;
        updateHUD();

        hoop = new Hoop(cw / 2, ch * lvl.hoopY);
        hoop.moveType = lvl.hoopMove; hoop.moveSpeed = lvl.speed || 0; hoop.moveRange = lvl.range || 0;

        obstacles = [];
        if (lvl.obs) {
            lvl.obs.forEach(o => obstacles.push(new Obstacle(cw * o.x - o.w/2, ch * o.y, o.w, o.h, o.type, o.speed)));
        }

        setupEnvironment(lvl.wind || 0);
        spawnBall();
        switchState('PLAYING');
        if(!animFrame) animFrame = requestAnimationFrame(loop);
    }

    function startSurvival() {
        initAudio();
        mode = 'SURVIVAL';
        score = 0; ballsLeft = 3;
        
        document.getElementById('hud-mode-indicator').innerHTML = `Рекорд: <span id="hud-level">${bestSurvival}</span>`;
        document.getElementById('hud-target-container').style.display = 'none';
        updateHUD();

        generateSurvivalStage();
        spawnBall();
        switchState('PLAYING');
        if(!animFrame) animFrame = requestAnimationFrame(loop);
    }

    function generateSurvivalStage() {
        const difficulty = Math.min(score / 5, 1); // 0 to 1 scale
        
        const hY = 0.15 + Math.random() * 0.2;
        const hX = (cw * 0.2) + Math.random() * (cw * 0.6);
        hoop = new Hoop(hX, ch * hY);
        
        if (difficulty > 0.2 && Math.random() > 0.5) {
            hoop.moveType = Math.random() > 0.5 ? 'horizontal' : 'vertical';
            hoop.moveSpeed = 1 + Math.random() * 2 * difficulty;
            hoop.moveRange = 30 + Math.random() * 60;
        }

        obstacles = [];
        if (difficulty > 0.4 && Math.random() > 0.4) {
            const ow = 40 + Math.random() * 60;
            const ox = (cw * 0.2) + Math.random() * (cw * 0.6) - ow/2;
            const oy = ch * (0.4 + Math.random() * 0.2);
            const type = Math.random() > 0.5 ? 'static' : 'moving_h';
            obstacles.push(new Obstacle(ox, oy, ow, 20, type, 1.5));
        }

        const wind = difficulty > 0.3 ? (Math.random() - 0.5) * 0.2 * difficulty : 0;
        setupEnvironment(wind);
    }

    function updateHUD() {
        document.getElementById('hud-score').textContent = score;
        document.getElementById('hud-balls').textContent = ballsLeft;
    }

    function createText(text, x, y, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.textContent = text;
        el.style.left = `${x}px`; el.style.top = `${y}px`; el.style.color = color;
        document.getElementById('game-container').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function lineCircle(circle, p1, p2) {
        const ac = circle.pos.sub(p1), ab = p2.sub(p1), ab2 = ab.magSq();
        if (ab2 === 0) return p1.dist(circle.pos) < circle.radius;
        let t = Math.max(0, Math.min(1, ac.dot(ab) / ab2));
        const closest = p1.add(ab.mult(t)), distSq = circle.pos.sub(closest).magSq();
        if (distSq < circle.radius * circle.radius) {
            let normal = circle.pos.sub(closest).normalize();
            if(normal.magSq() === 0) normal = new Vec2(0, -1);
            return { hit: true, normal: normal, penetration: circle.radius - Math.sqrt(distSq) };
        }
        return { hit: false };
    }

    function pointCircle(circle, p) {
        const dist = circle.pos.dist(p);
        if (dist < circle.radius) return { hit: true, normal: circle.pos.sub(p).normalize(), penetration: circle.radius - dist };
        return { hit: false };
    }

    function rectCircle(circle, rPos, rW, rH) {
        let tX = circle.pos.x, tY = circle.pos.y;
        if (tX < rPos.x) tX = rPos.x; else if (tX > rPos.x + rW) tX = rPos.x + rW;
        if (tY < rPos.y) tY = rPos.y; else if (tY > rPos.y + rH) tY = rPos.y + rH;
        const dX = circle.pos.x - tX, dY = circle.pos.y - tY, dist = Math.sqrt(dX*dX + dY*dY);
        if (dist <= circle.radius) return { hit: true, normal: new Vec2(dX, dY).normalize(), penetration: circle.radius - dist };
        return { hit: false };
    }

    function resolveCollision(normal, penetration) {
        ball.pos = ball.pos.add(normal.mult(penetration));
        const relVel = ball.vel.dot(normal);
        if (relVel < 0) {
            ball.vel = ball.vel.sub(normal.mult(relVel * (1 + ball.restitution)));
            if (Math.abs(relVel) > 2) {
                if(audio) audio.bounce();
                particles.emit(ball.pos.x - normal.x*ball.radius, ball.pos.y - normal.y*ball.radius, 5, ball.skin.c1, Math.abs(relVel)*0.5, 0.5);
            }
        }
    }

    function checkCollisions() {
        if (!ball.isFlying) return;

        // ИСПРАВЛЕНИЕ: Коэффициент упругости стен увеличен до 0.9 для сохранения кинетической энергии
        if (ball.pos.x - ball.radius < 0) { ball.pos.x = ball.radius; ball.vel.x *= -0.9; if(audio) audio.bounce(); }
        else if (ball.pos.x + ball.radius > cw) { ball.pos.x = cw - ball.radius; ball.vel.x *= -0.9; if(audio) audio.bounce(); }

        if (ball.pos.y - ball.radius > ch) { ballLost(); return; }

        for (let obs of obstacles) {
            const col = rectCircle(ball, obs.pos, obs.w, obs.h);
            if (col.hit) resolveCollision(col.normal, col.penetration);
        }

        const lRim = new Vec2(hoop.pos.x - hoop.width/2, hoop.pos.y);
        const rRim = new Vec2(hoop.pos.x + hoop.width/2, hoop.pos.y);
        
        const bbCol = lineCircle(ball, new Vec2(hoop.pos.x - 40, hoop.pos.y - 70), new Vec2(hoop.pos.x - 40, hoop.pos.y + 10));
        if (bbCol.hit) resolveCollision(bbCol.normal, bbCol.penetration);

        const lCol = pointCircle(ball, lRim); if (lCol.hit) resolveCollision(lCol.normal, lCol.penetration);
        const rCol = pointCircle(ball, rRim); if (rCol.hit) resolveCollision(rCol.normal, rCol.penetration);

        if (ball.vel.y > 0 && !hoop.scored) {
            if (ball.pos.x > hoop.scoreBox.x && ball.pos.x < hoop.scoreBox.x + hoop.scoreBox.w &&
                ball.pos.y > hoop.scoreBox.y && ball.pos.y < hoop.scoreBox.y + hoop.scoreBox.h) {
                
                hoop.scored = true;
                score++;
                if (mode === 'SURVIVAL' && score > bestSurvival) {
                    bestSurvival = score;
                    localStorage.setItem('bball_survival', bestSurvival);
                    document.getElementById('hud-level').textContent = bestSurvival;
                }
                
                updateHUD();
                createText('+1', cw/2, hoop.pos.y - 20, '#00e5a0');
                if(audio) { audio.swish(); audio.score(); }
                particles.emit(hoop.pos.x, hoop.pos.y + 20, 20, '#f0f0f8', 5, 1);

                if (mode === 'SURVIVAL') {
                    // Бонусные мячи каждые 5 очков
                    if (score % 5 === 0) { ballsLeft++; updateHUD(); createText('+1 МЯЧ', cw/2, 100, '#5b8cff'); }
                    setTimeout(() => { generateSurvivalStage(); spawnBall(); }, 600);
                }
            }
        }
        hoop.net.interactWithBall(ball.pos, ball.radius * 1.2);
    }

    function ballLost() {
        if (hoop.scored && mode === 'SURVIVAL') return; // Защита от потери мяча после гола, пока летит вниз

        ballsLeft--;
        updateHUD();
        
        if (mode === 'CAMPAIGN') {
            if (score >= targetScore) {
                const nxt = currentLevelIdx + 2;
                if (nxt > unlockedLevel && nxt <= LEVELS.length) {
                    unlockedLevel = nxt; localStorage.setItem('bball_unlocked', unlockedLevel);
                }
                endGame(true);
            } else if (ballsLeft <= 0) {
                if(audio) audio.error(); endGame(false);
            } else {
                hoop.scored = false; spawnBall();
            }
        } else {
            if (ballsLeft <= 0) {
                if(audio) audio.error(); endGame(false);
            } else {
                hoop.scored = false; spawnBall();
            }
        }
    }

    function endGame(isWin) {
        setTimeout(() => {
            const title = document.getElementById('end-title');
            const stats = document.getElementById('end-stats');
            const btn = document.getElementById('end-action-btn');
            
            if (mode === 'CAMPAIGN') {
                title.textContent = isWin ? 'Уровень пройден!' : 'Попытки исчерпаны';
                title.style.color = isWin ? 'var(--success)' : 'var(--danger)';
                stats.textContent = `Счет: ${score} / ${targetScore}`;
                if (isWin && currentLevelIdx < LEVELS.length - 1) {
                    btn.textContent = 'Далее'; btn.onclick = () => loadCampaign(currentLevelIdx + 1);
                } else {
                    btn.textContent = 'Повторить'; btn.onclick = () => loadCampaign(currentLevelIdx);
                }
                if (isWin) particles.emit(cw/2, ch, 100, '#00e5a0', 15, 3);
            } else {
                title.textContent = 'Игра окончена';
                title.style.color = 'var(--danger)';
                stats.textContent = `Итоговый счет: ${score} (Рекорд: ${bestSurvival})`;
                btn.textContent = 'Еще раз'; btn.onclick = startSurvival;
            }
            switchState('END');
        }, 500);
    }

    function update(dt) {
        if (state !== 'PLAYING') return;
        hoop.update(dt); obstacles.forEach(o => o.update(dt));
        ball.update(dt, windForce); particles.update(dt);
        checkCollisions();
    }

    function draw() {
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-color');
        ctx.fillRect(0, 0, cw, ch);
        if (state !== 'PLAYING') return;

        ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cw/2, ch, 150, 0, Math.PI, true); ctx.stroke();

        obstacles.forEach(o => o.draw(ctx)); hoop.draw(ctx); particles.draw(ctx); ball.draw(ctx);

        if (isDragging && !ball.isFlying && dragStart && dragCurrent) {
            const dragVector = dragStart.sub(dragCurrent);
            const pwr = 0.18, grav = 0.6, dtSim = 1/60;
            let sPos = ball.pos.clone(), sVel = dragVector.mult(pwr); 
            ctx.lineWidth = 2.5; ctx.setLineDash([6, 6]); ctx.lineCap = 'round';
            const steps = 100;
            
            for(let i=0; i<steps; i++) {
                ctx.beginPath(); ctx.moveTo(sPos.x, sPos.y);
                sVel.y += grav * dtSim * 60; 
                if (windForce) sVel = sVel.add(windForce.mult(dtSim));
                sVel = sVel.mult(0.999); // Синхронизировано с физикой мяча
                sPos = sPos.add(sVel.mult(dtSim * 60));

                if (sPos.x - ball.radius < 0) { sPos.x = ball.radius; sVel.x *= -0.9; }
                else if (sPos.x + ball.radius > cw) { sPos.x = cw - ball.radius; sVel.x *= -0.9; }

                for (let obs of obstacles) {
                    const col = rectCircle({pos: sPos, radius: ball.radius}, obs.pos, obs.w, obs.h);
                    if (col.hit) {
                        sPos = sPos.add(col.normal.mult(col.penetration));
                        const rVel = sVel.dot(col.normal);
                        if (rVel < 0) sVel = sVel.sub(col.normal.mult(rVel * (1 + ball.restitution)));
                    }
                }

                const bbCol = lineCircle({pos: sPos, radius: ball.radius}, new Vec2(hoop.pos.x - 40, hoop.pos.y - 70), new Vec2(hoop.pos.x - 40, hoop.pos.y + 10));
                if (bbCol.hit) {
                    sPos = sPos.add(bbCol.normal.mult(bbCol.penetration));
                    const rVel = sVel.dot(bbCol.normal);
                    if (rVel < 0) sVel = sVel.sub(bbCol.normal.mult(rVel * (1 + ball.restitution)));
                }

                ctx.strokeStyle = `rgba(91, 140, 255, ${Math.max(0, 1 - (i/steps))})`;
                ctx.lineTo(sPos.x, sPos.y); ctx.stroke();
                if (sPos.y > ch) break;
            }
            ctx.setLineDash([]);
        }
    }

    function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        if (dt > 0.05) dt = 0.05;
        update(dt); draw();
        animFrame = requestAnimationFrame(loop);
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        return new Vec2((e.touches ? e.touches[0].clientX : e.clientX) - r.left, (e.touches ? e.touches[0].clientY : e.clientY) - r.top);
    }

    function handleDown(e) {
        if (state !== 'PLAYING' || ball.isFlying) return;
        const pos = getPos(e);
        if (pos.y > ch/2) { isDragging = true; dragStart = pos; dragCurrent = pos; if(audio) audio.resume(); }
    }
    function handleMove(e) { if (isDragging) dragCurrent = getPos(e); }
    function handleUp() {
        if (!isDragging) return;
        isDragging = false;
        if (dragStart && dragCurrent) {
            const v = dragStart.sub(dragCurrent);
            if (v.mag() > 20 && v.y < 0) { ball.shoot(dragStart, dragCurrent, 0.18); if(audio) audio.playTone(300, 'sine', 0.1, 0.4); }
        }
        dragStart = dragCurrent = null;
    }

    window.addEventListener('resize', resize);
    canvas.addEventListener('mousedown', handleDown); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleUp);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleDown(e); }, {passive: false});
    window.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('touchend', handleUp);

    return {
        init: () => { resize(); switchState('MENU'); requestAnimationFrame(loop); },
        showMenu: () => switchState('MENU'),
        showLevelSelect: () => switchState('LEVELS'),
        showSettings: () => switchState('SETTINGS'),
        setSkin: (id) => { currentSkin = id; localStorage.setItem('bball_skin', id); updateSkinUI(); },
        toggleSound: () => { if(!audio) initAudio(); audio.setMute(!audio.muted); updateSoundUI(); },
        startSurvival: startSurvival,
        nextLevel: () => mode === 'CAMPAIGN' ? loadCampaign(Math.min(currentLevelIdx + 1, LEVELS.length - 1)) : startSurvival()
    };
})();

window.onload = GameApp.init;
</script>
