<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tetris</title>
  <style>
    :root {
      /* Светлая тема */
      --bg-color-light: #f0f0f0;
      --text-color-light: #333;
      --board-bg-light: #fff;
      --grid-color-light: #ddd;
      --panel-bg-light: #e0e0e0;
      --accent-color-light: #555;

      /* Темная тема */
      --bg-color-dark: #121212;
      --text-color-dark: #eee;
      --board-bg-dark: #1e1e1e;
      --grid-color-dark: #333;
      --panel-bg-dark: #2a2a2a;
      --accent-color-dark: #888;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: var(--bg-color-light);
      color: var(--text-color-light);
      transition: background-color 0.3s, color 0.3s;
      overflow: hidden; /* Предотвращаем скроллинг на мобильных */
      touch-action: none; /* Отключаем стандартные жесты браузера (зум, скролл) */
    }

    body.dark-mode {
      background-color: var(--bg-color-dark);
      color: var(--text-color-dark);
    }

    /* Верхняя панель управления (кнопки) */
    .header-controls {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      padding: 10px 20px;
      box-sizing: border-box;
    }

    .btn {
      background: none;
      border: 2px solid var(--accent-color-light);
      color: inherit;
      padding: 5px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    body.dark-mode .btn {
      border-color: var(--accent-color-dark);
    }

    .btn:hover {
      background-color: rgba(0,0,0,0.1);
    }
    body.dark-mode .btn:hover {
      background-color: rgba(255,255,255,0.1);
    }

    /* Основной контейнер игры */
    .game-container {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      margin-top: 10px;
      flex-grow: 1;
      width: 100%;
      max-width: 1000px;
      padding: 0 10px 10px 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* Боковые панели */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 120px;
      flex-shrink: 0;
    }

    .panel-box {
      background-color: var(--panel-bg-light);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      transition: background-color 0.3s;
    }

    body.dark-mode .panel-box {
      background-color: var(--panel-bg-dark);
    }

    .panel-box h3 {
      margin: 0 0 5px 0;
      font-size: 14px;
      text-transform: uppercase;
    }

    .panel-box .value {
      font-size: 20px;
      font-weight: bold;
    }

    canvas.mini-canvas {
      background-color: var(--board-bg-light);
      border: 1px solid var(--grid-color-light);
      border-radius: 4px;
      display: block;
      margin: 0 auto;
    }

    body.dark-mode canvas.mini-canvas {
      background-color: var(--board-bg-dark);
      border-color: var(--grid-color-dark);
    }

    /* Главный игровой экран */
    .board-container {
      position: relative;
    }

    canvas#gameBoard {
      background-color: var(--board-bg-light);
      border: 2px solid var(--accent-color-light);
      border-radius: 4px;
      display: block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    body.dark-mode canvas#gameBoard {
      background-color: var(--board-bg-dark);
      border-color: var(--accent-color-dark);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* Оверлей (Пауза/Конец игры) */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
      display: none; /* Скрыт по умолчанию */
      text-align: center;
    }

    .overlay h2 {
      margin-bottom: 10px;
    }

    .overlay button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      background: white;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Адаптивность для мобильных устройств (портретная ориентация) */
    @media (max-width: 600px) {
      .game-container {
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
      }
      
      /* Перестраиваем панели в горизонтальный ряд над и под доской */
      .side-panel {
        flex-direction: row;
        width: 100%;
        max-width: 100%;
        justify-content: center;
        gap: 10px;
      }

      .panel-box {
        flex: 1;
        padding: 5px;
      }

      .panel-box h3 {
        font-size: 10px;
      }
      .panel-box .value {
        font-size: 16px;
      }
      
      /* Меняем порядок, чтобы Hold был слева/сверху, Next справа/сверху */
      #left-panel {
        order: -1;
      }
      #right-panel {
        order: 1;
      }
      
      canvas#gameBoard {
        /* На мобильных делаем доску чуть меньше, если нужно, или оставляем адаптивной через JS */
      }
      
      .header-controls {
        padding: 5px 10px;
      }
      .btn {
        font-size: 12px;
        padding: 5px 10px;
      }
    }
  </style>
</head>
<body class="dark-mode">

  <div class="header-controls">
    <button class="btn" id="themeToggleBtn">☀️ Theme</button>
    <button class="btn" id="soundToggleBtn">🔊 Sound: ON</button>
    <button class="btn" id="pauseBtn">⏸ Pause</button>
  </div>

  <div class="game-container">
    <!-- Левая панель (Hold и статистика) -->
    <div class="side-panel" id="left-panel">
      <div class="panel-box">
        <h3>Hold (Shift)</h3>
        <canvas id="holdCanvas" class="mini-canvas"></canvas>
      </div>
      <div class="panel-box">
        <h3>Score</h3>
        <div class="value" id="scoreVal">0</div>
      </div>
      <div class="panel-box">
        <h3>High Score</h3>
        <div class="value" id="highScoreVal">0</div>
      </div>
    </div>

    <!-- Игровое поле -->
    <div class="board-container" id="board-container">
      <canvas id="gameBoard"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Paused</h2>
        <p id="overlayText">Press P to resume</p>
        <button id="overlayBtn" style="display:none;">Restart</button>
      </div>
    </div>

    <!-- Правая панель (Next, Level, Lines) -->
    <div class="side-panel" id="right-panel">
      <div class="panel-box">
        <h3>Next</h3>
        <canvas id="nextCanvas" class="mini-canvas"></canvas>
      </div>
      <div class="panel-box">
        <h3>Level</h3>
        <div class="value" id="levelVal">1</div>
      </div>
      <div class="panel-box">
        <h3>Lines</h3>
        <div class="value" id="linesVal">0</div>
      </div>
    </div>
  </div>

  <script>
    // --- КОНСТАНТЫ И НАСТРОЙКИ ---
    const COLS = 10;
    const ROWS = 20;
    let BLOCK_SIZE = 30; // Will be calculated dynamically
    let MINI_BLOCK_SIZE = 20;

    // Формы тетромино (I, J, L, O, S, T, Z)
    const TETROMINOS = {
      I: { shape: [[1, 1, 1, 1]], color: '#00FFFF' },
      J: { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000FF' },
      L: { shape: [[0, 0, 1], [1, 1, 1]], color: '#FFA500' },
      O: { shape: [[1, 1], [1, 1]], color: '#FFFF00' },
      S: { shape: [[0, 1, 1], [1, 1, 0]], color: '#00FF00' },
      T: { shape: [[0, 1, 0], [1, 1, 1]], color: '#800080' },
      Z: { shape: [[1, 1, 0], [0, 1, 1]], color: '#FF0000' }
    };

    const SHAPES_KEYS = Object.keys(TETROMINOS);

    // --- КЛАССЫ ИГРЫ ---

    class Piece {
      constructor(type) {
        this.type = type;
        this.shape = TETROMINOS[type].shape;
        this.color = TETROMINOS[type].color;
        this.x = Math.floor(COLS / 2) - Math.floor(this.shape[0].length / 2);
        this.y = 0;
      }

      clone() {
        const p = new Piece(this.type);
        p.x = this.x;
        p.y = this.y;
        p.shape = this.shape.map(row => [...row]);
        return p;
      }
    }

    class GameState {
      constructor() {
        this.reset();
      }

      reset() {
        this.grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        this.score = 0;
        this.level = 1;
        this.lines = 0;
        
        // Очередь следующих фигур (3 штуки)
        this.nextPieces = [this.randomPiece(), this.randomPiece(), this.randomPiece()];
        this.currentPiece = this.spawnPiece();
        this.holdPiece = null;
        this.canHold = true; // Можно ли использовать hold в текущий ход
        
        this.isGameOver = false;
        this.isPaused = false;
        
        this.highScore = parseInt(localStorage.getItem('tetrisHighScore')) || 0;
      }

      // Загрузка состояния из LocalStorage
      loadState() {
        const savedState = localStorage.getItem('tetrisGameState');
        if (savedState) {
          try {
            const parsed = JSON.parse(savedState);
            this.grid = parsed.grid;
            this.score = parsed.score;
            this.level = parsed.level;
            this.lines = parsed.lines;
            this.isGameOver = parsed.isGameOver;
            this.canHold = parsed.canHold;

            // Восстановление объектов Piece
            this.currentPiece = this.restorePiece(parsed.currentPiece);
            this.holdPiece = this.restorePiece(parsed.holdPiece);
            this.nextPieces = parsed.nextPieces.map(p => this.restorePiece(p));
            
            // Если игра была загружена, ставим на паузу автоматически
            if (!this.isGameOver) {
               this.isPaused = true;
            }
          } catch (e) {
            console.error("Ошибка при чтении сохраненного состояния игры", e);
            this.reset();
          }
        }
      }

      // Сохранение состояния в LocalStorage
      saveState() {
        if (this.isGameOver) {
          localStorage.removeItem('tetrisGameState');
        } else {
          const state = {
            grid: this.grid,
            score: this.score,
            level: this.level,
            lines: this.lines,
            isGameOver: this.isGameOver,
            canHold: this.canHold,
            currentPiece: this.currentPiece,
            holdPiece: this.holdPiece,
            nextPieces: this.nextPieces
          };
          localStorage.setItem('tetrisGameState', JSON.stringify(state));
        }

        if (this.score > this.highScore) {
          this.highScore = this.score;
          localStorage.setItem('tetrisHighScore', this.highScore.toString());
        }
      }

      // Вспомогательная функция для восстановления Piece после JSON.parse
      restorePiece(data) {
        if (!data) return null;
        const p = new Piece(data.type);
        p.shape = data.shape;
        p.color = data.color;
        p.x = data.x;
        p.y = data.y;
        return p;
      }

      randomPiece() {
        const randKey = SHAPES_KEYS[Math.floor(Math.random() * SHAPES_KEYS.length)];
        return new Piece(randKey);
      }

      spawnPiece() {
        const piece = this.nextPieces.shift();
        this.nextPieces.push(this.randomPiece());
        return piece;
      }

      // Проверка на столкновения
      isValidMove(piece, dx = 0, dy = 0, rotatedShape = piece.shape) {
        for (let r = 0; r < rotatedShape.length; r++) {
          for (let c = 0; c < rotatedShape[r].length; c++) {
            if (rotatedShape[r][c] !== 0) {
              let newX = piece.x + c + dx;
              let newY = piece.y + r + dy;

              // Проверка границ поля
              if (newX < 0 || newX >= COLS || newY >= ROWS) {
                return false;
              }
              // Проверка столкновения с зафиксированными блоками
              // Разрешаем фигуре находиться выше экрана (newY < 0)
              if (newY >= 0 && this.grid[newY][newX] !== 0) {
                return false;
              }
            }
          }
        }
        return true;
      }

      // Движение
      moveLeft() {
        if (!this.isPaused && !this.isGameOver && this.isValidMove(this.currentPiece, -1, 0)) {
          this.currentPiece.x -= 1;
          playSound('move');
          return true;
        }
        return false;
      }

      moveRight() {
        if (!this.isPaused && !this.isGameOver && this.isValidMove(this.currentPiece, 1, 0)) {
          this.currentPiece.x += 1;
          playSound('move');
          return true;
        }
        return false;
      }

      moveDown() {
        if (this.isPaused || this.isGameOver) return false;

        if (this.isValidMove(this.currentPiece, 0, 1)) {
          this.currentPiece.y += 1;
          return true;
        } else {
          // Фигура достигла дна или другой фигуры
          this.lockPiece();
          return false;
        }
      }

      // Вращение (алгоритм вращения матрицы)
      rotate() {
        if (this.isPaused || this.isGameOver) return false;

        // Транспонируем и реверсируем для поворота на 90 градусов по часовой
        const shape = this.currentPiece.shape;
        const rotated = shape[0].map((val, index) => shape.map(row => row[index]).reverse());

        // Проверяем, можно ли повернуть (попытка "Wall kick" - простой сдвиг)
        let success = false;
        if (this.isValidMove(this.currentPiece, 0, 0, rotated)) {
          this.currentPiece.shape = rotated;
          success = true;
        } else if (this.isValidMove(this.currentPiece, -1, 0, rotated)) { // Пробуем сдвинуть влево
          this.currentPiece.x -= 1;
          this.currentPiece.shape = rotated;
          success = true;
        } else if (this.isValidMove(this.currentPiece, 1, 0, rotated)) { // Пробуем сдвинуть вправо
          this.currentPiece.x += 1;
          this.currentPiece.shape = rotated;
          success = true;
        }
        if (success) playSound('rotate');
        return success;
      }

      // Hard Drop
      hardDrop() {
        if (this.isPaused || this.isGameOver) return;
        while (this.isValidMove(this.currentPiece, 0, 1)) {
          this.currentPiece.y += 1;
        }
        playSound('drop');
        this.lockPiece();
      }

      // Функция удержания (Hold)
      hold() {
        if (this.isPaused || this.isGameOver || !this.canHold) return;
        
        if (this.holdPiece === null) {
          this.holdPiece = new Piece(this.currentPiece.type);
          this.currentPiece = this.spawnPiece();
        } else {
          const temp = new Piece(this.currentPiece.type);
          this.currentPiece = new Piece(this.holdPiece.type);
          this.holdPiece = temp;
        }
        
        this.canHold = false; // Блокируем hold до фиксации текущей фигуры
      }

      // Фиксация фигуры на поле
      lockPiece() {
        for (let r = 0; r < this.currentPiece.shape.length; r++) {
          for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
            if (this.currentPiece.shape[r][c] !== 0) {
              let py = this.currentPiece.y + r;
              let px = this.currentPiece.x + c;
              
              if (py < 0) {
                // Если фигура зафиксировалась за пределами экрана сверху - это конец игры
                this.isGameOver = true;
                playSound('gameover');
                return;
              }
              this.grid[py][px] = this.currentPiece.color;
            }
          }
        }

        this.clearLines();
        
        if (!this.isGameOver) {
          this.currentPiece = this.spawnPiece();
          this.canHold = true; // Сброс блокировки hold
          
          // Если новая фигура сразу не может быть помещена - конец игры
          if (!this.isValidMove(this.currentPiece)) {
            this.isGameOver = true;
            playSound('gameover');
          }
        }
      }

      // Очистка заполненных линий
      clearLines() {
        let linesCleared = 0;

        for (let r = ROWS - 1; r >= 0; r--) {
          let isFull = true;
          for (let c = 0; c < COLS; c++) {
            if (this.grid[r][c] === 0) {
              isFull = false;
              break;
            }
          }

          if (isFull) {
            linesCleared++;
            // Удаляем линию
            this.grid.splice(r, 1);
            // Добавляем пустую линию сверху
            this.grid.unshift(Array(COLS).fill(0));
            // Так как мы сдвинули всё вниз, нужно проверить эту же строку снова
            r++;
          }
        }

        if (linesCleared > 0) {
          playSound('clear');
          this.updateScore(linesCleared);
        } else {
          // Если линии не очищены, просто звук падения
          playSound('drop');
        }
      }

      // Обновление счета и уровня
      updateScore(linesCleared) {
        this.lines += linesCleared;

        // Множители очков за линии
        let lineMultipliers = [0, 1, 3, 5, 8];
        let points = 100 * this.level * lineMultipliers[linesCleared];
        this.score += points;

        // Повышение уровня каждые 10 линий
        const newLevel = Math.floor(this.lines / 10) + 1;
        if (newLevel > this.level) {
          this.level = newLevel;
          setTimeout(() => playSound('levelUp'), 300);
        }
        
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('tetrisHighScore', this.highScore.toString());
        }
      }

      // Расчет текущей скорости (задержки) падения
      getDropSpeed() {
        // Базовая задержка 1000мс, уменьшается с каждым уровнем. 
        // Минимальная задержка - 100мс
        let speed = 1000 - (this.level - 1) * 80;
        return Math.max(100, speed);
      }
    }

    // --- ЗВУКИ (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isSoundEnabled = true;

    function playSound(type) {
      if (!isSoundEnabled || audioCtx.state === 'suspended') return;

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      // Настройка фильтра для смягчения звука
      filter.type = 'lowpass';
      filter.frequency.value = 1000;

      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      const now = audioCtx.currentTime;

      switch(type) {
        case 'move':
          osc.type = 'sine'; // Мягкий звук
          osc.frequency.setValueAtTime(250, now);
          osc.frequency.exponentialRampToValueAtTime(150, now + 0.05);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.15, now + 0.01); // Атака
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05); // Спад
          osc.start(now);
          osc.stop(now + 0.05);
          break;
        case 'rotate':
          osc.type = 'triangle'; // Треугольная волна мягче пилы/квадрата
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(450, now + 0.1);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.15, now + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'drop':
          osc.type = 'sine';
          filter.frequency.value = 500; // Более низкочастотный звук
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.2, now + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'clear':
          osc.type = 'triangle';
          filter.frequency.value = 2000;
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
          // Двойной пинг
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.2, now + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.05, now + 0.07);
          gainNode.gain.linearRampToValueAtTime(0.2, now + 0.09);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
          break;
        case 'levelUp':
          osc.type = 'sine';
          filter.frequency.value = 3000;
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.linearRampToValueAtTime(600, now + 0.2);
          osc.frequency.linearRampToValueAtTime(1000, now + 0.4);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
          gainNode.gain.linearRampToValueAtTime(0.1, now + 0.2);
          gainNode.gain.linearRampToValueAtTime(0.2, now + 0.3);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          osc.start(now);
          osc.stop(now + 0.6);
          break;
        case 'gameover':
          osc.type = 'triangle';
          filter.frequency.value = 800;
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
          osc.start(now);
          osc.stop(now + 1.0);
          break;
      }
    }

    const soundToggleBtn = document.getElementById('soundToggleBtn');
    soundToggleBtn.addEventListener('click', () => {
      isSoundEnabled = !isSoundEnabled;
      soundToggleBtn.textContent = isSoundEnabled ? '🔊 Sound: ON' : '🔇 Sound: OFF';
      if (isSoundEnabled && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    // Обработка первого клика по странице для разблокировки аудио
    document.body.addEventListener('click', function unlockAudio() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.body.removeEventListener('click', unlockAudio);
    }, { once: true });

    const game = new GameState();

    // --- РЕНДЕРИНГ И УПРАВЛЕНИЕ UI ---

    const canvas = document.getElementById('gameBoard');
    const ctx = canvas.getContext('2d');
    const holdCanvas = document.getElementById('holdCanvas');
    const holdCtx = holdCanvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');

    const scoreEl = document.getElementById('scoreVal');
    const levelEl = document.getElementById('levelVal');
    const linesEl = document.getElementById('linesVal');
    const highScoreEl = document.getElementById('highScoreVal');

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const overlayBtn = document.getElementById('overlayBtn');

    // Получаем текущие цвета из CSS переменных для сетки/фона
    function getCSSVar(name) {
      return getComputedStyle(document.body).getPropertyValue(name).trim();
    }

    function resizeCanvas() {
      const headerHeight = document.querySelector('.header-controls').offsetHeight || 50;
      // margin top + game-container gap + padding bottom ~ 40px
      const verticalPadding = 60;

      const availableHeight = window.innerHeight - headerHeight - verticalPadding;
      let availableWidth = window.innerWidth - 40; // 40 is max container padding

      let isMobile = window.innerWidth <= 600;

      if (isMobile) {
        // On mobile, panels are stacked top and bottom (flex-direction: column)
        MINI_BLOCK_SIZE = 10; // fixed small size for panels

        // Next canvas will be horizontal (3 pieces side by side)
        holdCanvas.width = MINI_BLOCK_SIZE * 4;
        holdCanvas.height = MINI_BLOCK_SIZE * 4;

        nextCanvas.width = MINI_BLOCK_SIZE * 12;
        nextCanvas.height = MINI_BLOCK_SIZE * 4;
      } else {
        // On desktop, panels are on sides
        MINI_BLOCK_SIZE = 20; // Default size for desktop panels

        // Next canvas will be vertical (3 pieces on top of each other)
        holdCanvas.width = MINI_BLOCK_SIZE * 4;
        holdCanvas.height = MINI_BLOCK_SIZE * 4;

        nextCanvas.width = MINI_BLOCK_SIZE * 4;
        nextCanvas.height = MINI_BLOCK_SIZE * 12;
      }

      // Allow DOM to layout the mini canvases and measure real UI height
      const leftPanelHeight = document.getElementById('left-panel').offsetHeight || 0;
      const rightPanelHeight = document.getElementById('right-panel').offsetHeight || 0;

      let maxBoardHeight, maxBoardWidth;

      if (isMobile) {
        // Sub panel heights + 20px gap
        maxBoardHeight = availableHeight - leftPanelHeight - rightPanelHeight - 20;
        maxBoardWidth = availableWidth;
      } else {
        maxBoardHeight = availableHeight;
        maxBoardWidth = availableWidth - 280; // 120px * 2 + gaps
      }

      const sizeByHeight = Math.floor(maxBoardHeight / ROWS);
      const sizeByWidth = Math.floor(maxBoardWidth / COLS);

      BLOCK_SIZE = Math.min(sizeByHeight, sizeByWidth);

      // Ensure a minimum block size so it's somewhat playable
      if (BLOCK_SIZE < 10) BLOCK_SIZE = 10;

      canvas.width = BLOCK_SIZE * COLS;
      canvas.height = BLOCK_SIZE * ROWS;

      if (game) {
        render(); // redraw with new sizes
      }
    }

    window.addEventListener('resize', resizeCanvas);

    // Отрисовка блока (скругления + неоновый градиент/объем)
    function drawBlock(context, x, y, color, blockSize = BLOCK_SIZE) {
      const px = x * blockSize;
      const py = y * blockSize;
      const radius = Math.max(2, blockSize * 0.15); // динамический радиус скругления
      const padding = 1; // отступ между блоками

      // Внутренние размеры блока
      const bw = blockSize - padding * 2;
      const bh = blockSize - padding * 2;
      const bx = px + padding;
      const by = py + padding;

      // Рисуем скругленный прямоугольник (основной фон)
      context.beginPath();
      context.moveTo(bx + radius, by);
      context.lineTo(bx + bw - radius, by);
      context.quadraticCurveTo(bx + bw, by, bx + bw, by + radius);
      context.lineTo(bx + bw, by + bh - radius);
      context.quadraticCurveTo(bx + bw, by + bh, bx + bw - radius, by + bh);
      context.lineTo(bx + radius, by + bh);
      context.quadraticCurveTo(bx, by + bh, bx, by + bh - radius);
      context.lineTo(bx, by + radius);
      context.quadraticCurveTo(bx, by, bx + radius, by);
      context.closePath();

      // Создаем градиент для эффекта объема и свечения
      const gradient = context.createLinearGradient(bx, by, bx + bw, by + bh);
      gradient.addColorStop(0, color); // Основной цвет вверху-слева
      
      // Высветляем цвет для эффекта (если цвет задан как HEX, делаем простой хак)
      // Можно просто наложить полупрозрачный белый/черный
      context.fillStyle = gradient;
      context.fill();

      // Эффект блика (светлый край сверху-слева)
      context.beginPath();
      context.moveTo(bx + radius, by);
      context.lineTo(bx + bw - radius, by);
      context.quadraticCurveTo(bx + bw, by, bx + bw, by + radius);
      context.lineTo(bx, by + radius);
      context.quadraticCurveTo(bx, by, bx + radius, by);
      context.closePath();
      context.fillStyle = 'rgba(255, 255, 255, 0.4)';
      context.fill();

      // Эффект тени (темный край снизу-справа)
      context.beginPath();
      context.moveTo(bx + bw, by + bh - radius);
      context.quadraticCurveTo(bx + bw, by + bh, bx + bw - radius, by + bh);
      context.lineTo(bx + radius, by + bh);
      context.quadraticCurveTo(bx, by + bh, bx, by + bh - radius);
      context.lineTo(bx + bw, by + bh - radius);
      context.closePath();
      context.fillStyle = 'rgba(0, 0, 0, 0.4)';
      context.fill();

      // Легкая обводка в цвет борда
      context.strokeStyle = getCSSVar('--board-bg-' + (document.body.classList.contains('dark-mode') ? 'dark' : 'light'));
      context.lineWidth = 1;
      context.stroke();
    }

    function drawGrid(context, width, height, blockSize) {
      // Делаем сетку более тонкой и менее контрастной
      context.strokeStyle = getCSSVar(document.body.classList.contains('dark-mode') ? '--grid-color-dark' : '--grid-color-light');
      context.globalAlpha = 0.5; // прозрачность сетки
      context.lineWidth = 0.5;
      
      context.beginPath();
      for (let x = 0; x <= width; x += blockSize) {
        context.moveTo(x, 0);
        context.lineTo(x, height);
      }
      for (let y = 0; y <= height; y += blockSize) {
        context.moveTo(0, y);
        context.lineTo(width, y);
      }
      context.stroke();
      context.globalAlpha = 1.0;
    }

    // Отрисовка основной доски
    function drawBoard() {
      // Очистка
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Сетка
      drawGrid(ctx, canvas.width, canvas.height, BLOCK_SIZE);

      // Зафиксированные блоки
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (game.grid[r][c] !== 0) {
            drawBlock(ctx, c, r, game.grid[r][c]);
          }
        }
      }

      // Тень фигуры (Ghost piece)
      if (game.currentPiece) {
        const ghost = game.currentPiece.clone();
        while (game.isValidMove(ghost, 0, 1)) {
          ghost.y += 1;
        }
        
        ctx.globalAlpha = 0.2;
        for (let r = 0; r < ghost.shape.length; r++) {
          for (let c = 0; c < ghost.shape[r].length; c++) {
            if (ghost.shape[r][c] !== 0) {
              let py = ghost.y + r;
              let px = ghost.x + c;
              if (py >= 0) {
                drawBlock(ctx, px, py, ghost.color);
              }
            }
          }
        }
        ctx.globalAlpha = 1.0;
      }

      // Текущая фигура
      if (game.currentPiece) {
        for (let r = 0; r < game.currentPiece.shape.length; r++) {
          for (let c = 0; c < game.currentPiece.shape[r].length; c++) {
            if (game.currentPiece.shape[r][c] !== 0) {
              let py = game.currentPiece.y + r;
              let px = game.currentPiece.x + c;
              if (py >= 0) {
                drawBlock(ctx, px, py, game.currentPiece.color);
              }
            }
          }
        }
      }
    }

    // Отрисовка мини-панелей (Hold и Next)
    function drawMiniPiece(context, piece, offsetX = 0, offsetY = 0) {
      if (!piece) return;
      
      const bSize = MINI_BLOCK_SIZE;
      // Вычисляем смещение для центрирования фигуры
      const shapeWidth = piece.shape[0].length * bSize;
      const shapeHeight = piece.shape.length * bSize;
      
      let startX, startY;

      const isHorizontal = context.canvas.width > context.canvas.height;

      if (isHorizontal) {
        // Если холст горизонтальный (для Next на мобильных)
        // базовый квадрат: 4 * bSize по ширине, 4 * bSize по высоте
        startX = (MINI_BLOCK_SIZE * 4 - shapeWidth) / 2 + offsetX;
        startY = (MINI_BLOCK_SIZE * 4 - shapeHeight) / 2 + offsetY;
      } else {
        // Вертикальный холст (стандартный)
        startX = (context.canvas.width - shapeWidth) / 2 + offsetX;
        startY = (MINI_BLOCK_SIZE * 4 - shapeHeight) / 2 + offsetY;
      }

      for (let r = 0; r < piece.shape.length; r++) {
        for (let c = 0; c < piece.shape[r].length; c++) {
          if (piece.shape[r][c] !== 0) {
            drawBlock(context, startX / bSize + c, startY / bSize + r, piece.color, bSize);
          }
        }
      }
    }

    function drawPanels() {
      // Очистка
      holdCtx.clearRect(0, 0, holdCanvas.width, holdCanvas.height);
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);

      if (game.holdPiece) {
        drawMiniPiece(holdCtx, game.holdPiece);
      }

      // Next pieces (3 штуки)
      const isHorizontal = nextCanvas.width > nextCanvas.height;
      for (let i = 0; i < game.nextPieces.length; i++) {
        if (isHorizontal) {
           drawMiniPiece(nextCtx, game.nextPieces[i], i * MINI_BLOCK_SIZE * 4, 0); // Смещение вправо
        } else {
           drawMiniPiece(nextCtx, game.nextPieces[i], 0, i * MINI_BLOCK_SIZE * 4); // Смещение вниз
        }
      }
    }

    // Обновление UI значений
    function updateUI() {
      scoreEl.textContent = game.score;
      levelEl.textContent = game.level;
      linesEl.textContent = game.lines;
      highScoreEl.textContent = game.highScore;
    }

    // Главный цикл рендеринга
    function render() {
      drawBoard();
      drawPanels();
      updateUI();
    }

    // --- УПРАВЛЕНИЕ И ИГРОВОЙ ЦИКЛ ---

    let animationId;
    let lastTime = 0;
    let dropCounter = 0;

    function gameLoop(time = 0) {
      if (game.isPaused) {
        showOverlay("Paused", "Press P to resume");
        return;
      }

      if (game.isGameOver) {
        showOverlay("Game Over", `Score: ${game.score}`);
        overlayBtn.style.display = 'inline-block';
        return;
      }

      const deltaTime = time - lastTime;
      lastTime = time;

      dropCounter += deltaTime;
      if (dropCounter > game.getDropSpeed()) {
        game.moveDown();
        dropCounter = 0;
      }

      render();
      animationId = requestAnimationFrame(gameLoop);
    }

    function showOverlay(title, text) {
      overlay.style.display = 'flex';
      overlayTitle.textContent = title;
      overlayText.textContent = text;
    }

    function hideOverlay() {
      overlay.style.display = 'none';
      overlayBtn.style.display = 'none';
    }

    function togglePause() {
      if (game.isGameOver) return;
      game.isPaused = !game.isPaused;
      if (game.isPaused) {
        cancelAnimationFrame(animationId);
        showOverlay("Paused", "Press P to resume");
      } else {
        hideOverlay();
        lastTime = performance.now();
        gameLoop(lastTime);
      }
    }

    function restartGame() {
      game.reset();
      game.saveState();
      hideOverlay();
      dropCounter = 0;
      lastTime = performance.now();
      if (animationId) cancelAnimationFrame(animationId);
      gameLoop(lastTime);
    }

    // Обработчики кнопок UI
    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.addEventListener('click', togglePause);

    overlayBtn.addEventListener('click', restartGame);

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      themeToggleBtn.textContent = isDark ? '☀️ Theme' : '🌙 Theme';
      render(); // Перерисовать сетку
    });

    // Клавиатура
    document.addEventListener('keydown', (event) => {
      if (game.isGameOver && event.key !== 'p' && event.key !== 'Escape') return;

      switch (event.key) {
        case 'ArrowLeft':
        case 'a':
        case 'A':
          game.moveLeft();
          render();
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          game.moveRight();
          render();
          break;
        case 'ArrowUp':
        case 'w':
        case 'W':
          game.rotate();
          render();
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          game.moveDown();
          dropCounter = 0; // Сброс таймера при ручном сбросе
          render();
          break;
        case ' ': // Space
          game.hardDrop();
          dropCounter = 0;
          render();
          break;
        case 'Shift':
        case 'c':
        case 'C':
          game.hold();
          render();
          break;
        case 'p':
        case 'P':
        case 'Escape':
          togglePause();
          break;
      }
    });

    // Сенсорное управление (Жесты)
    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoveX = 0;
    let touchMoveY = 0;
    let isSwiping = false;
    let touchStartTime = 0;
    let currentSoftDropInterval = null;

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault(); // Предотвращаем скролл
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
      touchStartTime = Date.now();
      isSwiping = false;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (game.isPaused || game.isGameOver) return;

      touchMoveX = e.changedTouches[0].screenX;
      touchMoveY = e.changedTouches[0].screenY;
      
      let dx = touchMoveX - touchStartX;
      let dy = touchMoveY - touchStartY;

      // Горизонтальное перемещение (каждые 30px)
      if (Math.abs(dx) > 30) {
        isSwiping = true;
        if (dx > 0) {
          game.moveRight();
        } else {
          game.moveLeft();
        }
        touchStartX = touchMoveX; // Сбрасываем X для плавного движения
        render();
      }

      // Soft drop при удержании свайпа вниз
      if (dy > 40 && !currentSoftDropInterval) {
         isSwiping = true;
         // Включаем soft drop пока палец движется вниз
         currentSoftDropInterval = setInterval(() => {
           if(!game.isPaused && !game.isGameOver) {
             game.moveDown();
             dropCounter = 0;
             render();
           }
         }, 50);
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (currentSoftDropInterval) {
        clearInterval(currentSoftDropInterval);
        currentSoftDropInterval = null;
      }

      if (game.isPaused || game.isGameOver) return;

      let touchEndX = e.changedTouches[0].screenX;
      let touchEndY = e.changedTouches[0].screenY;
      let dy = touchEndY - touchStartY;
      let duration = Date.now() - touchStartTime;

      // Hard Drop (Резкий свайп вниз)
      if (dy > 50 && duration < 300) {
        game.hardDrop();
        dropCounter = 0;
        render();
        return;
      }

      // Тап (Поворот)
      if (!isSwiping && duration < 300 && dy < 30) {
        game.rotate();
        render();
      }
    }, { passive: false });

    // Сохранение игры при закрытии/обновлении страницы
    window.addEventListener('beforeunload', () => {
        game.saveState();
    });
    
    // Сохранение при сворачивании (на мобильных)
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'hidden') {
          game.saveState();
      }
    });

    // Инициализация
    resizeCanvas();
    game.loadState();
    if(game.isPaused) {
        showOverlay("Paused", "Press P to resume");
        render(); // Разово отрисовать загруженную доску под оверлеем
    }
    
    gameLoop(0);
    console.log("Controls and GameLoop initialized");
  </script>
</body>
</html>
